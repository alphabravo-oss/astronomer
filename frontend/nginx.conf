# Static SPA server. Runs non-root (uid 1001) on a read-only rootfs:
# pid + all temp paths live under /tmp (emptyDir in the chart).
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
    include mime.types;  # stock 1.29 mime.types includes application/wasm
    default_type application/octet-stream;
    access_log /dev/stdout;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    server {
        listen 3000;
        root /usr/share/nginx/html;

        location = /healthz { return 200; }

        # Hashed build output: cache forever.
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Everything else (index.html, unhashed /wterm.wasm, SPA deep links):
        # ETag revalidation, fall back to the SPA shell.
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri /index.html;
        }
    }
}
