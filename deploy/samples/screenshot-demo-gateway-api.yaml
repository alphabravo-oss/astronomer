apiVersion: v1
kind: Namespace
metadata:
  name: astronomer-screenshot-backend
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    app.kubernetes.io/part-of: astronomer
    astronomer.io/demo: screenshots
---
apiVersion: v1
kind: Service
metadata:
  name: cross-namespace-api
  namespace: astronomer-screenshot-backend
  labels:
    app.kubernetes.io/name: cross-namespace-api
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-grpc
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-grpc
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: grpc
      port: 50051
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-tls
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-tls
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: tls
      port: 443
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-tcp
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-tcp
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: tcp
      port: 9000
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-udp
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-udp
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: udp
      protocol: UDP
      port: 9001
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  controllerName: example.com/astronomer-screenshot-gateway-controller
  description: Screenshot-only GatewayClass.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-gateway
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  gatewayClassName: astronomer-screenshot-demo
  listeners:
    - name: web
      hostname: screenshot-gateway.astronomer.dev.alphabravo.io
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: grpc
      hostname: grpc.screenshot-gateway.astronomer.dev.alphabravo.io
      port: 50051
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: tls-passthrough
      hostname: tls.screenshot-gateway.astronomer.dev.alphabravo.io
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
    - name: tcp
      port: 9000
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: Same
    - name: udp
      port: 9001
      protocol: UDP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  parentRefs:
    - name: demo-gateway
      sectionName: web
  hostnames:
    - screenshot-gateway.astronomer.dev.alphabravo.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: x-astronomer-demo
                value: screenshots
      backendRefs:
        - name: demo-web
          port: 80
          weight: 90
        - name: cross-namespace-api
          namespace: astronomer-screenshot-backend
          port: 80
          weight: 10
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: demo-grpc
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-grpc
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  parentRefs:
    - name: demo-gateway
      sectionName: grpc
  hostnames:
    - grpc.screenshot-gateway.astronomer.dev.alphabravo.io
  rules:
    - matches:
        - method:
            service: demo.v1.Health
            method: Check
      backendRefs:
        - name: demo-grpc
          port: 50051
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: demo-tls
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-tls
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  parentRefs:
    - name: demo-gateway
      sectionName: tls-passthrough
  hostnames:
    - tls.screenshot-gateway.astronomer.dev.alphabravo.io
  rules:
    - backendRefs:
        - name: demo-tls
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: demo-tcp
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-tcp
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  parentRefs:
    - name: demo-gateway
      sectionName: tcp
  rules:
    - backendRefs:
        - name: demo-tcp
          port: 9000
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: demo-udp
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-udp
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  parentRefs:
    - name: demo-gateway
      sectionName: udp
  rules:
    - backendRefs:
        - name: demo-udp
          port: 9001
---
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-demo-http-route
  namespace: astronomer-screenshot-backend
  labels:
    app.kubernetes.io/name: cross-namespace-api
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: astronomer-screenshot-demo
  to:
    - group: ""
      kind: Service
