apiVersion: v1
kind: Namespace
metadata:
  name: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    app.kubernetes.io/part-of: astronomer
    astronomer.io/demo: screenshots
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-runner
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
data:
  APP_ENV: screenshot
  FEATURE_GATEWAY_API: "true"
  index.html: |
    <html>
      <body>
        <h1>Astronomer Screenshot Demo</h1>
        <p>This workload exists only to populate Cluster Explorer pages.</p>
      </body>
    </html>
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-secret
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
type: Opaque
stringData:
  DEMO_TOKEN: screenshot-only-token
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: demo-quota
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "20"
    services: "10"
    configmaps: "10"
    secrets: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: demo-limits
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-cache
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-web
        app.kubernetes.io/part-of: astronomer-screenshot-demo
        astronomer.io/demo: screenshots
    spec:
      serviceAccountName: demo-runner
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: demo-app-config
            - secretRef:
                name: demo-app-secret
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: demo-app-config
            items:
              - key: index.html
                path: index.html
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-stateful-cache
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-stateful-cache
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  serviceName: demo-stateful-cache
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-stateful-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-stateful-cache
        app.kubernetes.io/part-of: astronomer-screenshot-demo
        astronomer.io/demo: screenshots
    spec:
      containers:
        - name: cache
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: demo-stateful-cache
          astronomer.io/demo: screenshots
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: demo-node-agent
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-node-agent
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-node-agent
        app.kubernetes.io/part-of: astronomer-screenshot-demo
        astronomer.io/demo: screenshots
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: demo-stateful-cache
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-stateful-cache
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: demo-stateful-cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-web
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-migration
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-migration
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-migration
        app.kubernetes.io/part-of: astronomer-screenshot-demo
        astronomer.io/demo: screenshots
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - echo "running screenshot demo migration"; sleep 20; echo "done"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-report
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-report
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: demo-report
        app.kubernetes.io/part-of: astronomer-screenshot-demo
        astronomer.io/demo: screenshots
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: demo-report
            app.kubernetes.io/part-of: astronomer-screenshot-demo
            astronomer.io/demo: screenshots
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - date; echo "screenshot demo report"
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-web
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  ingressClassName: nginx
  rules:
    - host: screenshot-demo.astronomer.dev.alphabravo.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-web-ingress
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: demo-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-reader
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-reader
  namespace: astronomer-screenshot-demo
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
subjects:
  - kind: ServiceAccount
    name: demo-runner
    namespace: astronomer-screenshot-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: astronomer-screenshot-demo-viewer
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: astronomer-screenshot-demo-viewer
  labels:
    app.kubernetes.io/name: astronomer-screenshot-demo
    astronomer.io/demo: screenshots
subjects:
  - kind: ServiceAccount
    name: demo-runner
    namespace: astronomer-screenshot-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: astronomer-screenshot-demo-viewer
