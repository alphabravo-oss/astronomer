# =============================================================================
# Astronomer Go - Helm chart default values
# =============================================================================
# Defaults are tuned for local k3d / development. For production, override:
#   - image.*.tag
#   - secrets.* (must come from a real secret source, not a literal)
#   - postgres.bundled.enabled / redis.bundled.enabled
#   - ingress.host (must be a real DNS name)

# Optional convenience: have the chart create the namespace itself.
createNamespace: false
namespace: astronomer

# -- Override the auto-generated chart name.
nameOverride: ""
fullnameOverride: ""

# =============================================================================
# Container images
# =============================================================================
image:
  # T23 — air-gapped: a single `registry` value applied as a prefix to
  # EVERY image in the chart unless an image-specific override is set.
  # The full set of images that participate is enumerated by
  # `make images.txt` (see scripts/extract-images.sh).
  registry: ""           # Empty registry = use local images (k3d-imported).
  pullPolicy: IfNotPresent
  pullSecrets: []
  # F1 schema-skew guard: server and migrate ship the same DB schema and are
  # built from one commit, so their tags MUST match. The chart fails the render
  # when image.server.tag != image.migrate.tag (a mismatch can 503 the plane
  # permanently via the /readyz schema floor). Set true ONLY for a deliberate
  # skewed rollout that ships no new migration (a NOTES.txt warning then fires).
  allowSchemaSkew: false
  # Per-image `registry` is the online default home (first-party = GHCR). The
  # global `image.registry` above overrides ALL of these when set (air-gap:
  # mirror everything into one private registry). Empty global => these defaults.
  server:
    registry: ghcr.io/alphabravo-oss
    repository: astronomer-go-server
    tag: dev
  worker:
    registry: ghcr.io/alphabravo-oss
    repository: astronomer-go-worker
    tag: dev
  agent:
    # Used by the server when rendering install.yaml.template for new clusters.
    registry: ghcr.io/alphabravo-oss
    repository: astronomer-go-agent
    tag: dev
  migrate:
    registry: ghcr.io/alphabravo-oss
    repository: astronomer-go-migrate
    tag: dev

# =============================================================================
# Utility images
# =============================================================================
# Third-party tools used as init containers / sidecars. Each respects
# image.registry as a prefix unless an explicit `registry` is provided
# here (e.g. air-gapped operators that mirror busybox into a separate
# location from the rest).
utilities:
  busybox:
    repository: busybox
    tag: "1.36"
    registry: ""

# =============================================================================
# Frontend (optional Next.js dashboard)
# =============================================================================
frontend:
  enabled: true
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  affinity:
    enabled: true
  topologySpread:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
  image:
    repository: astronomer-frontend
    tag: dev
    registry: ""    # T23 air-gapped override; falls back to image.registry
  apiBaseUrl: "http://astronomer-server:8000"
  wsBaseUrl: "ws://astronomer-server:8000/api/v1/ws"
  hostAliases: []
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# =============================================================================
# Server (HTTP API)
# =============================================================================
server:
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  affinity:
    enabled: true
  topologySpread:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8000
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
  env: {}
  # Bounded per-pod handoff for cross-replica SSE fan-out. A full queue drops
  # only the Redis copy; local SSE/webhook/SIEM delivery has already happened.
  # The server clamps values above 65536 even outside Helm.
  eventRelayQueueCapacity: 1024
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # Liveness stays on the cheap process check; readiness uses dependency-aware /readyz.
  probes:
    enabled: true
    livenessPath: /health/
    readinessPath: /readyz

# =============================================================================
# Worker (Redis-backed job runner)
# =============================================================================
worker:
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  affinity:
    enabled: true
  topologySpread:
    enabled: true
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
  # Example:
  # env:
  #   AUDIT_LOG_RETENTION_MONTHS: "13"
  env: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # /healthz is served on the metrics port (9090). Mirrors server.probes.
  probes:
    enabled: true
    livenessPath: /healthz
    readinessPath: /healthz

# =============================================================================
# Database / Cache
# =============================================================================
postgres:
  bundled:
    enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    registry: ""    # T23 air-gapped override; falls back to image.registry
  user: astronomer
  password: astronomer    # Override in production!
  database: astronomer
  port: 5432
  storage:
    size: 8Gi
    storageClassName: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  external:
    dsn: ""
    dsnSecretRef:
      name: ""
      key: ""
  # Production support contract. These values are documentation knobs used by
  # operators and policy tooling; render-time and runtime enforcement live in
  # the production preflight checks and server startup validation.
  productionRequirements:
    # Use a managed Postgres service or an HA Postgres operator with automated
    # failover. The bundled StatefulSet is development/CI only.
    externalManagedOrHA: true
    # Production DSNs must include sslmode=require, verify-ca, or verify-full.
    tlsRequired: true
    # Use provider WAL/PITR where available. The managementBackup CronJob is a
    # cold backup of last resort, not a substitute for WAL-based recovery.
    pitrRequired: true
    # Keep logical backups enabled and rehearse restore regularly.
    logicalBackupsRequired: true
    restoreDrillRequired: true
    # Recommended minimums for operator runbooks and policy checks.
    minimumDailyBackups: 30
    minimumWeeklyBackups: 12
    minimumMonthlyBackups: 6
  # pgxpool sizing for the server + worker processes (FEATURES-051126 T21).
  # Zero / unset = use the binary's defaults (MaxConns=25, MinConns=5,
  # MaxConnLifetime=30m, MaxConnIdleTime=5m, HealthCheckPeriod=30s).
  #
  # Tuning guidance for 50+ managed clusters under load:
  #   pool:
  #     maxConns: 75            # 3× default
  #     minConns: 10
  #     maxConnLifetimeMinutes: 30
  #     maxConnIdleMinutes: 5
  #     healthCheckPeriodSeconds: 30
  #
  # When the pool runs empty AND callers queue, /readyz returns 503 so
  # the pod is removed from Service endpoints until the pressure clears.
  pool: {}

redis:
  bundled:
    enabled: true
  # Engine is Valkey (the BSD-licensed drop-in fork of Redis). Wire-compatible,
  # so the go-redis client and redis:// URLs are unchanged; the resource/service
  # stay named "redis" to avoid PVC / self-manage / netpol churn.
  image:
    repository: valkey/valkey
    tag: 8-alpine
    registry: ""    # T23 air-gapped override; falls back to image.registry
  port: 6379
  storage:
    size: 2Gi
    storageClassName: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  external:
    address: ""
    passwordSecretRef:
      name: ""
      key: ""
    tls: false
    database: 0

# =============================================================================
# Migrations
# =============================================================================
migrate:
  enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

preflight:
  enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  image:
    # astronomer-shell is built from deploy/docker/Dockerfile.shell —
    # alpine + kubectl pinned at v1.31.0, fetched from dl.k8s.io. It
    # replaced the previous bitnami/kubectl default after Broadcom
    # 404'd docker.io/bitnami/kubectl during the Aug 2025 retag.
    # Same image runs the in-browser kubectl shell pods, so air-gapped
    # operators only need to mirror one image for both surfaces.
    repository: astronomer-shell
    tag: dev
    registry: ""    # T23 air-gapped override; falls back to image.registry

# =============================================================================
# Connection strings (consumed by server + worker)
# =============================================================================
# When postgres.bundled.enabled / redis.bundled.enabled are true, hosts default to the
# in-chart Service names. Override these for BYO DB/cache.
config:
  databaseURL: ""        # Defaults to postgres://USER:PASS@<release>-postgres:5432/<db>
  redisURL: ""           # Defaults to redis://<release>-redis:6379/0
  env: development
  debug: "true"
  logLevel: info
  allowedHosts: "*"
  corsAllowedOrigins: "http://astronomer.localtest.me"
  # External URL of this install (e.g. http://astronomer.example.com:8080).
  # Seeded into platform_configuration.server_url on first boot; consumed by
  # the Argo self-management loop to render the right hostname on the
  # self-manage HTTPRoute. Leave empty to skip the seed and set later via
  # /dashboard/settings.
  serverURL: ""
  # Empty => derive from image.agent (registry-aware). Set explicitly only to
  # override the agent image independently of the management-plane image set.
  agentImageRepository: ""
  agentImageTag: ""
  # Fleet-style PULL reconcile (sprint: pull-reconcile). OFF by default. When
  # true the adopted-cluster agent becomes the local GitOps applier and owns the
  # astronomer-* footprint via pull; the management plane must not double-manage
  # the same footprint via Argo push. Leave false to keep v0.1.0 behavior.
  pullReconcileEnabled: false
  # =============================================================================
  # Auth hardening (migration 039 / NIST 800-53 AC-7 / SOC 2 CC6.1)
  # =============================================================================
  # Account-lockout policy. After this many consecutive failed login
  # attempts the user row is locked for the configured duration.
  # Auto-unlock is implicit (`locked_until` in the past behaves like
  # "not locked"); an admin can also force-unlock via
  # POST /api/v1/admin/users/{id}/unlock/.
  loginFailureThreshold: 5
  lockoutDurationMinutes: 15
  # =============================================================================
  # Two-factor authentication / TOTP (migration 043 / SOC 2 / ISO 27001)
  # =============================================================================
  # `auth.totp.issuer` is the label shown in the user's authenticator app
  # (e.g. Google Authenticator, 1Password, Bitwarden). Pick something that
  # disambiguates your installs — multiple installs that share the issuer
  # string collide in the user's app.
  #
  # `auth.totp.require` makes 2FA mandatory: a successful password login
  # for a NOT-YET-enrolled user is rebuffed with a 423 + an enrollment-only
  # challenge token. The SPA drives the QR flow before retrying. Keep this
  # false during rollout; flip to true once the user base has enrolled.
  auth:
    totp:
      issuer: "Astronomer"
      require: false
    # Migration 045: when dex.enabled=false in production, the operator
    # must explicitly acknowledge the local-password-only posture by
    # setting this flag. Without it the chart's production preflight
    # fails so a misconfigured install can't accidentally ship with no
    # enterprise auth path enabled.
    localPasswordOnly: false

# =============================================================================
# Dex (in-chart identity broker) — migration 045
# =============================================================================
# Astronomer brokers all enterprise auth (Okta, Azure AD, LDAP, SAML, GitHub,
# GitLab, etc.) through Dex (https://dexidp.io). The card-grid wizard at
# /dashboard/settings/auth/connectors/new writes rows into dex_connectors;
# DexHandler.Apply re-renders Dex's ConfigMap and triggers a rollout.
#
# Set dex.enabled=true to deploy the in-cluster Dex; the server's bootstrap
# (see internal/server/dex_bootstrap.go) auto-wires dex_settings so the first
# connector + Apply works without any manual settings step. dex.enabled=false
# (the default for local dev) leaves the connector wizard browseable but
# returns 503 from /api/v1/auth/dex/apply.
#
# values-production.yaml flips dex.enabled to true and bumps replicaCount to 2.
dex:
  enabled: false
  replicaCount: 1
  image:
    repository: dexidp/dex
    tag: v2.41.1
    registry: ""              # T23 air-gapped override; falls back to image.registry
  # Issuer URL Astronomer seeds into dex_settings on first boot. When empty
  # we derive `${config.serverURL}/dex` automatically (see _helpers.tpl
  # astronomer.dex.issuerURL). Override only if Dex is reachable on a
  # different hostname than the rest of Astronomer.
  issuerURL: ""
  # Static OAuth client secret used by the Astronomer server when talking to
  # Dex. Empty = use the chart's shipped weak default which production-mode
  # preflight refuses. Replace with a freshly-generated value in production.
  clientSecret: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# =============================================================================
# Secrets — set these from --set-file or external secret manager in real usage.
# =============================================================================
secrets:
  secretKey: "local-dev-secret-key-change-in-production"
  # Fernet key (32 random bytes, url-safe base64). REQUIRED to be a real
  # Fernet key — Astronomer wraps SSO/agent secrets with it. Replace in any
  # production install (rotation reencrypts all wrapped values). Generate
  # with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryptionKey: "RX3rwYkQNmaSq4_UmGs7sPXONIjnB-M6q0gZtB79vQA="
  githubClientID: ""
  githubClientSecret: ""
  googleClientID: ""
  googleClientSecret: ""
  oidcClientID: ""
  oidcClientSecret: ""

# =============================================================================
# Bootstrap admin (Rancher-style)
# =============================================================================
# On a fresh install (empty users table) the server creates an "admin" user
# with a usable bootstrap password.
#
#  - bootstrap.password set to a non-empty string: server uses it as-is.
#  - bootstrap.password empty (default): the chart generates a random value
#    on first install (via `lookup` so it survives upgrades), persists it in
#    {fullname}-bootstrap, and the server reads it from
#    ASTRONOMER_BOOTSTRAP_PASSWORD.
#
# Retrieve the generated value:
#   kubectl -n <ns> get secret <release>-bootstrap \
#     -o jsonpath='{.data.password}' | base64 -d
# The bootstrap admin is not forced through a first-login reset. Rotate the
# password later through the profile/admin password-change flow if needed.
bootstrap:
  username: admin
  email: admin@astronomer.local
  password: ""
  # GitOps-safe escape hatch (F8 / C-04). Point this at a pre-created Secret
  # (in the release namespace) with a `password` key and the chart will NOT
  # manage a bootstrap Secret of its own — the server reads the password
  # straight from yours. Mirrors postgres.external.dsnSecretRef. Leave empty to
  # use bootstrap.password / the chart-generated <release>-bootstrap Secret.
  # In production the render fails unless bootstrap.password OR this is set.
  existingSecret: ""

# =============================================================================
# TLS — single source of truth, consumed by both gateway.* and ingress.*.
# Mirrors Rancher's ingress.tls.source model.
# =============================================================================
tls:
  # Mode selector:
  #   none        — no TLS (HTTP only). Fine for local dev.
  #   selfSigned  — cert-manager Issuer (SelfSigned) + Certificate. Auto-rotates.
  #                 Soft-requires cert-manager (see tls.requireCertManager).
  #                 Browsers will warn on the self-signed CA; OK for internal use.
  #   letsEncrypt — cert-manager ACME Issuer (HTTP-01) + Certificate.
  #                 Requires cert-manager + public DNS pointing at this install.
  #                 Set tls.letsEncrypt.email.
  #   secret      — BYO existing Secret named tls.secretName, with tls.crt + tls.key.
  source: none

  # Output Secret name. When source=secret, this is the EXISTING secret you
  # pre-created; otherwise cert-manager writes to this name. Defaults to
  # <fullname>-tls.
  secretName: ""

  # Tunables for the selfSigned path.
  selfSigned:
    duration: 2160h         # 90 days (cert-manager default)
    renewBefore: 360h       # 15 days
    commonName: ""          # default: first gateway/ingress host

  # Tunables for the letsEncrypt path.
  letsEncrypt:
    email: ""                  # required when source=letsEncrypt
    environment: production    # production | staging
    # Solver ingress class. Defaults to gateway.className when gateway is on,
    # otherwise ingress.className. Set explicitly when the ACME HTTP-01
    # solver should use a different class than the public listener.
    ingressClassName: ""

  # When true, fail helm install/upgrade if cert-manager CRDs are missing
  # and the selected mode needs them. Default true. Set to false if you
  # install cert-manager via Argo CD sync waves immediately before this chart.
  requireCertManager: true

  # Mount an additional CA bundle into the SERVER pod's trust store so the
  # server can talk to private-CA-signed upstreams (private registries,
  # internal IdPs, etc.). NOT used by the Gateway/Ingress listener.
  #
  # Create the Secret yourself with a single key `tls.crt` (PEM bundle —
  # may concatenate multiple CAs) and reference it here.
  additionalTrustedCAs:
    enabled: false
    existingSecret: ""

# =============================================================================
# Ingress (legacy networking.k8s.io path; prefer gateway: below)
# =============================================================================
ingress:
  enabled: false
  className: nginx
  host: astronomer.localtest.me
  path: /
  pathType: Prefix
  annotations: {}

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}
  # The management-cluster agent ClusterRole is an explicit allowlist (see
  # templates/serviceaccount.yaml) rather than an unconditional */*/* grant.
  # extraRules / extraNonResourceRules are ADDITIVE escape hatches so operators
  # can grant access to platform add-ons this chart does not ship, without
  # editing the template. Each entry is a standard RBAC PolicyRule.
  # Example:
  #   extraRules:
  #     - apiGroups: ["example.com"]
  #       resources: ["widgets"]
  #       verbs: ["get", "list", "watch"]
  extraRules: []
  extraNonResourceRules: []

# =============================================================================
# Pod-level scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# Gateway API (preferred — replaces the deprecated Ingress controller pattern)
# =============================================================================
gateway:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - astronomer.localtest.me

# =============================================================================
# Management-plane NetworkPolicies
# =============================================================================
networkPolicy:
  enabled: true
  # Render a namespace-level default deny that selects every pod in the
  # release namespace. Component policies below add back only the required
  # frontend/server/worker/Dex/Postgres/Redis flows.
  defaultDeny: true
  # Gateway/Ingress controllers often run outside the release namespace and
  # have no portable labels. Keep public listener ingress open by default, but
  # only on the frontend/server/Dex HTTP ports selected below.
  allowPublicIngress: true
  # Prometheus may run in a separate namespace. This keeps /metrics reachable
  # on the dedicated metrics ports without opening application ports.
  allowMetricsIngress: true
  # External dependencies and the Kubernetes API cannot be selected by pod
  # labels. externalEgressCIDRs is the legacy dev-friendly bucket and opens
  # HTTP(S), Postgres, Redis, and Kubernetes API ports to each CIDR. Production
  # installs should clear it and use the narrower CIDR buckets below.
  externalEgressCIDRs:
    - 0.0.0.0/0
  # Narrower external egress buckets. These compose with externalEgressCIDRs
  # and are intended for production installs with known dependency networks.
  externalHTTPSEgressCIDRs: []
  externalPostgresEgressCIDRs: []
  externalRedisEgressCIDRs: []
  # Cover both the kubernetes.default Service ClusterIP and the API endpoint or
  # node network. One scoped CIDR may cover both. NetworkPolicy may be evaluated
  # before or after Service DNAT depending on the CNI; Helm cannot inspect live
  # addresses to prove coverage. The policy allows only TCP 443/6443 here.
  kubernetesAPIEgressCIDRs: []
  identityProviderEgressCIDRs: []

# =============================================================================
# Metrics scraping
# =============================================================================
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    namespace: ""
    labels: {}
  # Default PrometheusRule with the alert set every astronomer install
  # benefits from. Auto-enabled when serviceMonitor.enabled=true since
  # there's no scraping → no alerting tradeoff to evaluate separately.
  # Turn off explicitly if you maintain your own central alert set.
  prometheusRule:
    enabled: true
    # Same labels you'd set on the ServiceMonitor; lets your Prometheus
    # Operator pick them up via the same selector. Example:
    #   labels: { release: kube-prometheus-stack }
    labels: {}
    # Annotation appended to every rule. Operators can override to point
    # at their own runbook tree. The default points at this repo's docs.
    runbookBaseURL: "https://github.com/alphabravo-oss/astronomer/blob/main/astronomer-go/docs/runbooks"
  # Grafana dashboards (T4.4). Ships ~6 curated dashboards as
  # ConfigMaps with the sidecar label kube-prometheus-stack uses to
  # auto-import them. Disabled by default so operators on a
  # non-Grafana stack don't get unused ConfigMaps cluttering the
  # namespace.
  dashboards:
    enabled: false
    # Label kube-prometheus-stack's grafana sidecar selects on. Set
    # to whatever your install uses; the chart default matches the
    # common bitnami / kube-prometheus-stack defaults.
    sidecarLabel: "grafana_dashboard"
    sidecarLabelValue: "1"
    # Folder annotation: tells the grafana sidecar which subfolder
    # to drop the dashboards into. Empty drops them at root.
    folderAnnotation: "Astronomer"

# =============================================================================
# Observability — distributed tracing (T15 FEATURES-051126)
# =============================================================================
# When tracing.endpoint is empty (the default), the server and worker
# install the W3C propagator but never start an OTLP exporter — no extra
# CPU, no egress, no traces. Set endpoint to an OTLP/HTTP collector to
# light it up. The same endpoint is shared by both processes; spans get
# linked into a single trace via traceparent propagation in asynq
# payloads (see internal/observability/asynq_correlation.go) and tunnel
# originator hand-offs.
observability:
  tracing:
    # Example: "http://otel-collector.observability.svc:4318" for an
    # in-cluster collector. Empty disables tracing.
    endpoint: ""
    # Force plain HTTP. Auto-detected from http:// prefix on endpoint;
    # only set explicitly when the scheme is otel-collector:4318 form.
    insecure: false
    # Comma-separated key=value list forwarded with every OTLP export.
    # Typical use: "Authorization=Bearer xyz" for hosted backends.
    headers: ""
    # Head sampler ratio in [0.0, 1.0]. Empty/zero defaults to 0.05.
    # Set to "1.0" while bootstrapping the trace pipeline so every
    # request appears; turn down once volume is acceptable.
    samplerRatio: ""

# =============================================================================
# Management-plane DR (pg_dump -> S3)
# =============================================================================
# Nightly logical backup of Astronomer's own Postgres database to S3-compatible
# object storage. The companion restore runbook lives at
# docs/management-plane-dr-runbook.md.
#
# Scope: backs up the management plane's source-of-truth DB (clusters, projects,
# RBAC, audit, monitoring config, ArgoCD instance records). Does NOT back up
# Redis — Redis is ephemeral asynq queue state that periodic re-evaluators
# rebuild after restore.
#
# On by default, but inert until the operator wires up an S3 bucket and an AWS
# credentials secret: the CronJob only renders once s3.credentialsSecretRef.name
# is set, so an unconfigured install produces no backup workload (and no false
# sense of safety). values-k3d.yaml opts dev out explicitly.
managementBackup:
  enabled: true
  # Daily at 03:00 UTC. Cron is interpreted in the kube-controller-manager's
  # local timezone (almost always UTC in cluster).
  schedule: "0 3 * * *"
  # How many succeeded / failed Jobs the CronJob retains before GC.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # Cap the time the controller is willing to wait to start a missed run.
  startingDeadlineSeconds: 600
  # Job-level knobs.
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  # Local scratch space for the dump file. Tune up for large DBs.
  scratchSizeLimit: 8Gi
  # Retention per tier. Daily is the rolling window; on Sundays the dump is
  # also copied into weekly/, on the 1st of the month into monthly/.
  retention:
    daily: 30
    weekly: 12
    monthly: 6
  s3:
    # Required when enabled=true.
    bucket: ""
    region: "us-east-1"
    # Key layout: <prefix>/<release>/{daily,weekly,monthly}/<ISO timestamp>.pgcustom
    prefix: "astronomer-pg"
    # Optional: non-AWS S3 (MinIO, Hetzner Object Storage, Wasabi, etc).
    # Example: https://fsn1.your-objectstorage.com
    endpoint: ""
    # AWS-CLI-style credentials file mounted into the Job. The Secret should
    # contain a key (default "credentials") whose value is:
    #
    #   [default]
    #   aws_access_key_id = AKIA...
    #   aws_secret_access_key = ...
    credentialsSecretRef:
      name: ""
      key: "credentials"
  # ---------------------------------------------------------------------------
  # F4 (HIGH · DR): back up the Fernet/JWT encryption-key Secret WITH the DB.
  # ---------------------------------------------------------------------------
  # pg_dump alone is not a recoverable backup: every encrypted column (agent
  # tokens, SSO client secrets, wrapped gitops/integration creds) is Fernet-
  # wrapped with secrets.encryptionKey, which lives in a Kubernetes Secret, NOT
  # in Postgres. Restore onto a NEW cluster without that key and every such row
  # is permanently undecryptable. This captures the key Secret alongside the
  # dump — but symmetrically ENCRYPTED with a SEPARATELY-held wrapping passphrase
  # first, so the key is never written to S3 in plaintext next to the data it
  # protects. Key custody steps: docs/management-plane-dr-runbook.md.
  encryptionKeyBackup:
    # Default on, but INERT until wrappingSecretRef.name is set (the chart
    # refuses to upload the key in plaintext). When unset a NOTES/preflight
    # warning fires so the DR gap is visible rather than silent.
    enabled: true
    # In-cluster Secret holding the Fernet + JWT keys. Empty => <release>-secrets
    # (the chart's own secret.yaml). Override only for BYO/external-secret setups.
    secretName: ""
    # Secret holding the wrapping passphrase used to encrypt the key bundle
    # before upload. HOLD THIS SEPARATELY from the S3 backup credentials and the
    # DB — ideally a different cloud account / KMS / offline vault. Whoever holds
    # only the S3 bucket must NOT also hold this, or the separation is moot.
    wrappingSecretRef:
      name: ""
      key: "passphrase"
    # S3 sub-tier (under <prefix>/<release>/) the wrapped key bundles land in.
    # Deliberately distinct from daily/weekly/monthly so key custody is separable.
    keyPrefix: "keys"
    # How many wrapped key bundles to retain. Keys rotate rarely, so keep a
    # generous history so an older dump can still be paired with its key.
    retention: 30
  # Image bundling postgresql-client + aws-cli. Built and published by
  # Astronomer at ghcr.io/alphabravocompany/pgdump-s3; override to an
  # internally mirrored image when air-gapped.
  image:
    repository: ghcr.io/alphabravocompany/pgdump-s3
    tag: "16-awscli"
    pullPolicy: IfNotPresent
    registry: ""    # T23 air-gapped override; falls back to image.registry
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Management-plane backup restore drill (FEATURES-051226 + NIST CP-9)
# =============================================================================
# Weekly automated proof that the nightly pg_dump is actually restorable.
# A separate CronJob:
#   1. Pulls the most recent backup from S3 (same bucket / prefix the
#      managementBackup CronJob writes to)
#   2. Restores it into an ephemeral sidecar Postgres in the SAME pod
#      (emptyDir, never touches anything persistent)
#   3. Runs schema-sanity + row-count checks against the restored DB
#   4. Records the outcome in the production `backup_drill_results`
#      table — the ONLY production write the drill ever does.
#
# Read-side: an admin endpoint (GET /api/v1/admin/backup-drill/) surfaces
# the latest result; PrometheusRule fires when no successful drill has
# happened in 14 days (AstronomerBackupRestoreDrillStale).
#
# On by default, but only renders when managementBackup is enabled AND
# credentials are wired (the template gates render-time on both), so it stays
# inert until backups are actually being written. values-k3d.yaml opts dev out.
managementRestoreDrill:
  enabled: true
  # 4 AM UTC every Monday. Far enough from the nightly backup (3 AM)
  # that they never overlap; weekly cadence is the audit minimum and
  # matches NIST CP-9's "periodic" requirement without burning the cluster
  # on it daily.
  schedule: "0 4 * * 1"
  # Standard Job/CronJob knobs — same shape as managementBackup.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  scratchSizeLimit: 8Gi
  # The drill enforces these two invariants against the restored DB.
  # Update expectedMinSchemaVersion in step with each release that ships
  # a migration — the drill will fail if the restored DB is below it,
  # signalling either backup corruption or a stale backup tier the
  # retention policy should be re-evaluating.
  expectedMinSchemaVersion: 125
  # Critical tables whose row count MUST be > 0 in the restored DB. If
  # one of these comes back empty, the most likely cause is a partial
  # backup (pg_dump aborted mid-flight) or a backup taken before the
  # table was populated. Override per-deployment if your install runs
  # without one of these (e.g. headless / non-multi-tenant).
  expectedTables:
    - users
    - clusters
    - projects
    - audit_log
  # ---------------------------------------------------------------------------
  # F4 (b): prove the backed-up encryption key actually DECRYPTS the restored
  # data. Without this the drill can stay green while real DR is broken (the key
  # was never backed up, or drifted from the ciphertext). The drill downloads
  # the latest wrapped key bundle (written by managementBackup.encryptionKeyBackup),
  # unwraps it with the SAME wrapping passphrase, and Fernet-verifies one known
  # encrypted column in the restored DB — failing the drill if it can't.
  decryptCheck:
    enabled: true
    # A known Fernet-encrypted column to sample. The default targets the row the
    # Argo self-management loop always writes, so a live install has one to test.
    table: "argocd_instances"
    column: "auth_token_encrypted"
    # The SAME wrapping-passphrase Secret managementBackup.encryptionKeyBackup
    # used to wrap the key bundle. Empty => the decrypt check is skipped (the
    # drill can't unwrap the key), and a warning is emitted. Set it to make the
    # drill actually prove decryptability.
    wrappingSecretRef:
      name: ""
      key: "passphrase"
    # Must match managementBackup.encryptionKeyBackup.keyPrefix.
    keyPrefix: "keys"
  # Image bundling postgresql-client + aws-cli — reuse the same image
  # as managementBackup so the drill can run wherever the backup runs.
  image:
    repository: ghcr.io/alphabravocompany/pgdump-s3
    tag: "16-awscli"
    pullPolicy: IfNotPresent
    registry: ""    # T23 air-gapped override; falls back to image.registry
  # The sidecar Postgres that the drill restores INTO. emptyDir-backed
  # and torn down with the pod; keep the image in lockstep with the
  # bundled postgres so a successful restore actually proves nothing
  # broke against the production Postgres version.
  sidecar:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
      registry: ""    # T23 air-gapped override; falls back to image.registry
    # Throwaway password used between the two containers inside the
    # Job pod only. Never exposed and never persisted.
    password: "drill-throwaway"
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Management-plane log forwarding (T03 FEATURES-051226)
# =============================================================================
# Ships the management plane's own logs (server, worker) to an external sink
# via a chart-side Fluent Bit DaemonSet. Distinct from the per-cluster
# logging reconciler in internal/handler/logging.go which is about MEMBER
# clusters; this is about the astronomer install itself.
#
# Off by default — opt-in per install. Operators that already run a node-
# level log collector (Fluent Bit, Vector, OpenTelemetry Collector) can
# leave this disabled and instead point that collector at the same Pod
# log files.
#
# When enabled=true the chart renders:
#   - ConfigMap with a Fluent Bit config that tails the server + worker
#     container logs under /var/log/containers/<release>-server-*.log /
#     /var/log/containers/<release>-worker-*.log
#   - DaemonSet running fluent/fluent-bit with hostPath access to
#     /var/log/containers and /var/log/pods
#   - ServiceAccount + ClusterRole + ClusterRoleBinding so the kubernetes
#     filter can enrich each line with pod labels/annotations
#
# Supported backends: loki | elasticsearch | splunk | http. Each renders a
# different OUTPUT stanza; see management-logging-configmap.yaml.
managementLogging:
  enabled: false
  # One of: loki | elasticsearch | splunk | http.
  backend: loki
  # Required when enabled=true. Backend-specific:
  #   - loki: http(s)://loki.observability.svc:3100
  #   - elasticsearch: https://es.observability.svc:9200
  #   - splunk: https://splunk-hec.observability.svc:8088
  #   - http: any HTTP(S) URL with a JSON body sink
  endpoint: ""
  # Drop level=DEBUG lines at the forwarder. The chart wires this via the
  # Fluent Bit grep filter; leave on by default to keep volumes manageable.
  excludeDebug: true
  # Which management-plane components to tail. Default is server + worker;
  # the agent is the member-cluster side and ships its own logs via the
  # logging reconciler — set includeAgent=true only if you want both
  # halves of the loop colocated.
  includeServer: true
  includeWorker: true
  includeAgent: false
  # Optional bearer-token auth applied to the OUTPUT stanza. The Secret
  # must already exist in the release namespace and contain the named
  # key. Empty name skips the auth lines.
  auth:
    bearerSecretRef:
      name: ""
      key: "token"
  # Backend-specific knobs. Only the section matching .backend is read at
  # render time; the others are ignored.
  loki:
    # Optional tenant identifier — Loki uses this as the X-Scope-OrgID
    # header. Empty disables multi-tenancy.
    tenantID: ""
  elasticsearch:
    # Index template applied to every record. Fluent Bit's es output
    # accepts both static names and Logstash-style date suffixes via
    # Logstash_Format On + Logstash_Prefix.
    index: "astronomer"
    logstashFormat: true
    logstashPrefix: "astronomer"
  splunk:
    # HEC token Splunk requires for ingest. Wire the same Secret as
    # auth.bearerSecretRef and Fluent Bit will use it as the
    # Splunk_Token. Empty falls back to the bearer-secret value.
    hecTokenSecretRef:
      name: ""
      key: "hec_token"
    # Splunk index to write to. Empty uses the HEC token's default.
    index: ""
  http:
    # Pass through to the HTTP output's format key. "json_lines" matches
    # most generic ingest endpoints; "json" produces a single JSON array
    # per flush.
    format: "json_lines"
  image:
    # Default to the upstream fluent-bit image. Override to a mirrored
    # registry in air-gapped installs via .registry or the chart-wide
    # image.registry prefix (T23).
    repository: fluent/fluent-bit
    tag: "3.2.4"
    pullPolicy: IfNotPresent
    registry: ""    # T23 air-gapped override; falls back to image.registry
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Standard DaemonSet scheduling knobs. nodeSelector pins the daemon to
  # specific nodes (e.g. linux only); tolerations let it run on tainted
  # nodes (e.g. the control-plane). Default tolerations are empty so the
  # daemon lands on worker nodes only.
  nodeSelector: {}
  tolerations: []
  # The handler exposes GET /api/v1/admin/management-logs/?component=...
  # for the operator UI. Cap how many lines a single request can return
  # to keep payloads bounded; the chart-side Fluent Bit pipeline is the
  # durable long-term path.
  handler:
    maxLines: 1000
    maxBytes: 1048576    # 1 MiB

# =============================================================================
# CRD-mirror management API
# =============================================================================
# When `crds.enabled=true`, the chart installs the management.astronomer.io
# v1alpha1 CustomResourceDefinitions and the server pod runs the embedded
# controller manager. Cluster/Project reconcile to Postgres; ClusterBaseline,
# ComponentBundle, AgentProfile, and GitOpsTarget validate status and provide
# the Kubernetes-facing desired-state API for Argo/agent follow-up controllers.
# See docs/crd-api.md.
#
# This is an opt-in feature: defaults to off so existing installs see no
# change. The REST API is unaffected when the flag is on — both surfaces
# eventually-converge to the same row.
crds:
  enabled: false
  # Namespace the controller watches. The chart-shipped manifests assume
  # `astronomer-mgmt`; operators can override per-environment if needed.
  # The namespace itself is NOT created by the chart — operators install
  # the CRD into an existing namespace they own.
  watchNamespace: astronomer-mgmt
  # Namespace containing the bundled astro-argocd subchart (the release
  # namespace). GitOpsTarget materialization writes ApplicationSets here and the
  # NetworkPolicy scopes ArgoCD<->server traffic to it.
  argoNamespace: astronomer

# =============================================================================
# In-browser kubectl shell (migration 065 / sprint 17)
# =============================================================================
# When `kubectlShell.enabled=true`, operators with clusters:update on a
# managed cluster see an "Open Shell" affordance on the cluster-detail
# page. Clicking it spins up an ephemeral debug pod in kube-system,
# binds it to a short-lived ServiceAccount whose RBAC mirrors the
# operator's effective verbs, and streams kubectl exec stdin/stdout into
# an xterm.js terminal. See docs/kubectl-shell.md for the full story.
#
# Disabled by default — the feature creates one row per opened session
# plus one row per recorded command line, so operators flip it on once
# their audit-log retention is sized for the additional volume.
kubectlShell:
  enabled: false
  # Image the debug pod runs. astronomer-shell is built from
  # deploy/docker/Dockerfile.shell and ships kubectl (pinned to the
  # supported control-plane skew, fetched from dl.k8s.io), bash,
  # coreutils, curl, jq, and tini — enough for an interactive debug
  # session without dragging in a third-party image whose tag could
  # be retagged or disappear (see the Aug 2025 bitnami/kubectl 404).
  # Empty => derive from preflight.image (registry-aware: GHCR online, mirror in
  # air-gap). Set explicitly only to pin a different shell image.
  image: ""
  # Idle expiry — if no input bytes hit the WS for this long, the
  # reaper closes the session and deletes the pod.
  idleTimeoutMinutes: 30
  # Hard cap — the session unconditionally closes at this many hours
  # since open, even if the operator is still actively typing.
  sessionHardCapHours: 4

# =============================================================================
# argo-cd subchart (bundled). Deploys ArgoCD as "astro-argocd" in the release
# namespace. Astronomer's server self-manages through it and uses it to apply
# baseline ApplicationSets to managed clusters. Disable to bring your own.
# =============================================================================
argo-cd:
  enabled: true
  # All resources become astro-argocd-* (server, application-controller, etc.).
  fullnameOverride: astro-argocd
  dex:
    enabled: false
  redis-ha:
    enabled: false
  controller:
    replicas: 1
  applicationSet:
    enabled: true
  configs:
    params:
      # Astronomer reverse-proxies /argocd/* after its own auth; ArgoCD runs
      # insecure behind that and emits its SPA under /argocd.
      server.insecure: true
      server.rootpath: /argocd
      server.basehref: /argocd
    cm:
      # Account Astronomer's self-management authenticates as.
      accounts.astronomer: apiKey, login
    rbac:
      policy.csv: |
        g, astronomer, role:admin
      policy.default: role:readonly
