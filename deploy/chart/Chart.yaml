apiVersion: v2
name: astronomer
description: Astronomer Go management plane (server + worker + dependencies)
type: application
version: 0.2.0
appVersion: "0.2.0"
kubeVersion: ">=1.25.0-0"
home: https://astronomer.io
sources:
  - https://github.com/alphabravocompany/astronomer-go
maintainers:
  - name: Astronomer Team
    email: team@astronomer.io
keywords:
  - kubernetes
  - multi-cluster
  - management
  - golang
dependencies:
  # ArgoCD is required for provisioning (GitOps apply to managed clusters) and
  # for Astronomer's self-management. Bundled as a subchart so a single
  # `helm install astronomer` brings it up in the astronomer namespace, named
  # astro-argocd (see values.yaml argo-cd.fullnameOverride).
  - name: argo-cd
    version: "9.5.21"
    repository: https://argoproj.github.io/argo-helm
    condition: argo-cd.enabled
