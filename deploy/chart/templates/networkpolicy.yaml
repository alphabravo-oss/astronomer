{{- if .Values.dex.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-dex
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "dex") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "dex") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowPublicIngress }}
    - ports:
        - protocol: TCP
          port: 5556
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5556
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- range $cidr := $externalCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 389
        - protocol: TCP
          port: 636
    {{- end }}
{{- end }}
{{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-postgres
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
  egress: []
{{- end }}
{{- if eq (include "astronomer.redisBundledEnabled" .) "true" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
