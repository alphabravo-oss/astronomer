{{- if .Values.networkPolicy.enabled }}
{{- $externalCIDRs := .Values.networkPolicy.externalEgressCIDRs | default (list) -}}
{{- $externalHTTPSEgressCIDRs := .Values.networkPolicy.externalHTTPSEgressCIDRs | default (list) -}}
{{- $externalPostgresEgressCIDRs := .Values.networkPolicy.externalPostgresEgressCIDRs | default (list) -}}
{{- $externalRedisEgressCIDRs := .Values.networkPolicy.externalRedisEgressCIDRs | default (list) -}}
{{- $kubernetesAPIEgressCIDRs := .Values.networkPolicy.kubernetesAPIEgressCIDRs | default (list) -}}
{{- $identityProviderEgressCIDRs := .Values.networkPolicy.identityProviderEgressCIDRs | default (list) -}}
{{- if .Values.networkPolicy.defaultDeny }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-default-deny
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  # Exclude the bundled astro-argocd subchart pods. ArgoCD is trusted
  # control-plane infra (needs the k8s API, DNS, git/OCI repos, intra-argo),
  # and its pre-install/pre-upgrade hooks (e.g. redis-secret-init) run BEFORE
  # any allow-policy could be applied — so on upgrade a prior default-deny would
  # block them and stall the release. Stock ArgoCD ships no NetworkPolicies;
  # leaving its pods unselected here matches that and keeps installs hands-off.
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/part-of
        operator: NotIn
        values: ["argocd"]
  policyTypes:
    - Ingress
    - Egress
---
{{- end }}
{{- if .Values.frontend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-frontend
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "frontend") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowPublicIngress }}
    - ports:
        - protocol: TCP
          port: 3000
    {{- end }}
  # The frontend is a static SPA container (nginx): the browser talks to the
  # server through the gateway/ingress, never pod-to-pod, so no egress beyond
  # DNS is needed.
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-server
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowPublicIngress }}
    - ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- if .Values.networkPolicy.allowMetricsIngress }}
    - ports:
        - protocol: TCP
          port: 9090
    {{- end }}
    # Internal ArgoCD->cluster proxy (port 8090). This listener is NOT
    # token-gated (ArgoCD's apply path is anonymous), so its only authentication
    # is this network isolation: only ArgoCD's own pods may reach it. The
    # application-controller performs cluster syncs; argocd-server connects here
    # to validate a cluster's reachability when it is registered (cluster upsert),
    # so both must be allowed or registration hangs. The public ingress never maps 8090.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.crds.argoNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-application-controller
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.crds.argoNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
    {{- if eq (include "astronomer.redisBundledEnabled" .) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "redis") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.redis.port }}
    {{- end }}
    {{- if .Values.dex.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "dex") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5556
    {{- end }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.crds.argoNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    {{- range $cidr := $externalCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6443
    {{- end }}
    {{- range $cidr := $externalHTTPSEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range $cidr := $externalPostgresEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
    {{- range $cidr := $externalRedisEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.redis.port }}
    {{- end }}
    {{- range $cidr := $kubernetesAPIEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-worker
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowMetricsIngress }}
    - ports:
        - protocol: TCP
          port: 9090
    {{- end }}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
    {{- if eq (include "astronomer.redisBundledEnabled" .) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "redis") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.redis.port }}
    {{- end }}
    # The argocd auto-register worker task calls the built-in ArgoCD API server
    # to register connected clusters (so baseline ApplicationSets can provision
    # them). Calico evaluates egress against the Service port (pre-DNAT), not the
    # backend pod's 8080, so allow the Service's 80/443 as well as 8080 — matching
    # the server netpol. External ArgoCD instances are reached via the 80/443
    # external-CIDR egress below.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.crds.argoNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    {{- range $cidr := $externalCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6443
    {{- end }}
    {{- range $cidr := $externalHTTPSEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range $cidr := $externalPostgresEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
    {{- range $cidr := $externalRedisEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.redis.port }}
    {{- end }}
    {{- range $cidr := $kubernetesAPIEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
{{- if .Values.dex.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-dex
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "dex") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "dex") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowPublicIngress }}
    - ports:
        - protocol: TCP
          port: 5556
    {{- end }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5556
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- range $cidr := $externalCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 389
        - protocol: TCP
          port: 636
    {{- end }}
    {{- range $cidr := $externalHTTPSEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range $cidr := $identityProviderEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: 389
        - protocol: TCP
          port: 636
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
{{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-postgres
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 14 }}
        # The migrate Job (post-install/upgrade hook) connects to apply schema
        # migrations — without this it's blocked by default-deny and the install
        # stalls in Init forever.
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "migrate") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
  egress: []
{{- end }}
{{- if eq (include "astronomer.redisBundledEnabled" .) "true" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-redis
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "redis") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
  egress: []
{{- end }}
{{- if .Values.migrate.enabled }}
---
# The migrate Job needs DNS (to resolve postgres) plus egress to postgres.
# It's caught by default-deny like every other astronomer component, so without
# its own allow-policy DNS is dropped and the init wait hangs on "bad address".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "astronomer.fullname" . }}-migrate
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "migrate") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "migrate") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
    {{- range $cidr := $externalPostgresEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ $cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.postgres.port }}
    {{- end }}
{{- end }}
{{- end }}
