{{- /*
DEX-01 compatibility tombstone.

For one release the old object remains, but its data is intentionally
non-sensitive. Applying this manifest scrubs legacy config.yaml data while the
Deployment switches to the retained, dynamically reconciled runtime Secret.
*/ -}}
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astronomer.fullname" . }}-dex-config
  annotations:
    # Argo waits for the Secret-backed Deployment wave before scrubbing the
    # one-release compatibility ConfigMap.
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "dex") | nindent 4 }}
data:
  migration-notice: "Dex runtime configuration moved to a retained Secret; this ConfigMap contains no credentials."
{{- end }}
