{{- /*
Dex bootstrap ConfigMap.

This is the seed config that boots an empty Dex. As soon as the operator
adds a connector through the Astronomer UI and clicks Apply, the
DexHandler.Apply() flow re-renders this ConfigMap with the full connector
set and triggers a rollout of the Deployment below — see
internal/handler/dex_config.go for the apply path.

The static "astronomer" client matches the public_clients shape the
DexHandler writes into dex_settings on first boot (see
internal/server/dex_bootstrap.go). Operators MUST override
.Values.dex.clientSecret in any production install — the default value
is shipped intentionally weak so a misconfigured production cluster
fails closed against the chart's known string.
*/ -}}
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astronomer.fullname" . }}-dex-config
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "dex") | nindent 4 }}
data:
  config.yaml: |
    issuer: {{ include "astronomer.dex.issuerURL" . | quote }}
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    oauth2:
      skipApprovalScreen: true
    connectors: []
    staticClients:
      - id: astronomer
        name: Astronomer
        redirectURIs:
          - {{ printf "%s/api/v1/auth/callback/dex" (default "http://astronomer.localtest.me" .Values.config.serverURL) | quote }}
          - {{ printf "%s/api/v1/auth/callback/dex/" (default "http://astronomer.localtest.me" .Values.config.serverURL) | quote }}
        {{- if .Values.dex.clientSecretRef.name }}
        secretEnv: ASTRONOMER_DEX_CLIENT_SECRET
        {{- else }}
        secret: {{ .Values.dex.clientSecret | default "astronomer-dex-secret" | quote }}
        {{- end }}
{{- end }}
