{{- if .Values.crds.enabled }}
# CRD-mirror API — Project.management.astronomer.io/v1alpha1.
#
# Mirrors the per-project subset of the `projects` table. Cluster binding is
# expressed via `.spec.clusters` (a list of cluster names); only the first
# entry is honoured today because projects.cluster_id is single-valued. The
# remaining entries are echoed onto status.observedClusters for visibility.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    # Keep on uninstall — same rationale as the cluster CRD.
    "helm.sh/resource-policy": keep
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: projects
    singular: project
    kind: Project
    listKind: ProjectList
    shortNames:
      - astroproject
    categories:
      - astronomer
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - clusters
              properties:
                name:
                  type: string
                  pattern: '^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$'
                displayName:
                  type: string
                description:
                  type: string
                podSecurityProfile:
                  type: string
                  enum:
                    - privileged
                    - baseline
                    - restricted
                resourceQuota:
                  type: object
                  properties:
                    cpuLimit:
                      type: string
                    memoryLimit:
                      type: string
                    podCount:
                      type: integer
                      minimum: 0
                networkPolicyMode:
                  type: string
                  enum:
                    - none
                    - open
                    - isolated
                clusters:
                  type: array
                  minItems: 1
                  items:
                    type: string
            status:
              type: object
              properties:
                projectId:
                  type: string
                phase:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
                resolvedClusterId:
                  type: string
                observedClusters:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .status.resolvedClusterId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
