{{- if .Values.crds.enabled }}
# ComponentBundle.management.astronomer.io/v1alpha1
#
# Reusable catalog entry for a baseline or application component. Secret
# material must be referenced by name and must not be embedded in spec.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: componentbundles.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    management.astronomer.io/finalizer: management.astronomer.io/componentbundle-cleanup
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: componentbundles
    singular: componentbundle
    kind: ComponentBundle
    listKind: ComponentBundleList
    shortNames:
      - astrobundle
    categories:
      - astronomer
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - version
                - source
              properties:
                version:
                  type: string
                description:
                  type: string
                defaultNamespace:
                  type: string
                source:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum:
                        - helm
                        - kustomize
                        - git-path
                        - raw
                    repoURL:
                      type: string
                    path:
                      type: string
                    chart:
                      type: string
                    targetRevision:
                      type: string
                    valuesSchemaRef:
                      type: string
                    secretRefs:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                          key:
                            type: string
                healthChecks:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        enum:
                          - argocd
                          - http
                          - kubernetes
                          - prometheus
                      path:
                        type: string
                      timeout:
                        type: string
                capabilityRequirements:
                  type: array
                  items:
                    type: object
                    required:
                      - feature
                    properties:
                      feature:
                        type: string
                      reason:
                        type: string
                upgradePolicy:
                  type: object
                  properties:
                    strategy:
                      type: string
                      enum:
                        - rolling
                        - canary
                        - replace
                    maxUnavailable:
                      type: integer
                      minimum: 0
                versions:
                  type: array
                  items:
                    type: object
                    required:
                      - version
                      - source
                    properties:
                      version:
                        type: string
                      description:
                        type: string
                      defaultNamespace:
                        type: string
                      source:
                        type: object
                        required:
                          - type
                        properties:
                          type:
                            type: string
                            enum:
                              - helm
                              - kustomize
                              - git-path
                              - raw
                          repoURL:
                            type: string
                          path:
                            type: string
                          chart:
                            type: string
                          targetRevision:
                            type: string
                          valuesSchemaRef:
                            type: string
                          secretRefs:
                            type: array
                            items:
                              type: object
                              required:
                                - name
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
                                key:
                                  type: string
                      healthChecks:
                        type: array
                        items:
                          type: object
                          required:
                            - type
                          properties:
                            type:
                              type: string
                              enum:
                                - argocd
                                - http
                                - kubernetes
                                - prometheus
                            path:
                              type: string
                            timeout:
                              type: string
                      capabilityRequirements:
                        type: array
                        items:
                          type: object
                          required:
                            - feature
                          properties:
                            feature:
                              type: string
                            reason:
                              type: string
                      upgradePolicy:
                        type: object
                        properties:
                          strategy:
                            type: string
                            enum:
                              - rolling
                              - canary
                              - replace
                          maxUnavailable:
                            type: integer
                            minimum: 0
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Valid
                    - Invalid
                    - Deprecated
                lastReconciled:
                  type: string
                  format: date-time
                resolvedRevision:
                  type: string
                availableVersions:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Source
          type: string
          jsonPath: .spec.source.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
