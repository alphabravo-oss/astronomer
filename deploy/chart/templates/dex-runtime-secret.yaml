{{- /*
DEX-01 retained runtime Secret identity.

This manifest intentionally has no data or stringData field. Helm/Argo owns
only identity, retention metadata, and ownership labels; DexHandler owns the
data field through an exact-name merge patch. Omitting data is essential:
three-way/SSA upgrades preserve fields introduced by the runtime field manager
instead of reconciling credentials back into Git or chart values.
*/ -}}
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-dex-runtime" (include "astronomer.fullname" .)) .Values.dex.runtimeSecretName | quote }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "dex-runtime") | nindent 4 }}
    astronomer.io/runtime-writer: dex-handler
    astronomer.io/secret-purpose: dex-runtime
    astronomer.io/backup-reconstruction: encrypted-management-db
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
{{- end }}
