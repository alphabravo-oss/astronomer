{{- if .Values.crds.enabled }}
# ClusterBaseline.management.astronomer.io/v1alpha1
#
# Declarative baseline intent for Argo-managed components on adopted clusters.
# The controller owns status and finalizer cleanup; Argo CD owns the rendered
# Application/ApplicationSet deployment state.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterbaselines.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    management.astronomer.io/finalizer: management.astronomer.io/clusterbaseline-cleanup
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: clusterbaselines
    singular: clusterbaseline
    kind: ClusterBaseline
    listKind: ClusterBaselineList
    shortNames:
      - astrobaseline
    categories:
      - astronomer
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                profileName:
                  type: string
                clusterSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    clusterRefs:
                      type: array
                      items:
                        type: string
                bundles:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                      enabled:
                        type: boolean
                      values:
                        type: object
                        additionalProperties:
                          type: string
                      valuesFrom:
                        type: array
                        items:
                          type: object
                          required:
                            - type
                          properties:
                            type:
                              type: string
                              enum:
                                - git
                                - secret
                                - configMap
                            path:
                              type: string
                            name:
                              type: string
                            key:
                              type: string
                            optional:
                              type: boolean
                syncPolicy:
                  type: object
                  properties:
                    automated:
                      type: boolean
                    prune:
                      type: boolean
                    selfHeal:
                      type: boolean
                suspended:
                  type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Reconciling
                    - Ready
                    - Degraded
                    - Suspended
                lastReconciled:
                  type: string
                  format: date-time
                targetedClusters:
                  type: array
                  items:
                    type: string
                applications:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      syncStatus:
                        type: string
                      health:
                        type: string
                      applicationCount:
                        type: integer
                        format: int32
                      childApplications:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                            syncStatus:
                              type: string
                            health:
                              type: string
                            revision:
                              type: string
                            operationPhase:
                              type: string
                            message:
                              type: string
                            resources:
                              type: array
                              items:
                                type: object
                                properties:
                                  group:
                                    type: string
                                  kind:
                                    type: string
                                  namespace:
                                    type: string
                                  name:
                                    type: string
                                  status:
                                    type: string
                                  health:
                                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: FirstBundle
          type: string
          jsonPath: .spec.bundles[0].name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
