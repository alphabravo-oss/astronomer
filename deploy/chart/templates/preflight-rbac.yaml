{{- if .Values.preflight.enabled }}
{{- /*
  Dedicated SA + RBAC for the preflight hook Job. These MUST be created
  before the Job (hook-weight -5) so the pod can schedule and run its
  `kubectl get crd/gatewayclass/secret/pvc` checks. The main "astronomer" SA
  is a regular release resource that doesn't exist at pre-install-hook
  time, so on a *fresh* install the Job would deadlock with
  "serviceaccount not found" (it only worked on upgrades, where the main
  SA already existed). Hook-weight -10 orders these ahead of the Job.
  These prerequisite hooks intentionally remain after a successful Job.
  Helm considers ServiceAccount/RBAC hooks successful immediately after
  creation, so `hook-succeeded` would delete them before the later-weighted
  Job can start. `before-hook-creation` replaces them with the current chart
  rules before every install/upgrade without widening their permissions.
*/}}
{{- $name := printf "%s-preflight" (include "astronomer.serviceAccountName" .) }}
{{- $tlsSrc := include "astronomer.tls.source" . }}
{{- $certManagerRequired := and (or (eq $tlsSrc "selfSigned") (eq $tlsSrc "letsEncrypt")) .Values.tls.requireCertManager }}
{{- $crdNames := list }}
{{- if .Values.gateway.enabled }}
  {{- $crdNames = append $crdNames "gateways.gateway.networking.k8s.io" }}
  {{- $crdNames = append $crdNames "httproutes.gateway.networking.k8s.io" }}
{{- end }}
{{- if $certManagerRequired }}
  {{- $crdNames = append $crdNames "issuers.cert-manager.io" }}
  {{- $crdNames = append $crdNames "certificates.cert-manager.io" }}
{{- end }}
{{- $secretNames := list }}
{{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
  {{- $secretNames = append $secretNames .Values.tls.additionalTrustedCAs.existingSecret }}
{{- end }}
{{- if and (eq (default "" .Values.config.env) "production") .Values.postgres.external.dsnSecretRef.name }}
  {{- if not (has .Values.postgres.external.dsnSecretRef.name $secretNames) }}
    {{- $secretNames = append $secretNames .Values.postgres.external.dsnSecretRef.name }}
  {{- end }}
{{- end }}
{{- if and .Values.dex.enabled (or .Values.dex.migration.requirePreparedConfig (eq .Values.dex.migration.phase "cutover")) }}
  {{- $dexRuntimeSecret := default (printf "%s-dex-runtime" (include "astronomer.fullname" .)) .Values.dex.runtimeSecretName }}
  {{- if not (has $dexRuntimeSecret $secretNames) }}
    {{- $secretNames = append $secretNames $dexRuntimeSecret }}
  {{- end }}
{{- end }}
{{- $configMapNames := list }}
{{- if and .Values.dex.enabled (eq .Values.dex.migration.phase "fresh") }}
  {{- $configMapNames = append $configMapNames (printf "%s-dex-config" (include "astronomer.fullname" .)) }}
{{- else if and .Values.dex.enabled (eq .Values.dex.migration.phase "cutover") }}
  {{- $configMapNames = append $configMapNames (printf "%s-dex-config-retained" (include "astronomer.fullname" .)) }}
{{- end }}
{{- $externalPostgres := eq (include "astronomer.postgresBundledEnabled" .) "false" }}
{{- $legacyPVC := printf "data-%s-postgres-0" (include "astronomer.fullname" .) }}
{{- $hookAnnotations := dict
      "helm.sh/hook" "pre-install,pre-upgrade"
      "helm.sh/hook-weight" "-10"
      "helm.sh/hook-delete-policy" "before-hook-creation" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
{{- with .Values.image.pullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
{{- if or (gt (len $crdNames) 0) .Values.gateway.enabled }}
rules:
  # Gateway API and cert-manager CRD presence checks.
  {{- if gt (len $crdNames) 0 }}
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames:
      {{- toYaml $crdNames | nindent 6 }}
    verbs: ["get"]
  {{- end }}
  # GatewayClass presence check (gateway.enabled).
  {{- if .Values.gateway.enabled }}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses"]
    resourceNames: [{{ .Values.gateway.className | quote }}]
    verbs: ["get"]
  {{- end }}
{{- else }}
rules: []
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
{{- if or (gt (len $secretNames) 0) $externalPostgres (gt (len $configMapNames) 0) }}
rules:
  # additionalTrustedCAs / external-DSN secret presence checks.
{{- if gt (len $secretNames) 0 }}
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml $secretNames | nindent 6 }}
    verbs: ["get"]
  {{- end }}
  # Legacy bundled-Postgres PVC guard when external Postgres is selected.
  {{- if $externalPostgres }}
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    resourceNames: [{{ $legacyPVC | quote }}]
    verbs: ["get"]
  {{- end }}
{{- if gt (len $configMapNames) 0 }}
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      {{- toYaml $configMapNames | nindent 6 }}
    verbs: ["get"]
{{- end }}
{{- else }}
rules: []
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
