{{- if .Values.preflight.enabled }}
{{- /*
  Dedicated SA + RBAC for the preflight hook Job. These MUST be created
  before the Job (hook-weight -5) so the pod can schedule and run its
  `kubectl get crd/gatewayclass/secret` checks. The main "astronomer" SA
  is a regular release resource that doesn't exist at pre-install-hook
  time, so on a *fresh* install the Job would deadlock with
  "serviceaccount not found" (it only worked on upgrades, where the main
  SA already existed). Hook-weight -10 orders these ahead of the Job.
  hook-succeeded delete-policy keeps the cluster clean after a pass.
*/}}
{{- $name := printf "%s-preflight" (include "astronomer.serviceAccountName" .) }}
{{- $hookAnnotations := dict
      "helm.sh/hook" "pre-install,pre-upgrade"
      "helm.sh/hook-weight" "-10"
      "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
{{- with .Values.image.pullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
rules:
  # Gateway API + cert-manager + argo CRD presence checks.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
  # GatewayClass presence check (gateway.enabled).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
rules:
  # additionalTrustedCAs / external-DSN secret presence checks.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    {{- toYaml $hookAnnotations | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
