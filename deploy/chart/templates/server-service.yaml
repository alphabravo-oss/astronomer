apiVersion: v1
kind: Service
metadata:
  name: {{ include "astronomer.fullname" . }}-server
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
    # Authenticated internal ArgoCD->cluster proxy port (not exposed via
    # ingress; NetworkPolicy also restricts it to the ArgoCD namespace).
    - name: argocd-proxy
      port: 8090
      targetPort: argocd-proxy
      protocol: TCP
  selector:
    {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 4 }}
