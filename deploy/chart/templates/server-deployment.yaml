apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astronomer.fullname" . }}-server
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 8 }}
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z {{ include "astronomer.fullname" . }}-postgres 5432; do sleep 1; done
              echo "postgres up"
        - name: migrate
          image: {{ include "astronomer.image" (dict "context" . "component" "migrate") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "astronomer.fullname" . }}-config
                  key: DATABASE_URL
      containers:
        - name: server
          image: {{ include "astronomer.image" (dict "context" . "component" "server") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "astronomer.fullname" . }}-config
            - secretRef:
                name: {{ include "astronomer.fullname" . }}-secrets
          {{- with .Values.server.env }}
          env:
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.server.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
