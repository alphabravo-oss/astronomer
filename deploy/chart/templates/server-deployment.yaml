apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astronomer.fullname" . }}-server
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  strategy:
    {{- toYaml .Values.server.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 8 }}
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # FEATURES-051126 T14: graceful WS handover on rolling upgrades.
      # The preStop hook below sleeps 10s so the Service load balancer
      # has time to deregister this pod before SIGTERM lands. Combined
      # with Hub.Drain() in the server's Shutdown path, agents observe
      # a clean WS close and reconnect via the LB to a healthy sibling
      # in ~1s instead of waiting 20s for the next WS ping to fail.
      terminationGracePeriodSeconds: {{ default 60 .Values.server.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
        - name: wait-postgres
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.thirdPartyImage" (dict "repository" .Values.utilities.busybox.repository "tag" .Values.utilities.busybox.tag "registry" .Values.utilities.busybox.registry "fallback" .Values.image.registry) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z {{ include "astronomer.fullname" . }}-postgres 5432; do sleep 1; done
              echo "postgres up"
        {{- end }}
        - name: migrate
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.image" (dict "context" . "component" "migrate") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            {{- if .Values.postgres.external.dsnSecretRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                  key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "astronomer.fullname" . }}-config
                  key: DATABASE_URL
            {{- end }}
      containers:
        - name: server
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.image" (dict "context" . "component" "server") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            # Network-isolated ArgoCD->cluster proxy. Never mapped by the public
            # ingress; the NetworkPolicy restricts it to the argocd namespace.
            - name: argocd-proxy
              containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "astronomer.fullname" . }}-config
            - secretRef:
                name: {{ include "astronomer.fullname" . }}-secrets
          env:
            # Pod IP is the address sibling replicas use to reverse-proxy
            # tunnel-bound requests (kubectl shell, k8s passthrough, image
            # scans) to whichever pod holds the agent's WebSocket. Without
            # this the nginx-pinned upstream pod 503s every cross-pod
            # request because the in-memory hub is single-replica.
            - name: ASTRONOMER_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # L19: lets the server self-check that a multi-replica deployment has
            # ASTRONOMER_POD_IP set (else the cross-pod tunnel locator silently
            # disables and non-owning replicas 503). Readiness fails loudly if not.
            - name: SERVER_REPLICAS
              value: {{ .Values.server.replicaCount | quote }}
            - name: ASTRONOMER_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "astronomer.fullname" . }}-bootstrap
                  key: password
            - name: ASTRONOMER_BOOTSTRAP_USERNAME
              value: {{ .Values.bootstrap.username | quote }}
            - name: ASTRONOMER_BOOTSTRAP_EMAIL
              value: {{ .Values.bootstrap.email | quote }}
            {{- if .Values.postgres.external.dsnSecretRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                  key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
            {{- end }}
            {{- if .Values.redis.external.passwordSecretRef.name }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.passwordSecretRef.name | quote }}
                  key: {{ .Values.redis.external.passwordSecretRef.key | quote }}
            {{- end }}
            {{- if .Values.redis.external.address }}
            - name: REDIS_URL
              value: {{ include "astronomer.redisURL" . | quote }}
            {{- end }}
            {{- with .Values.server.env }}
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.crds.enabled }}
            # CRD-mirror controller toggle. The server reads CRD_ENABLED on
            # boot and only launches the controller-runtime manager when set
            # to a truthy value. CRD_WATCH_NAMESPACE scopes the informer cache
            # so the controller doesn't list/watch CRs the operator never
            # intended to expose to it.
            - name: CRD_ENABLED
              value: "true"
            - name: CRD_WATCH_NAMESPACE
              value: {{ .Values.crds.watchNamespace | quote }}
            - name: CRD_ARGO_NAMESPACE
              value: {{ .Values.crds.argoNamespace | quote }}
            {{- end }}
            {{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
            # Go's crypto/x509 scans SSL_CERT_DIR in addition to the system
            # cert pool, so putting the operator-supplied CA bundle on this
            # path is enough for outbound TLS (registries, OIDC/SAML IdPs,
            # private chart repos) to trust private CAs.
            - name: SSL_CERT_DIR
              value: /etc/ssl/certs:/astronomer/trust/extra
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: false
            {{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
            - name: tls-ca-additional
              mountPath: /astronomer/trust/extra
              readOnly: true
            {{- end }}
          {{- if .Values.server.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          # FEATURES-051126 T14: pre-stop drain. The kubelet runs this
          # BEFORE delivering SIGTERM. Sleeping here gives the Service
          # load balancer time to remove the pod from endpoints (kube-
          # proxy iptables rules update on watch, typically <2s, but we
          # budget more for slow CNIs / userspace LBs). When SIGTERM
          # arrives the server's Shutdown() drains the tunnel hub so
          # agents reconnect to a sibling that's already taking traffic.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep {{ default 10 .Values.server.preStopSleepSeconds }}"
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
        {{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
        - name: tls-ca-additional
          secret:
            secretName: {{ .Values.tls.additionalTrustedCAs.existingSecret | quote }}
            items:
              - key: tls.crt
                path: ca-additional.pem
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if .Values.server.affinity.enabled }}
      affinity:
        {{- include "astronomer.componentAffinity" (dict "context" . "component" "server" "enabled" .Values.server.affinity.enabled) | nindent 8 }}
      {{- end }}
      {{- if .Values.server.topologySpread.enabled }}
      topologySpreadConstraints:
        {{- include "astronomer.componentTopologySpread" (dict "context" . "component" "server" "enabled" .Values.server.topologySpread.enabled "maxSkew" .Values.server.topologySpread.maxSkew "whenUnsatisfiable" .Values.server.topologySpread.whenUnsatisfiable) | nindent 8 }}
      {{- end }}
