{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    # Long-lived deployments consume this ServiceAccount's projected token.
    # Do not make it a Helm hook: hook delete/recreate invalidates already
    # mounted tokens and causes in-cluster Kubernetes calls to return 401.
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# ClusterRole granting the embedded local agent the in-cluster access the
# server's in-process agent goroutine needs. The management cluster the server
# runs in is treated (Rancher-style) as a fully managed cluster: the server
# installs/upgrades the platform with Helm, syncs RBAC, proxies k8s API calls,
# and runs exec/logs against pods.
#
# This was historically an unconditional `*/*/*` + nonResourceURLs:["*"]
# cluster-admin grant with no values knob (C1 in the agent-authz security
# review). It is now an explicit, reviewable allowlist: every rule-group is
# justified, and `*` is never used across all three of apiGroups/resources/
# verbs. Where a single API group genuinely needs full breadth (its own custom
# resources, helm-installed objects), breadth is scoped to that group only.
#
# Operators can extend (never replace) this allowlist with
# `serviceAccount.extraRules` for platform add-ons we do not ship.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
rules:
  # Core workloads/inventory the UI lists and the proxy reads/mutates, plus
  # pod exec/attach/portforward/log for the in-cluster shell + log streaming.
  # Secrets are included because Helm's default storage backend persists
  # release state as Secrets in this cluster.
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/attach
      - pods/exec
      - pods/log
      - pods/portforward
      - pods/proxy
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - secrets
      - serviceaccounts
      - services
      - services/proxy
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # Node-level admin verbs (cordon/drain/taint use update/patch on nodes;
  # eviction creates a pods/eviction object).
  - apiGroups: [""]
    resources: ["nodes/status", "pods/eviction"]
    verbs: ["get", "patch", "update", "create"]
  # Workload controllers managed via the typed routes and Helm releases.
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "deployments/scale", "replicasets", "replicasets/scale", "statefulsets", "statefulsets/scale", "controllerrevisions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # Jobs/CronJobs.
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # Autoscaling.
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingress/NetworkPolicy/IngressClass the platform install and proxy manage.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # Gateway API objects the chart ships (HTTPRoute/Gateway) and references.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gatewayclasses", "httproutes", "referencegrants", "tcproutes", "tlsroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PodDisruptionBudgets / PodSecurity policy objects from chart workloads.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # StorageClasses / volume topology the install configures.
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csidrivers", "csinodes", "csistoragecapacities", "volumeattachments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader-election leases used by controllers the platform installs.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Webhook configurations Helm-installed admission controllers register.
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # APIService objects for aggregated APIs (e.g. metrics-server).
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only pod/node metrics surfaced in the UI.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # CRDs: the server installs and reconciles its own CRDs and those of the
  # add-ons it manages, so it needs full lifecycle on this group.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC sync: the platform reconciles Roles/Bindings on the managed cluster.
  # This is the one group where the agent legitimately writes RBAC; it is
  # scoped to rbac.authorization.k8s.io only, never a blanket grant.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
  # The platform's own custom resources (clusters, projects, agentprofiles,
  # baselines, bundles, gitops targets). Scoped to the platform's own group;
  # full breadth here is the platform reconciling objects it owns.
  - apiGroups: ["management.astronomer.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # cert-manager objects the chart provisions (Certificate/Issuer/etc.).
  - apiGroups: ["cert-manager.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Velero backup/restore CRs the management backup feature drives.
  - apiGroups: ["velero.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Prometheus-operator ServiceMonitor/PodMonitor the chart can install.
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SelfSubjectAccessReview-style preflight checks the agent runs to discover
  # what it is permitted to do before attempting a reconcile.
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews", "selfsubjectrulesreviews"]
    verbs: ["create"]
  {{- with .Values.serviceAccount.extraRules }}
  # Operator-supplied extra rules (serviceAccount.extraRules): additive only.
  {{- toYaml . | nindent 2 }}
  {{- end }}
  # Discovery/health non-resource URLs needed for API discovery, OpenAPI
  # schema fetch (used by the proxy + Helm), and health probes. Scoped to the
  # exact prefixes rather than ["*"].
  - nonResourceURLs:
      - /api
      - /api/*
      - /apis
      - /apis/*
      - /healthz
      - /healthz/*
      - /livez
      - /livez/*
      - /openapi/*
      - /readyz
      - /readyz/*
      - /version
      - /version/*
    verbs: ["get"]
  {{- with .Values.serviceAccount.extraNonResourceRules }}
  # Operator-supplied extra non-resource rules: additive only.
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astronomer.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "astronomer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
