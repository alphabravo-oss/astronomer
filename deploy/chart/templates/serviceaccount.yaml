{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    # Long-lived deployments consume this ServiceAccount's projected token.
    # Do not make it a Helm hook: hook delete/recreate invalidates already
    # mounted tokens and causes in-cluster Kubernetes calls to return 401.
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# ClusterRole granting the embedded local agent the same broad in-cluster
# access an externally-installed astronomer-agent gets via its install
# manifest. This is intentionally Rancher-style: the management cluster the
# server runs in is treated as a fully managed cluster, so the server's
# in-process agent goroutine needs full read/write across all API groups
# (k8s proxy, exec, logs, RBAC sync, helm install/upgrade/uninstall).
#
# Scope is identical to a managed-cluster agent on purpose — narrowing this
# would make the local cluster a second-class citizen in the UI (some
# resources visible, others not).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "astronomer.serviceAccountName" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "astronomer.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "astronomer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
