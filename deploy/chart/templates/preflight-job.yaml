{{- if .Values.preflight.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "astronomer.fullname" . }}-preflight
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 8 }}
    spec:
      restartPolicy: Never
      # Dedicated hook SA (templates/preflight-rbac.yaml, hook-weight -10) so a
      # fresh install doesn't deadlock on the main SA not existing yet.
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}-preflight
      {{- with .Values.preflight.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # initContainers run sequentially before the main `preflight` kubectl
      # container. The DB-connect check runs here because it has different
      # tool requirements (the migrate binary) than the CRD/Secret checks.
      # Failure here fails the whole pod, which fails the helm hook, which
      # fails the install — exactly the gate we want (FEATURES-051126 T13).
      #
      # IMPORTANT: this init container only runs when the operator points
      # at an *external* Postgres. The chart-bundled Postgres
      # StatefulSet is itself a regular release resource, so it doesn't
      # exist at pre-install-hook time and the connectivity check would
      # always fail. T13's value is gating production-mode installs
      # against an unreachable / mis-configured external DB; that path
      # is preserved here.
      initContainers:
        {{- if eq (include "astronomer.postgresBundledEnabled" .) "false" }}
        - name: db-preflight
          {{- with .Values.preflight.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.image" (dict "context" . "component" "migrate") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HOME
              value: /tmp
            {{- if .Values.postgres.external.dsnSecretRef.name }}
            # Operator-provided secret: must already exist in the
            # namespace before `helm install`. Pre-install hooks can
            # reference it because secrets are not chart-managed here.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                  key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
            {{- else }}
            # Inline the computed URL via the same helper the ConfigMap
            # uses at install time. The ConfigMap itself is a regular
            # release resource, so it doesn't exist when this pre-install
            # hook runs — referencing it via configMapKeyRef stalls the
            # pod in CreateContainerConfigError until helm gives up on
            # the hook. Inlining keeps the preflight self-contained.
            - name: DATABASE_URL
              value: {{ include "astronomer.databaseURL" . | quote }}
            {{- end }}
          command:
            - /bin/sh
            - -ec
            - |
              # Check connectivity + the schema_migrations dirty flag. The
              # migrate binary's `version` subcommand prints either
              # "<n>" (clean) or "<n> (dirty)" — the latter means a previous
              # migration crashed midway and the schema is in an indeterminate
              # state. Refusing the install here surfaces the problem early,
              # before the migrate Job retries and CrashLoops.
              if ! out=$(migrate -database "$DATABASE_URL" -path /migrations version 2>&1); then
                # Special case: "no migration" is fine — empty DB, fresh install.
                if echo "$out" | grep -q 'error: no migration'; then
                  echo "schema_migrations table empty — fresh install, OK."
                  exit 0
                fi
                echo "Refusing release: cannot connect to Postgres or read schema_migrations."
                echo "Error from migrate: $out"
                echo ""
                echo "Common causes:"
                echo "  - DATABASE_URL is wrong or the Postgres pod isn't ready yet"
                echo "  - sslmode mismatch between client and server"
                echo "  - The astronomer user lacks SELECT on schema_migrations"
                exit 1
              fi
              echo "Schema state: $out"
              if echo "$out" | grep -q 'dirty'; then
                echo ""
                echo "Refusing release: schema_migrations is marked dirty."
                echo "A previous migration crashed midway and the schema is in an"
                echo "indeterminate state. Recover by:"
                echo "  1. Inspect: kubectl -n {{ .Release.Namespace }} run psql --rm -it --image=postgres:16-alpine -- psql \"\$DATABASE_URL\" -c 'SELECT * FROM schema_migrations;'"
                echo "  2. Decide whether to roll forward or roll back the dirty version"
                echo "  3. migrate -database \"\$DATABASE_URL\" -path /migrations force <version>"
                echo "See docs/upgrade-runbook.md (FEATURES-051126 T06 once landed)."
                exit 1
              fi
              echo "Postgres preflight OK."
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
      containers:
        - name: preflight
          {{- with .Values.preflight.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.thirdPartyImage" (dict "repository" .Values.preflight.image.repository "tag" .Values.preflight.image.tag "registry" .Values.preflight.image.registry "fallback" (.Values.image.registry | default "ghcr.io/alphabravo-oss")) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HOME
              value: /tmp
          command:
            - /bin/sh
            - -ec
            - |
              # Hook RBAC objects are created before this Job, but Kubernetes
              # authorization caches/informers can observe the Job before the
              # new RoleBindings become usable. Every live API read therefore
              # uses one bounded helper with three explicit outcomes:
              #   0 = object present / read succeeded
              #   1 = authorized read returned Kubernetes NotFound
              #   2 = authorization or transport never became usable
              # Callers decide whether outcome 1 is allowed; outcome 2 always
              # fails closed. Stdout is captured for the DSN check and never
              # printed, while kubectl stderr is retained for diagnostics.
              PREFLIGHT_READ_ATTEMPTS=10
              PREFLIGHT_READ_DELAY_SECONDS=1
              KUBE_READ_OUTPUT=""

              kube_read() {
                read_description="$1"
                shift
                read_attempt=1
                read_stdout=/tmp/astronomer-preflight-read.stdout
                read_stderr=/tmp/astronomer-preflight-read.stderr
                while [ "$read_attempt" -le "$PREFLIGHT_READ_ATTEMPTS" ]; do
                  read_rc=0
                  kubectl "$@" >"$read_stdout" 2>"$read_stderr" || read_rc=$?
                  if [ "$read_rc" -eq 0 ]; then
                    KUBE_READ_OUTPUT=$(cat "$read_stdout")
                    rm -f "$read_stdout" "$read_stderr"
                    return 0
                  fi

                  read_error=$(cat "$read_stderr")
                  if echo "$read_error" | grep -Fq 'Error from server (NotFound)'; then
                    echo "Kubernetes API reports ${read_description} absent: ${read_error}" >&2
                    rm -f "$read_stdout" "$read_stderr"
                    return 1
                  fi

                  echo "Kubernetes API read not ready for ${read_description} (attempt ${read_attempt}/${PREFLIGHT_READ_ATTEMPTS}, exit ${read_rc}): ${read_error}" >&2
                  if [ "$read_attempt" -lt "$PREFLIGHT_READ_ATTEMPTS" ]; then
                    sleep "$PREFLIGHT_READ_DELAY_SECONDS"
                  fi
                  read_attempt=$((read_attempt + 1))
                done

                echo "Kubernetes API read failed for ${read_description} after ${PREFLIGHT_READ_ATTEMPTS} attempts." >&2
                echo "Check preflight ServiceAccount RBAC propagation and Kubernetes API connectivity, then retry the release." >&2
                rm -f "$read_stdout" "$read_stderr"
                return 2
              }

              if [ "{{ .Values.gateway.enabled }}" = "true" ]; then
                if kube_read "Gateway API CRD gateways.gateway.networking.k8s.io" get crd gateways.gateway.networking.k8s.io -o name; then
                  :
                else
                  read_status=$?
                  if [ "$read_status" -eq 1 ]; then
                    echo "Refusing release: Gateway API CRD gateways.gateway.networking.k8s.io is missing."
                    echo "Install Gateway API support and a compatible controller before installing this chart."
                  else
                    echo "Refusing release: could not verify Gateway API CRD gateways.gateway.networking.k8s.io because the Kubernetes API read never became usable."
                  fi
                  exit 1
                fi

                if kube_read "Gateway API CRD httproutes.gateway.networking.k8s.io" get crd httproutes.gateway.networking.k8s.io -o name; then
                  :
                else
                  read_status=$?
                  if [ "$read_status" -eq 1 ]; then
                    echo "Refusing release: Gateway API CRD httproutes.gateway.networking.k8s.io is missing."
                    echo "Install Gateway API support and a compatible controller before installing this chart."
                  else
                    echo "Refusing release: could not verify Gateway API CRD httproutes.gateway.networking.k8s.io because the Kubernetes API read never became usable."
                  fi
                  exit 1
                fi

                if kube_read "GatewayClass {{ .Values.gateway.className }}" get gatewayclass "{{ .Values.gateway.className }}" -o name; then
                  :
                else
                  read_status=$?
                  if [ "$read_status" -eq 1 ]; then
                    echo "Refusing release: GatewayClass {{ .Values.gateway.className }} is missing."
                    echo "Install a Gateway controller that provides that class before installing this chart."
                  else
                    echo "Refusing release: could not verify GatewayClass {{ .Values.gateway.className }} because the Kubernetes API read never became usable."
                  fi
                  exit 1
                fi

                echo "Gateway API prerequisites found."
              fi

              # cert-manager preflight — only fires when the selected TLS mode
              # actually needs the CRDs (selfSigned or letsEncrypt). source=secret
              # is BYO and source=none is HTTP-only, so neither requires cert-manager.
              {{- $tlsSrc := include "astronomer.tls.source" . }}
              {{- if and (or (eq $tlsSrc "selfSigned") (eq $tlsSrc "letsEncrypt")) .Values.tls.requireCertManager }}
              if kube_read "cert-manager CRD issuers.cert-manager.io" get crd issuers.cert-manager.io -o name; then
                :
              else
                read_status=$?
                if [ "$read_status" -eq 1 ]; then
                  echo "Refusing release: tls.source={{ $tlsSrc }} requires cert-manager but the CRD"
                  echo "issuers.cert-manager.io was not found in the cluster."
                  echo ""
                  echo "Install cert-manager:"
                  echo "  kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml"
                  echo ""
                  echo "Or set tls.requireCertManager=false if cert-manager will be installed"
                  echo "after this release applies (e.g. via Argo CD sync waves)."
                else
                  echo "Refusing release: could not verify cert-manager CRD issuers.cert-manager.io because the Kubernetes API read never became usable."
                fi
                exit 1
              fi
              if kube_read "cert-manager CRD certificates.cert-manager.io" get crd certificates.cert-manager.io -o name; then
                :
              else
                read_status=$?
                if [ "$read_status" -eq 1 ]; then
                  echo "Refusing release: cert-manager CRD certificates.cert-manager.io is missing."
                  echo "Reinstall cert-manager (the issuers.cert-manager.io CRD was found but certificates.cert-manager.io was not)."
                else
                  echo "Refusing release: could not verify cert-manager CRD certificates.cert-manager.io because the Kubernetes API read never became usable."
                fi
                exit 1
              fi
              echo "cert-manager prerequisites found."
              {{- end }}

              # Validate additional-trusted-CAs Secret exists when referenced.
              {{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
              if kube_read "additional trusted CA Secret {{ .Values.tls.additionalTrustedCAs.existingSecret }}" get secret "{{ .Values.tls.additionalTrustedCAs.existingSecret }}" -n "{{ .Release.Namespace }}" -o name; then
                :
              else
                read_status=$?
                if [ "$read_status" -eq 1 ]; then
                  echo "Refusing release: tls.additionalTrustedCAs.existingSecret={{ .Values.tls.additionalTrustedCAs.existingSecret }} not found in namespace {{ .Release.Namespace }}."
                  echo "Create the Secret with key tls.crt (PEM bundle) first."
                else
                  echo "Refusing release: could not verify additional trusted CA Secret {{ .Values.tls.additionalTrustedCAs.existingSecret }} because the Kubernetes API read never became usable."
                fi
                exit 1
              fi
              echo "additionalTrustedCAs Secret found."
              {{- end }}

              # Production Postgres DSN must use TLS. The inline-DSN case is
              # caught at helm-render time by requireProductionInputs; this
              # block covers the Secret-ref case where helm couldn't inspect
              # the value (FEATURES-051126 T01).
              {{- if and (eq (default "" .Values.config.env) "production") .Values.postgres.external.dsnSecretRef.name }}
              dsn_secret="{{ .Values.postgres.external.dsnSecretRef.name }}"
              dsn_key="{{ .Values.postgres.external.dsnSecretRef.key }}"
              if kube_read "Postgres DSN Secret ${dsn_secret} key ${dsn_key}" get secret "$dsn_secret" -n "{{ .Release.Namespace }}" -o "jsonpath={.data.${dsn_key}}"; then
                dsn_encoded="$KUBE_READ_OUTPUT"
              else
                read_status=$?
                if [ "$read_status" -eq 1 ]; then
                  echo "Refusing release: postgres DSN secret/${dsn_secret} was not found in namespace {{ .Release.Namespace }}."
                else
                  echo "Refusing release: could not read postgres DSN secret/${dsn_secret} because the Kubernetes API read never became usable."
                fi
                exit 1
              fi
              dsn_val=""
              if [ -n "$dsn_encoded" ]; then
                dsn_val=$(printf '%s' "$dsn_encoded" | base64 -d) || {
                  echo "Refusing release: postgres DSN secret/${dsn_secret} key=${dsn_key} is not valid base64 data."
                  exit 1
                }
              fi
              if [ -z "$dsn_val" ]; then
                echo "Refusing release: postgres DSN secret/${dsn_secret} key=${dsn_key} is missing or empty."
                exit 1
              fi
              # Match any of require / verify-ca / verify-full. Anything else
              # (including sslmode=disable, sslmode=allow, sslmode=prefer, or
              # no sslmode parameter at all — which Postgres treats as prefer
              # and silently downgrades to plaintext if the server allows) is
              # a production-posture violation.
              if ! echo "$dsn_val" | grep -qE 'sslmode=(require|verify-ca|verify-full)'; then
                echo "Refusing release: postgres DSN in secret/${dsn_secret} does not enforce TLS."
                echo "Production must use sslmode=require, verify-ca, or verify-full."
                echo "Edit the secret to include one of those modes and re-apply, then retry."
                exit 1
              fi
              echo "Production Postgres DSN TLS check passed."
              {{- end }}

              if [ "{{ include "astronomer.postgresBundledEnabled" . }}" = "true" ]; then
                echo "Bundled Postgres remains enabled; preflight passes."
                exit 0
              fi

              legacy_pvc="data-{{ include "astronomer.fullname" . }}-postgres-0"
              if kube_read "legacy bundled Postgres PVC ${legacy_pvc}" get pvc "${legacy_pvc}" -n "{{ .Release.Namespace }}" -o name; then
                echo "Refusing upgrade: detected legacy bundled Postgres PVC ${legacy_pvc} in namespace {{ .Release.Namespace }}."
                echo "Externalize or migrate the database first. See docs/migrations/2026-05-postgres-cnpg.md."
                exit 1
              else
                read_status=$?
                if [ "$read_status" -ne 1 ]; then
                  echo "Refusing release: could not determine whether legacy bundled Postgres PVC ${legacy_pvc} exists because the Kubernetes API read never became usable."
                  exit 1
                fi
              fi

              echo "No legacy bundled Postgres PVC detected; preflight passes."
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
