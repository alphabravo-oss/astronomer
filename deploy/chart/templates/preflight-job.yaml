{{- if .Values.preflight.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "astronomer.fullname" . }}-preflight
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "preflight") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: preflight
          image: "{{ .Values.preflight.image.repository }}:{{ .Values.preflight.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              if [ "{{ .Values.gateway.enabled }}" = "true" ]; then
                if ! kubectl get crd gateways.gateway.networking.k8s.io >/dev/null 2>&1; then
                  echo "Refusing release: Gateway API CRD gateways.gateway.networking.k8s.io is missing."
                  echo "Install Gateway API support and a compatible controller before installing this chart."
                  exit 1
                fi

                if ! kubectl get crd httproutes.gateway.networking.k8s.io >/dev/null 2>&1; then
                  echo "Refusing release: Gateway API CRD httproutes.gateway.networking.k8s.io is missing."
                  echo "Install Gateway API support and a compatible controller before installing this chart."
                  exit 1
                fi

                if ! kubectl get gatewayclass "{{ .Values.gateway.className }}" >/dev/null 2>&1; then
                  echo "Refusing release: GatewayClass {{ .Values.gateway.className }} is missing."
                  echo "Install a Gateway controller that provides that class before installing this chart."
                  exit 1
                fi

                echo "Gateway API prerequisites found."
              fi

              # cert-manager preflight — only fires when the selected TLS mode
              # actually needs the CRDs (selfSigned or letsEncrypt). source=secret
              # is BYO and source=none is HTTP-only, so neither requires cert-manager.
              {{- $tlsSrc := include "astronomer.tls.source" . }}
              {{- if and (or (eq $tlsSrc "selfSigned") (eq $tlsSrc "letsEncrypt")) (default true .Values.tls.requireCertManager) }}
              if ! kubectl get crd issuers.cert-manager.io >/dev/null 2>&1; then
                echo "Refusing release: tls.source={{ $tlsSrc }} requires cert-manager but the CRD"
                echo "issuers.cert-manager.io was not found in the cluster."
                echo ""
                echo "Install cert-manager:"
                echo "  kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml"
                echo ""
                echo "Or set tls.requireCertManager=false if cert-manager will be installed"
                echo "after this release applies (e.g. via Argo CD sync waves)."
                exit 1
              fi
              if ! kubectl get crd certificates.cert-manager.io >/dev/null 2>&1; then
                echo "Refusing release: cert-manager CRD certificates.cert-manager.io is missing."
                echo "Reinstall cert-manager (the issuers.cert-manager.io CRD was found but certificates.cert-manager.io was not)."
                exit 1
              fi
              echo "cert-manager prerequisites found."
              {{- end }}

              # Validate additional-trusted-CAs Secret exists when referenced.
              {{- if and .Values.tls.additionalTrustedCAs.enabled .Values.tls.additionalTrustedCAs.existingSecret }}
              if ! kubectl get secret "{{ .Values.tls.additionalTrustedCAs.existingSecret }}" -n "{{ .Release.Namespace }}" >/dev/null 2>&1; then
                echo "Refusing release: tls.additionalTrustedCAs.existingSecret={{ .Values.tls.additionalTrustedCAs.existingSecret }} not found in namespace {{ .Release.Namespace }}."
                echo "Create the Secret with key tls.crt (PEM bundle) first."
                exit 1
              fi
              echo "additionalTrustedCAs Secret found."
              {{- end }}

              # Production Postgres DSN must use TLS. The inline-DSN case is
              # caught at helm-render time by requireProductionInputs; this
              # block covers the Secret-ref case where helm couldn't inspect
              # the value (FEATURES-051126 T01).
              {{- if and (eq (default "" .Values.config.env) "production") .Values.postgres.external.dsnSecretRef.name }}
              dsn_secret="{{ .Values.postgres.external.dsnSecretRef.name }}"
              dsn_key="{{ .Values.postgres.external.dsnSecretRef.key }}"
              dsn_val=$(kubectl get secret "$dsn_secret" -n "{{ .Release.Namespace }}" -o jsonpath="{.data.${dsn_key}}" 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -z "$dsn_val" ]; then
                echo "Refusing release: could not read postgres DSN from secret/${dsn_secret} key=${dsn_key} in namespace {{ .Release.Namespace }}."
                exit 1
              fi
              # Match any of require / verify-ca / verify-full. Anything else
              # (including sslmode=disable, sslmode=allow, sslmode=prefer, or
              # no sslmode parameter at all — which Postgres treats as prefer
              # and silently downgrades to plaintext if the server allows) is
              # a production-posture violation.
              if ! echo "$dsn_val" | grep -qE 'sslmode=(require|verify-ca|verify-full)'; then
                echo "Refusing release: postgres DSN in secret/${dsn_secret} does not enforce TLS."
                echo "Production must use sslmode=require, verify-ca, or verify-full."
                echo "Edit the secret to include one of those modes and re-apply, then retry."
                exit 1
              fi
              echo "Production Postgres DSN TLS check passed."
              {{- end }}

              if [ "{{ include "astronomer.postgresBundledEnabled" . }}" = "true" ]; then
                echo "Bundled Postgres remains enabled; preflight passes."
                exit 0
              fi

              legacy_pvc="data-{{ include "astronomer.fullname" . }}-postgres-0"
              if kubectl get pvc "${legacy_pvc}" -n "{{ .Release.Namespace }}" >/dev/null 2>&1; then
                echo "Refusing upgrade: detected legacy bundled Postgres PVC ${legacy_pvc} in namespace {{ .Release.Namespace }}."
                echo "Externalize or migrate the database first. See docs/migrations/2026-05-postgres-cnpg.md."
                exit 1
              fi

              echo "No legacy bundled Postgres PVC detected; preflight passes."
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
