{{- /*
Rancher-style bootstrap-admin password.

  - When .Values.bootstrap.password is non-empty, use it as-is so operators
    can pin a known value via --set bootstrap.password=... or external
    secret tooling.
  - When the value is empty, generate a random 24-character password on the
    *first* install only; the `lookup` guard re-reads the existing secret
    on subsequent upgrades so the value remains stable.

GITOPS CAVEAT (C-04): `lookup` returns nil under `helm template` and any
renderer that templates without a live cluster connection — which is exactly
how Argo CD and other GitOps tools apply this chart. In that mode the guard
above cannot see the existing Secret, so an empty bootstrap.password would
re-roll `randAlphaNum 24` on every sync and rotate the admin password out from
under you. GitOps installs MUST pin `bootstrap.password` (via values or an
external secret manager) or pre-create the `<release>-bootstrap` Secret. The
`helm.sh/resource-policy: keep` annotation preserves it once created.

The server reads this via ASTRONOMER_BOOTSTRAP_PASSWORD; see the env wire-up
in templates/server-deployment.yaml.
*/}}
{{- $name := printf "%s-bootstrap" (include "astronomer.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $pw := "" -}}
{{- if .Values.bootstrap.password -}}
  {{- $pw = .Values.bootstrap.password -}}
{{- else if and $existing $existing.data (index $existing.data "password") -}}
  {{- $pw = index $existing.data "password" | b64dec -}}
{{- else -}}
  {{- $pw = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    # Keep the generated bootstrap password stable across upgrades. Operators
    # can still pin a known value with .Values.bootstrap.password.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  password: {{ $pw | quote }}
