{{- /*
PrometheusRule — default alert set for an astronomer install.

Auto-enabled when metrics.serviceMonitor.enabled=true (since alerting
without scraping is incoherent). Set metrics.prometheusRule.enabled=false
to opt out if your platform team maintains a central alert library and
you don't want chart-shipped rules.

The rules deliberately use astronomer_* metric names so they're stable
across operator-installed Prometheus stacks. Runbook URLs default to
this repo's docs/runbooks/ tree; override metrics.prometheusRule.runbookBaseURL
to point at your own.

Caught by the 2026-05-11 enterprise audit (FEATURES-051126 T03).
*/ -}}
{{- /* Two gates: scraping must be on (alerting without scraping is
       incoherent) AND prometheusRule.enabled must not be explicitly
       false. We can't use `default true X` here because Helm/sprig
       treats Go's bool zero-value (false) as "empty" and replaces it
       with the default, which would make `enabled: false` a no-op. */ -}}
{{- if and .Values.metrics.serviceMonitor.enabled (ne .Values.metrics.prometheusRule.enabled false) }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "astronomer.fullname" . }}
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: astronomer.recording
      interval: 30s
      rules:
        # Pre-aggregate the HTTP error ratio so the alert below stays
        # cheap to evaluate on a busy Prometheus.
        - record: astronomer:http_5xx_ratio:5m
          expr: |
            sum(rate(astronomer_http_requests_total{status_class="5xx"}[5m]))
              / clamp_min(sum(rate(astronomer_http_requests_total[5m])), 1)

    - name: astronomer.alerts
      rules:
        # ── Server HTTP error rate ──────────────────────────────────────
        - alert: AstronomerHighHTTPErrorRate
          expr: astronomer:http_5xx_ratio:5m > 0.01
          for: 5m
          labels:
            severity: warning
            component: server
          annotations:
            summary: "Astronomer server 5xx error rate > 1% (5m)"
            description: |
              5xx responses are {{ "{{" }} $value | humanizePercentage {{ "}}" }} of all
              traffic over the last 5 minutes. Common causes: panic loop,
              database connectivity, downstream tunnel failures.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/high-http-error-rate.md

        # ── asynq queue depth (pending) ─────────────────────────────────
        - alert: AstronomerWorkerQueueBacklog
          expr: max(astronomer_worker_queue_depth{state="pending"}) > 1000
          for: 5m
          labels:
            severity: warning
            component: worker
          annotations:
            summary: "Astronomer worker queue backlog > 1000 pending tasks"
            description: |
              Pending tasks have been above 1000 for 5+ minutes. Workers
              may be too slow, blocked on a slow downstream, or a single
              long-running task type is hogging concurrency slots.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/worker-queue-backlog.md

        # ── asynq DLQ growth ────────────────────────────────────────────
        # rate>0 instead of "depth>0" because some retries legitimately
        # land in archived briefly; what we care about is *growth* in the
        # DLQ over the recent window.
        - alert: AstronomerWorkerDLQGrowing
          expr: |
            sum(increase(astronomer_worker_queue_depth{state="archived"}[10m])) > 0
          for: 10m
          labels:
            severity: warning
            component: worker
          annotations:
            summary: "Astronomer worker dead-letter queue is growing"
            description: |
              Tasks are landing in the archived (DLQ) queue. Inspect the
              DLQ via the support-bundle asynq-queues.json section or
              the asynq CLI to see which task type is failing.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/worker-dlq-growing.md

        # ── Database pool exhaustion ────────────────────────────────────
        - alert: AstronomerDBPoolExhausted
          expr: rate(db_pool_empty_acquire_count_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
            component: server
          annotations:
            summary: "Astronomer DB pool wait events firing"
            description: |
              Connection acquisitions are blocking on an empty pool.
              Either bump database.maxConns (chart values), or hunt the
              long-held conn (look for queries that hold an advisory lock,
              especially around the leader election in periodic tasks).
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/db-pool-exhausted.md

        # ── Agent disconnected ──────────────────────────────────────────
        # 120s = 4× the default heartbeat interval — small enough to
        # catch real failures, large enough to ride out a single missed
        # tick.
        - alert: AstronomerAgentDisconnected
          expr: astronomer_agent_last_seen_seconds > 120
          for: 2m
          labels:
            severity: warning
            component: tunnel
          annotations:
            summary: "Cluster agent has not pinged in {{ "{{" }} $value | humanizeDuration {{ "}}" }}"
            description: |
              The tunnel between the server and a cluster agent has gone
              quiet. The cluster id is in the metric label; check the
              agent pod's logs and connectivity in that cluster.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/agent-disconnected.md

        # ── Backup restore drill: staleness ─────────────────────────────
        # NIST CP-9 / ISO 27001 A.12.3.1 require periodic proof that the
        # nightly backup is restorable. The drill CronJob runs weekly
        # (default 0 4 * * 1) and either succeeds (Job condition
        # type=Complete) or fails (type=Failed). When the most recent
        # successful Job is older than 14 days we've missed at least two
        # consecutive Mondays — that's the on-call escalation threshold.
        # Uses kube-state-metrics' `kube_job_status_completion_time` so
        # no Go-side exporter is needed; the drill itself writes its
        # outcome into the management DB (backup_drill_results) for the
        # /api/v1/admin/backup-drill/ endpoint.
        - alert: AstronomerBackupRestoreDrillStale
          expr: |
            time() - max(
              kube_job_status_completion_time{job_name=~".*-restore-drill-.*"}
              and on(job_name)
              kube_job_status_succeeded{job_name=~".*-restore-drill-.*"} > 0
            ) > 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
            component: backup
          annotations:
            summary: "Astronomer backup restore drill has not succeeded in >14 days"
            description: |
              The weekly restore-drill Job has not posted a successful
              completion to kube-state-metrics in the last 14 days.
              Either the CronJob is suspended, the latest backups are
              not restorable, or the chart's managementRestoreDrill is
              disabled while management backups are still being taken.
              Confirm via GET /api/v1/admin/backup-drill/ and inspect
              the most recent Job pod's logs.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/backup-restore-drill-failed.md

        # ── Backup restore drill: explicit failure ──────────────────────
        # Fires on any Job failure in the last 24h. Distinct from the
        # staleness alert because failures point at a CONCRETE bad
        # backup (corrupted dump, schema regression, missing critical
        # table) versus the staleness case which can be just "nobody
        # ran it".
        - alert: AstronomerBackupRestoreDrillFailed
          expr: |
            sum(increase(kube_job_status_failed{job_name=~".*-restore-drill-.*"}[24h])) > 0
          for: 5m
          labels:
            severity: critical
            component: backup
          annotations:
            summary: "Astronomer backup restore drill failed in the last 24h"
            description: |
              A restore-drill Job completed with status=Failed. The
              backup it tried to restore may be corrupted, missing a
              critical table, or pre-dates the expected minimum schema
              version. Pull the failed Job's pod logs and inspect
              backup_drill_results.error_message for the last row.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/backup-restore-drill-failed.md

        # ── Management-plane log forwarder down ─────────────────────────
        # FEATURES-051226 T03 — the chart-side Fluent Bit DaemonSet (off
        # by default; opt-in via managementLogging.enabled=true) ships the
        # management plane's own server + worker logs to an external sink.
        # When it's enabled but no Fluent Bit pod is reporting up=1 the
        # operator's audit trail has a hole, so we page early.
        # Gated on managementLogging.enabled so the alert doesn't fire on
        # installs that intentionally opted out.
        {{- if .Values.managementLogging.enabled }}
        - alert: AstronomerManagementLoggingForwarderDown
          expr: sum(up{job="astronomer-mgmt-logging"}) < 1
          for: 5m
          labels:
            severity: warning
            component: observability
          annotations:
            summary: "Astronomer management-plane log forwarder is down"
            description: |
              The Fluent Bit DaemonSet that ships astronomer-server and
              astronomer-worker logs to {{ .Values.managementLogging.backend }}
              has not had a single Pod reporting up=1 for 5 minutes.
              Audit, error, and access logs are NOT being forwarded until
              this recovers. Check the DaemonSet's Pod status and the
              fluent-bit container logs.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/management-logging-down.md
        {{- end }}

        # ── Cluster-side logging pipeline silent failure ───────────────
        # T7.1 — fluent-bit on a managed cluster may stay "up" while
        # its output plugin (loki/opensearch/cloudwatch/etc.) silently
        # drops records: bad token, downstream rate-limit, network
        # blackhole. The fluentbit_output_proc_records_total counter
        # exposed by fluent-bit's prometheus endpoint is monotonic
        # while the pipeline is healthy. A flatline for 5 minutes is
        # the signal we want — `rate(...)` over 5m == 0 means zero
        # progress across the window, not zero records seen.
        - alert: AstronomerClusterLoggingFlatlined
          expr: |
            sum by (cluster, namespace, name) (
              rate(fluentbit_output_proc_records_total[5m])
            ) == 0
            and on (cluster)
            sum by (cluster) (up{job=~".*fluent-bit.*|.*fluentbit.*"}) > 0
          for: 5m
          labels:
            severity: warning
            component: observability
          annotations:
            summary: "Cluster log forwarder has processed zero records for 5 minutes"
            description: |
              fluent-bit pods on this cluster are running but the
              output plugin has not processed a single record in 5
              minutes. Logs are being lost. Common causes: downstream
              auth failed, downstream rate-limited, network egress
              blocked, or a malformed output filter. Inspect the
              fluent-bit DaemonSet logs and the output-plugin error
              metrics.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/logging-flatlined.md

        # ── Argo CD self-manage drift ───────────────────────────────────
        # FEATURES-051126 T26 — fires when the astronomer-self-manage
        # Application drifts. argocd_app_info is published by Argo CD's
        # own metrics; this rule only fires when Argo CD is installed
        # AND its metrics are scraped by the same Prometheus.
        - alert: AstronomerArgoSelfManageDrift
          expr: |
            argocd_app_info{name="astronomer-self-manage", sync_status!="Synced"} > 0
          for: 10m
          labels:
            severity: warning
            component: gitops
          annotations:
            summary: "Astronomer self-manage Argo CD app drifted from Git"
            description: |
              The Argo CD Application that owns this install is
              OutOfSync. Either reconcile via the Argo CD UI or
              investigate the upstream chart values.
            runbook_url: {{ .Values.metrics.prometheusRule.runbookBaseURL }}/argocd-drift.md
{{- end }}
