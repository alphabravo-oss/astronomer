{{- /* Render-time guard: when config.env=production, refuse to install
       unless the operator has provided the bare minimum production wiring
       (external DBs, TLS, real secrets, hostnames). See the helper for the
       full check list and the README's "Dev vs. Production Posture"
       section for the recipe. The helper returns ""; we discard the
       result so this only fails the render, never injects manifest text. */}}
{{- $_ := include "astronomer.validateInputs" . -}}
{{- $_ := include "astronomer.requireProductionInputs" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astronomer.fullname" . }}-config
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ include "astronomer.databaseURL" . | quote }}
  REDIS_URL: {{ include "astronomer.redisURL" . | quote }}
  ENV: {{ .Values.config.env | quote }}
  DEBUG: {{ .Values.config.debug | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ALLOWED_HOSTS: {{ .Values.config.allowedHosts | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  # External URL of this install; seeds platform_configuration.server_url
  # on first boot so the Argo self-management loop can render the right
  # hostname on the self-manage HTTPRoute.
  SERVER_URL: {{ .Values.config.serverURL | default "" | quote }}
  AGENT_IMAGE_REPOSITORY: {{ .Values.config.agentImageRepository | quote }}
  AGENT_IMAGE_TAG: {{ .Values.config.agentImageTag | quote }}
  # Auth hardening (migration 039). Empty / unset == binary defaults
  # (5 attempts / 15 minutes).
  {{- if .Values.config.loginFailureThreshold }}
  LOGIN_FAILURE_THRESHOLD: {{ .Values.config.loginFailureThreshold | quote }}
  {{- end }}
  {{- if .Values.config.lockoutDurationMinutes }}
  LOCKOUT_DURATION_MINUTES: {{ .Values.config.lockoutDurationMinutes | quote }}
  {{- end }}
  # Migration 045 — Dex bootstrap. When dex.enabled=true the server's boot
  # path auto-wires dex_settings to point at the in-chart Dex Deployment +
  # ConfigMap so the first connector + Apply works without a manual settings
  # step. Empty / unset == bootstrap skipped (legacy operator-managed Dex).
  {{- if .Values.dex.enabled }}
  DEX_BUNDLED_ENABLED: "true"
  DEX_BUNDLED_NAMESPACE: {{ .Release.Namespace | quote }}
  DEX_BUNDLED_RELEASE_NAME: {{ printf "%s-dex" (include "astronomer.fullname" .) | quote }}
  DEX_BUNDLED_CONFIGMAP_NAME: {{ printf "%s-dex-config" (include "astronomer.fullname" .) | quote }}
  DEX_BUNDLED_ISSUER_URL: {{ include "astronomer.dex.issuerURL" . | quote }}
  {{- end }}
  # 2FA / TOTP (migration 043). Empty issuer == binary default ("Astronomer").
  # require=true makes 2FA mandatory for all local-password users.
  {{- with .Values.config.auth }}
  {{- with .totp }}
  {{- if .issuer }}
  TOTP_ISSUER: {{ .issuer | quote }}
  {{- end }}
  {{- if .require }}
  TOTP_REQUIRE: {{ .require | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  # pgxpool tunables (FEATURES-051126 T21). Empty == binary default.
  {{- with .Values.postgres.pool }}
  {{- if .maxConns }}
  DB_MAX_CONNS: {{ .maxConns | quote }}
  {{- end }}
  {{- if .minConns }}
  DB_MIN_CONNS: {{ .minConns | quote }}
  {{- end }}
  {{- if .maxConnLifetimeMinutes }}
  DB_MAX_CONN_LIFETIME_MINUTES: {{ .maxConnLifetimeMinutes | quote }}
  {{- end }}
  {{- if .maxConnIdleMinutes }}
  DB_MAX_CONN_IDLE_MINUTES: {{ .maxConnIdleMinutes | quote }}
  {{- end }}
  {{- if .healthCheckPeriodSeconds }}
  DB_HEALTH_CHECK_PERIOD_SECONDS: {{ .healthCheckPeriodSeconds | quote }}
  {{- end }}
  {{- end }}
  # T15 — distributed tracing. All four vars are no-ops when endpoint is
  # empty (the InitTracing helper short-circuits), so this stays render-
  # safe for installs that don't opt in.
  {{- with .Values.observability }}
  {{- with .tracing }}
  {{- if .endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .endpoint | quote }}
  {{- end }}
  {{- if .insecure }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ .insecure | quote }}
  {{- end }}
  {{- if .headers }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ .headers | quote }}
  {{- end }}
  {{- if .samplerRatio }}
  OTEL_TRACES_SAMPLER_ARG: {{ .samplerRatio | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
