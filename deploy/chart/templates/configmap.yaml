apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astronomer.fullname" . }}-config
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ include "astronomer.databaseURL" . | quote }}
  REDIS_URL: {{ include "astronomer.redisURL" . | quote }}
  ENV: {{ .Values.config.env | quote }}
  DEBUG: {{ .Values.config.debug | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ALLOWED_HOSTS: {{ .Values.config.allowedHosts | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  AGENT_IMAGE_REPOSITORY: {{ .Values.config.agentImageRepository | quote }}
  AGENT_IMAGE_TAG: {{ .Values.config.agentImageTag | quote }}
