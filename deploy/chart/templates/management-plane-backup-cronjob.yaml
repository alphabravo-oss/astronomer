{{- if and .Values.managementBackup.enabled .Values.managementBackup.s3.bucket .Values.managementBackup.s3.credentialsSecretRef.name }}
{{- /*
  Management-plane DR: nightly pg_dump of Astronomer's own Postgres pushed to
  S3-compatible object storage.

  Scope: this CronJob backs up the management plane's source-of-truth DB only
  (clusters, projects, RBAC, audit, monitoring config, ArgoCD instance records,
  etc.). It deliberately does NOT back up Redis — Redis is ephemeral asynq
  queue state and is rebuilt by periodic re-evaluators on restore.

  The companion runbook lives at docs/management-plane-dr-runbook.md and
  documents the human side of the restore procedure.
*/ -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "astronomer.fullname" . }}-management-backup
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "management-backup") | nindent 4 }}
spec:
  schedule: {{ .Values.managementBackup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.managementBackup.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.managementBackup.failedJobsHistoryLimit | default 3 }}
  startingDeadlineSeconds: {{ .Values.managementBackup.startingDeadlineSeconds | default 600 }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.managementBackup.backoffLimit | default 2 }}
      ttlSecondsAfterFinished: {{ .Values.managementBackup.ttlSecondsAfterFinished | default 86400 }}
      template:
        metadata:
          labels:
            {{- include "astronomer.componentLabels" (dict "context" . "component" "management-backup") | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
          {{- with .Values.managementBackup.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.managementBackup.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.managementBackup.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: pgdump-s3
              {{- with .Values.managementBackup.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              image: {{ include "astronomer.thirdPartyImage" (dict "repository" .Values.managementBackup.image.repository "tag" .Values.managementBackup.image.tag "registry" .Values.managementBackup.image.registry "fallback" .Values.image.registry) | quote }}
              imagePullPolicy: {{ .Values.managementBackup.image.pullPolicy | default "IfNotPresent" }}
              command: ["/bin/sh", "-eu", "-c"]
              args:
                - |
                  set -eu

                  # --- Resolve dump file naming ---------------------------------
                  STAMP="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
                  DOW="$(date -u +%u)"   # 1=Mon..7=Sun
                  DOM="$(date -u +%d)"   # 01..31

                  BUCKET="${MANAGEMENT_BACKUP_BUCKET}"
                  PREFIX="${MANAGEMENT_BACKUP_PREFIX:-astronomer-pg}"
                  RELEASE="${MANAGEMENT_BACKUP_RELEASE}"

                  DAILY_KEY="${PREFIX}/${RELEASE}/daily/${STAMP}.pgcustom"
                  WEEKLY_KEY="${PREFIX}/${RELEASE}/weekly/${STAMP}.pgcustom"
                  MONTHLY_KEY="${PREFIX}/${RELEASE}/monthly/${STAMP}.pgcustom"

                  DUMP_PATH="/tmp/${STAMP}.pgcustom"

                  # --- Configure aws cli ----------------------------------------
                  export AWS_SHARED_CREDENTIALS_FILE="/var/run/aws/credentials"
                  export AWS_DEFAULT_REGION="${MANAGEMENT_BACKUP_REGION}"
                  AWS_S3_FLAGS=""
                  if [ -n "${MANAGEMENT_BACKUP_ENDPOINT:-}" ]; then
                    AWS_S3_FLAGS="--endpoint-url ${MANAGEMENT_BACKUP_ENDPOINT}"
                  fi

                  # --- pg_dump --------------------------------------------------
                  echo "Starting pg_dump at ${STAMP} (release=${RELEASE})"
                  pg_dump \
                    --dbname="${DATABASE_URL}" \
                    --format=custom \
                    --no-owner \
                    --no-acl \
                    --file="${DUMP_PATH}"

                  DUMP_SIZE="$(wc -c < "${DUMP_PATH}")"
                  echo "pg_dump complete: ${DUMP_SIZE} bytes -> ${DUMP_PATH}"

                  # --- Upload daily ---------------------------------------------
                  echo "Uploading daily: s3://${BUCKET}/${DAILY_KEY}"
                  aws s3 cp ${AWS_S3_FLAGS} "${DUMP_PATH}" "s3://${BUCKET}/${DAILY_KEY}"

                  # --- Promote to weekly on Sundays -----------------------------
                  if [ "${DOW}" = "7" ]; then
                    echo "Promoting to weekly: s3://${BUCKET}/${WEEKLY_KEY}"
                    aws s3 cp ${AWS_S3_FLAGS} "${DUMP_PATH}" "s3://${BUCKET}/${WEEKLY_KEY}"
                  fi

                  # --- Promote to monthly on the 1st ----------------------------
                  if [ "${DOM}" = "01" ]; then
                    echo "Promoting to monthly: s3://${BUCKET}/${MONTHLY_KEY}"
                    aws s3 cp ${AWS_S3_FLAGS} "${DUMP_PATH}" "s3://${BUCKET}/${MONTHLY_KEY}"
                  fi

                  rm -f "${DUMP_PATH}"

                  # --- Retention -----------------------------------------------
                  # List + prune objects older than the configured retention per
                  # tier. We sort by key (which embeds an ISO-8601 timestamp), so
                  # lexical order == chronological order.
                  prune_tier() {
                    TIER="$1"
                    KEEP="$2"
                    PFX="${PREFIX}/${RELEASE}/${TIER}/"
                    echo "Pruning ${TIER} retention (keep ${KEEP})"
                    KEYS="$(aws s3api list-objects-v2 ${AWS_S3_FLAGS} \
                              --bucket "${BUCKET}" \
                              --prefix "${PFX}" \
                              --query 'Contents[].Key' \
                              --output text 2>/dev/null || echo '')"
                    if [ -z "${KEYS}" ] || [ "${KEYS}" = "None" ]; then
                      echo "  (no objects under ${PFX})"
                      return 0
                    fi
                    # tr tabs/spaces -> newlines, sort desc, drop the top KEEP, delete the rest
                    echo "${KEYS}" | tr '\t' '\n' | tr ' ' '\n' | sed '/^$/d' \
                      | sort -r | tail -n +"$((KEEP + 1))" \
                      | while read -r OLD; do
                          [ -z "${OLD}" ] && continue
                          echo "  rm s3://${BUCKET}/${OLD}"
                          aws s3 rm ${AWS_S3_FLAGS} "s3://${BUCKET}/${OLD}" || true
                        done
                  }

                  prune_tier "daily"   "${MANAGEMENT_BACKUP_KEEP_DAILY}"
                  prune_tier "weekly"  "${MANAGEMENT_BACKUP_KEEP_WEEKLY}"
                  prune_tier "monthly" "${MANAGEMENT_BACKUP_KEEP_MONTHLY}"

                  # --- Encryption-key backup (F4) ------------------------------
                  # pg_dump captures the ciphertext; this captures the Fernet/JWT
                  # KEY that decrypts it — WITHOUT which a restore onto a new
                  # cluster is undecryptable. The key Secret is mounted at
                  # /var/run/astronomer-keys (one file per key). We tar it (-h to
                  # dereference the k8s secret-mount symlinks) and symmetrically
                  # encrypt the archive with the SEPARATELY-held wrapping
                  # passphrase BEFORE upload, so the key never lands in S3 in
                  # plaintext beside the data it protects.
                  if [ -n "${KEYBACKUP_ENABLED:-}" ]; then
                    echo "Backing up encryption-key Secret (wrapped) to ${KEYBACKUP_PREFIX}/"
                    # Preserve the complete Secret bundle (OAuth and future
                    # keys included), then add canonical filenames required by
                    # the restore contract when operators use custom key names.
                    find /var/run/astronomer-keys -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
                    cp -aL /var/run/astronomer-keys-source/. /var/run/astronomer-keys/
                    {{- if .Values.managementBackup.encryptionKeyBackup.secretName }}
                    # An independent BYO backup bundle is a separate contract:
                    # it already exposes the canonical restore filenames.
                    cp -L /var/run/astronomer-keys-source/SECRET_KEY /var/run/astronomer-keys/SECRET_KEY
                    cp -L /var/run/astronomer-keys-source/ASTRONOMER_ENCRYPTION_KEY /var/run/astronomer-keys/ASTRONOMER_ENCRYPTION_KEY
                    {{- else }}
                    cp -L "/var/run/astronomer-keys-source/{{ .Values.secrets.secretKeyKey }}" /var/run/astronomer-keys/SECRET_KEY
                    cp -L "/var/run/astronomer-keys-source/{{ .Values.secrets.encryptionKeyKey }}" /var/run/astronomer-keys/ASTRONOMER_ENCRYPTION_KEY
                    {{- end }}
                    KEY_BUNDLE="/tmp/${STAMP}.keys.tar"
                    KEY_ENC="${KEY_BUNDLE}.enc"
                    KEY_S3="${PREFIX}/${RELEASE}/${KEYBACKUP_PREFIX}/${STAMP}.keys.tar.enc"
                    tar -C /var/run/astronomer-keys -chf "${KEY_BUNDLE}" .
                    openssl enc -aes-256-cbc -pbkdf2 -salt \
                      -in "${KEY_BUNDLE}" -out "${KEY_ENC}" \
                      -pass file:/var/run/astronomer-wrap/passphrase
                    aws s3 cp ${AWS_S3_FLAGS} "${KEY_ENC}" "s3://${BUCKET}/${KEY_S3}"
                    rm -f "${KEY_BUNDLE}" "${KEY_ENC}"
                    prune_tier "${KEYBACKUP_PREFIX}" "${KEYBACKUP_KEEP}"
                    echo "Encryption-key backup OK: s3://${BUCKET}/${KEY_S3}"
                  fi

                  echo "Backup OK."
              env:
                - name: HOME
                  value: /tmp
                - name: MANAGEMENT_BACKUP_RELEASE
                  value: {{ .Release.Name | quote }}
                - name: MANAGEMENT_BACKUP_BUCKET
                  value: {{ .Values.managementBackup.s3.bucket | quote }}
                - name: MANAGEMENT_BACKUP_REGION
                  value: {{ .Values.managementBackup.s3.region | quote }}
                - name: MANAGEMENT_BACKUP_PREFIX
                  value: {{ .Values.managementBackup.s3.prefix | default "astronomer-pg" | quote }}
                {{- with .Values.managementBackup.s3.endpoint }}
                - name: MANAGEMENT_BACKUP_ENDPOINT
                  value: {{ . | quote }}
                {{- end }}
                - name: MANAGEMENT_BACKUP_KEEP_DAILY
                  value: {{ .Values.managementBackup.retention.daily | default 30 | quote }}
                - name: MANAGEMENT_BACKUP_KEEP_WEEKLY
                  value: {{ .Values.managementBackup.retention.weekly | default 12 | quote }}
                - name: MANAGEMENT_BACKUP_KEEP_MONTHLY
                  value: {{ .Values.managementBackup.retention.monthly | default 6 | quote }}
                {{- if and .Values.managementBackup.encryptionKeyBackup.enabled .Values.managementBackup.encryptionKeyBackup.wrappingSecretRef.name }}
                - name: KEYBACKUP_ENABLED
                  value: "1"
                - name: KEYBACKUP_PREFIX
                  value: {{ .Values.managementBackup.encryptionKeyBackup.keyPrefix | default "keys" | quote }}
                - name: KEYBACKUP_KEEP
                  value: {{ .Values.managementBackup.encryptionKeyBackup.retention | default 30 | quote }}
                {{- end }}
                {{- if .Values.postgres.external.dsnSecretRef.name }}
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                      key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
                {{- else }}
                - name: DATABASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "astronomer.fullname" . }}-config
                      key: DATABASE_URL
                {{- end }}
              volumeMounts:
                - name: aws-credentials
                  mountPath: /var/run/aws
                  readOnly: true
                - name: scratch
                  mountPath: /tmp
                {{- if and .Values.managementBackup.encryptionKeyBackup.enabled .Values.managementBackup.encryptionKeyBackup.wrappingSecretRef.name }}
                - name: encryption-keys
                  mountPath: /var/run/astronomer-keys
                - name: encryption-keys-source
                  mountPath: /var/run/astronomer-keys-source
                  readOnly: true
                - name: wrapping-passphrase
                  mountPath: /var/run/astronomer-wrap
                  readOnly: true
                {{- end }}
              resources:
                {{- toYaml .Values.managementBackup.resources | nindent 16 }}
          volumes:
            - name: aws-credentials
              secret:
                secretName: {{ .Values.managementBackup.s3.credentialsSecretRef.name | quote }}
                items:
                  - key: {{ .Values.managementBackup.s3.credentialsSecretRef.key | default "credentials" | quote }}
                    path: credentials
            - name: scratch
              emptyDir:
                sizeLimit: {{ .Values.managementBackup.scratchSizeLimit | default "8Gi" | quote }}
            {{- if and .Values.managementBackup.encryptionKeyBackup.enabled .Values.managementBackup.encryptionKeyBackup.wrappingSecretRef.name }}
            # The Fernet/JWT key Secret, mounted read-only so the job can wrap
            # and back it up. Defaults to the chart's own <release>-secrets.
            - name: encryption-keys
              emptyDir:
                sizeLimit: 16Mi
            - name: encryption-keys-source
              secret:
                secretName: {{ .Values.managementBackup.encryptionKeyBackup.secretName | default (include "astronomer.secretsSecretName" .) | quote }}
            # Separately-held wrapping passphrase. Custody MUST be distinct from
            # the S3 backup credentials (see docs/management-plane-dr-runbook.md).
            - name: wrapping-passphrase
              secret:
                secretName: {{ .Values.managementBackup.encryptionKeyBackup.wrappingSecretRef.name | quote }}
                items:
                  - key: {{ .Values.managementBackup.encryptionKeyBackup.wrappingSecretRef.key | default "passphrase" | quote }}
                    path: passphrase
            {{- end }}
{{- end }}
