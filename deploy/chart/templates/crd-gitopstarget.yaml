{{- if .Values.crds.enabled }}
# GitOpsTarget.management.astronomer.io/v1alpha1
#
# Declarative Argo ApplicationSet targeting policy. Astronomer validates the
# selector boundary; Argo CD owns sync and deployment convergence.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gitopstargets.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    management.astronomer.io/finalizer: management.astronomer.io/gitopstarget-cleanup
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: gitopstargets
    singular: gitopstarget
    kind: GitOpsTarget
    listKind: GitOpsTargetList
    shortNames:
      - astrogitopstarget
    categories:
      - astronomer
  # Multi-version serving: v1alpha1 and v1beta1 are both served with an
  # identical schema (identity conversion — the Go types are shared verbatim,
  # see internal/crd/types.go). v1alpha1 stays the storage version so existing
  # stored objects are untouched by the promotion. No conversion webhook is
  # needed while the schemas are byte-identical. See docs/crd-versioning.md.
  versions:
    {{- range $v := list (dict "name" "v1alpha1" "storage" true) (dict "name" "v1beta1" "storage" false) }}
    - name: {{ $v.name }}
      served: true
      storage: {{ $v.storage }}
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - applicationSet
              properties:
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    clusterRefs:
                      type: array
                      items:
                        type: string
                projectSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    clusterRefs:
                      type: array
                      items:
                        type: string
                bundleRef:
                  type: object
                  properties:
                    name:
                      type: string
                    version:
                      type: string
                applicationSet:
                  type: object
                  properties:
                    templateRef:
                      type: string
                    sourceRepo:
                      type: string
                    path:
                      type: string
                    revision:
                      type: string
                    parameters:
                      type: object
                      additionalProperties:
                        type: string
                syncPolicy:
                  type: object
                  properties:
                    automated:
                      type: boolean
                    prune:
                      type: boolean
                    selfHeal:
                      type: boolean
                syncWindows:
                  type: array
                  items:
                    type: object
                    required:
                      - kind
                    properties:
                      kind:
                        type: string
                        enum:
                          - allow
                          - deny
                      schedule:
                        type: string
                      duration:
                        type: string
                      clusters:
                        type: array
                        items:
                          type: string
                suspended:
                  type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Reconciling
                    - Ready
                    - Degraded
                    - Suspended
                lastReconciled:
                  type: string
                  format: date-time
                matchedClusters:
                  type: array
                  items:
                    type: string
                applicationSetName:
                  type: string
                syncStatus:
                  type: string
                health:
                  type: string
                applicationCount:
                  type: integer
                  format: int32
                applications:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      syncStatus:
                        type: string
                      health:
                        type: string
                      revision:
                        type: string
                      operationPhase:
                        type: string
                      message:
                        type: string
                      resources:
                        type: array
                        items:
                          type: object
                          properties:
                            group:
                              type: string
                            kind:
                              type: string
                            namespace:
                              type: string
                            name:
                              type: string
                            status:
                              type: string
                            health:
                              type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ApplicationSet
          type: string
          jsonPath: .status.applicationSetName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
    {{- end }}
{{- end }}
