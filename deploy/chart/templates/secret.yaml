{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "astronomer.fullname" . }}-secrets
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    # Keep the Fernet encryption key + JWT signing key across `helm uninstall`.
    # Losing this Secret makes every encrypted column (agent tokens, SSO client
    # secrets, integration credentials) permanently undecryptable — see
    # docs/management-plane-dr-runbook.md. External-secret-manager users who
    # source these from Vault/ESO can safely ignore this annotation.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  {{ .Values.secrets.secretKeyKey | quote }}: {{ .Values.secrets.secretKey | quote }}
  # The Go config reads this with `mapstructure:"astronomer_encryption_key"`,
  # so the env var name must be ASTRONOMER_ENCRYPTION_KEY (not bare ENCRYPTION_KEY).
  {{ .Values.secrets.encryptionKeyKey | quote }}: {{ .Values.secrets.encryptionKey | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientID | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientID | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientID | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- if and (eq (include "astronomer.postgresBundledEnabled" .) "true") (not .Values.postgres.passwordSecretRef.name) }}
  {{ .Values.secrets.postgresPasswordKey | quote }}: {{ .Values.postgres.password | quote }}
  {{- end }}
{{- end }}
