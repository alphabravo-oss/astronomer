apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "astronomer.fullname" . }}-worker
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    {{- toYaml .Values.worker.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "worker") | nindent 8 }}
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z {{ include "astronomer.fullname" . }}-postgres 5432; do sleep 1; done
              echo "postgres up"
        {{- end }}
        {{- if eq (include "astronomer.redisBundledEnabled" .) "true" }}
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for redis..."
              until nc -z {{ include "astronomer.fullname" . }}-redis 6379; do sleep 1; done
              echo "redis up"
        {{- end }}
      containers:
        - name: worker
          image: {{ include "astronomer.image" (dict "context" . "component" "worker") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "astronomer.fullname" . }}-config
            - secretRef:
                name: {{ include "astronomer.fullname" . }}-secrets
          {{- if or .Values.postgres.external.dsnSecretRef.name .Values.redis.external.address .Values.redis.external.passwordSecretRef.name .Values.worker.env }}
          env:
            {{- if .Values.postgres.external.dsnSecretRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                  key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
            {{- end }}
            {{- if .Values.redis.external.passwordSecretRef.name }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.passwordSecretRef.name | quote }}
                  key: {{ .Values.redis.external.passwordSecretRef.key | quote }}
            {{- end }}
            {{- if .Values.redis.external.address }}
            - name: REDIS_URL
              value: {{ include "astronomer.redisURL" . | quote }}
            {{- end }}
            {{- with .Values.worker.env }}
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if .Values.worker.affinity.enabled }}
      affinity:
        {{- include "astronomer.componentAffinity" (dict "context" . "component" "worker" "enabled" .Values.worker.affinity.enabled) | nindent 8 }}
      {{- end }}
      {{- if .Values.worker.topologySpread.enabled }}
      topologySpreadConstraints:
        {{- include "astronomer.componentTopologySpread" (dict "context" . "component" "worker" "enabled" .Values.worker.topologySpread.enabled "maxSkew" .Values.worker.topologySpread.maxSkew "whenUnsatisfiable" .Values.worker.topologySpread.whenUnsatisfiable) | nindent 8 }}
      {{- end }}
