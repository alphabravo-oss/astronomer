{{- if .Values.crds.enabled }}
# CRD-mirror API — Cluster.management.astronomer.io/v1alpha1.
#
# Mirrors the operator-tunable subset of the `clusters` table. When
# crds.enabled=true, the server pod runs a controller-runtime manager that
# upserts the DB row from the CR spec and reflects DB-side state back onto
# .status. The REST API stays the source of truth for fields not surfaced
# here (cluster_health_status, last_heartbeat, etc.). See docs/crd-api.md
# for the operator UX.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    # Helm uninstall would delete the CRD by default, taking every CR (and
    # the operator-managed clusters they describe) with it. Keep it across
    # uninstall so the operator can re-install without losing state. The
    # field is namespaced, so re-install picks up existing CRs unchanged.
    "helm.sh/resource-policy": keep
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: clusters
    singular: cluster
    kind: Cluster
    listKind: ClusterList
    shortNames:
      - astrocluster
    categories:
      - astronomer
  # Multi-version serving: v1alpha1 and v1beta1 are both served with an
  # identical schema (identity conversion — the Go types are shared verbatim,
  # see internal/crd/types.go). v1alpha1 stays the storage version so existing
  # stored objects are untouched by the promotion. No conversion webhook is
  # needed while the schemas are byte-identical. See docs/crd-versioning.md.
  versions:
    {{- range $v := list (dict "name" "v1alpha1" "storage" true) (dict "name" "v1beta1" "storage" false) }}
    - name: {{ $v.name }}
      served: true
      storage: {{ $v.storage }}
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  pattern: '^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$'
                displayName:
                  type: string
                description:
                  type: string
                environment:
                  type: string
                  enum:
                    - production
                    - staging
                    - development
                region:
                  type: string
                provider:
                  type: string
                distribution:
                  type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
                annotations:
                  type: object
                  additionalProperties:
                    type: string
                projectRefs:
                  type: array
                  items:
                    type: string
                argocd:
                  type: object
                  properties:
                    autoAdopt:
                      type: boolean
                    instanceRef:
                      type: string
                baseline:
                  type: object
                  properties:
                    profile:
                      type: string
                      enum:
                        - default
                        - minimal
                        - none
                agent:
                  type: object
                  properties:
                    privilegeProfile:
                      type: string
                      enum:
                        - viewer
                        - operator
                        - namespace-viewer
                        - namespace-operator
                        - custom
                        - admin
                    profileRef:
                      type: string
                adoptionPolicy:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum:
                        - manual
                        - auto
                    allowedManagementModes:
                      type: array
                      items:
                        type: string
                        enum:
                          - argocd
                          - helm
                          - manual
            status:
              type: object
              properties:
                clusterId:
                  type: string
                phase:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
                agentVersion:
                  type: string
                observedProjectRefs:
                  type: array
                  items:
                    type: string
                argocd:
                  type: object
                  properties:
                    phase:
                      type: string
                      enum:
                        - pending
                        - registering
                        - registered
                        - failed
                        - disabled
                    clusterSecretName:
                      type: string
                    conditions:
                      type: array
                      items:
                        type: object
                        required:
                          - type
                          - status
                        properties:
                          type:
                            type: string
                          status:
                            type: string
                            enum:
                              - "True"
                              - "False"
                              - Unknown
                          reason:
                            type: string
                          message:
                            type: string
                          observedGeneration:
                            type: integer
                            format: int64
                          lastTransitionTime:
                            type: string
                            format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Environment
          type: string
          jsonPath: .spec.environment
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ArgoCD
          type: string
          jsonPath: .status.argocd.phase
        - name: ClusterID
          type: string
          jsonPath: .status.clusterId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
    {{- end }}
{{- end }}
