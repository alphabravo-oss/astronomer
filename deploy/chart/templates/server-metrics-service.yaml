apiVersion: v1
kind: Service
metadata:
  name: {{ include "astronomer.fullname" . }}-server-metrics
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "server") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "astronomer.componentSelectorLabels" (dict "context" . "component" "server") | nindent 4 }}
