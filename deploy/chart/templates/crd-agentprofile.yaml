{{- if .Values.crds.enabled }}
# AgentProfile.management.astronomer.io/v1alpha1
#
# Declarative security and capability profile for adopted-cluster agents.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentprofiles.management.astronomer.io
  labels:
    {{- include "astronomer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    management.astronomer.io/finalizer: management.astronomer.io/agentprofile-cleanup
spec:
  group: management.astronomer.io
  scope: Namespaced
  names:
    plural: agentprofiles
    singular: agentprofile
    kind: AgentProfile
    listKind: AgentProfileList
    shortNames:
      - astroagentprofile
    categories:
      - astronomer
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - privilegeProfile
              properties:
                privilegeProfile:
                  type: string
                  enum:
                    - viewer
                    - operator
                    - namespace-viewer
                    - namespace-operator
                    - custom
                    - admin
                namespaceScope:
                  type: array
                  items:
                    type: string
                capabilities:
                  type: object
                  additionalProperties:
                    type: boolean
                allowedRules:
                  type: array
                  items:
                    type: object
                    properties:
                      apiGroups:
                        type: array
                        items:
                          type: string
                      resources:
                        type: array
                        items:
                          type: string
                      verbs:
                        type: array
                        items:
                          type: string
                      resourceNames:
                        type: array
                        items:
                          type: string
                hostAccess:
                  type: object
                  properties:
                    hostNetwork:
                      type: boolean
                    hostPID:
                      type: boolean
                    hostPathPrefixes:
                      type: array
                      items:
                        type: string
                networkEgress:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum:
                        - default
                        - restricted
                        - blocked
                        - custom
                    allowedCIDRs:
                      type: array
                      items:
                        type: string
                    allowedHosts:
                      type: array
                      items:
                        type: string
                install:
                  type: object
                  properties:
                    image:
                      type: string
                    serviceAccountName:
                      type: string
                    podLabels:
                      type: object
                      additionalProperties:
                        type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Degraded
                    - Invalid
                lastReconciled:
                  type: string
                  format: date-time
                effectiveRBAC:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Profile
          type: string
          jsonPath: .spec.privilegeProfile
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
