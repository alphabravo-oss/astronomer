{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "astronomer.fullname" . }}-migrate
  labels:
    {{- include "astronomer.componentLabels" (dict "context" . "component" "migrate") | nindent 4 }}
  annotations:
    # Re-runnable on every release; deleted on the next install/upgrade.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "astronomer.componentLabels" (dict "context" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "astronomer.serviceAccountName" . }}
      {{- with .Values.migrate.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Wait for the chart-bundled Postgres pod to accept connections
      # before launching the migrate container. helm post-install hooks
      # fire after the StatefulSet is *created* but not necessarily
      # *ready*, so without this wait the migrate races against
      # postgres startup and BackoffLimitExceeded'd within ~60s on
      # fresh installs.
      initContainers:
        {{- if eq (include "astronomer.postgresBundledEnabled" .) "true" }}
        - name: wait-postgres
          {{- with .Values.migrate.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.thirdPartyImage" (dict "repository" .Values.utilities.busybox.repository "tag" .Values.utilities.busybox.tag "registry" .Values.utilities.busybox.registry "fallback" .Values.image.registry) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z {{ include "astronomer.fullname" . }}-postgres 5432; do sleep 1; done
              echo "postgres up"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
      containers:
        - name: migrate
          {{- with .Values.migrate.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "astronomer.image" (dict "context" . "component" "migrate") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            - name: HOME
              value: /tmp
            {{- if .Values.postgres.external.dsnSecretRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.dsnSecretRef.name | quote }}
                  key: {{ .Values.postgres.external.dsnSecretRef.key | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "astronomer.fullname" . }}-config
                  key: DATABASE_URL
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
