# Minimal reverse proxy in front of the astronomer-go server.
# Used for `make dev` parity with deployments behind nginx ingress.

worker_processes auto;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"agent":"$http_user_agent",'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_time":"$upstream_response_time"'
        '}';

    access_log /dev/stdout json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    # WebSocket-aware Connection upgrade map (used by tunnel endpoints).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream astronomer_server {
        server server:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Health endpoint passes straight through.
        location = /health/ {
            proxy_pass http://astronomer_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Defense in depth (security review H4): the server-internal
        # cross-pod PSK door at /internal/tunnel/{k8s,helm}/* performs
        # cluster mutations with no per-user authz. It must NEVER be
        # reachable from outside the pod network. Hard-deny the whole
        # /internal/ prefix here so the catch-all `location /` below
        # cannot forward it to the upstream server.
        location /internal/ {
            return 404;
        }

        location / {
            proxy_pass http://astronomer_server;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (agent tunnel).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffering     off;
        }
    }
}
