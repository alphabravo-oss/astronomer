services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: astronomer
      POSTGRES_PASSWORD: astronomer
      POSTGRES_DB: astronomer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astronomer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgres://astronomer:astronomer@postgres:5432/astronomer?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DJANGO_SECRET_KEY: local-dev-secret-key-change-in-production
      DJANGO_ENV: development
      DJANGO_DEBUG: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
