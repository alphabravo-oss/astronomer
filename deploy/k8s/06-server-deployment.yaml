apiVersion: apps/v1
kind: Deployment
metadata:
  name: astronomer-server
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: astronomer-go-server:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            # L19: needed for the cross-pod tunnel locator if this is ever scaled
            # past replicas:1 — without it a multi-replica deployment silently
            # disables cross-pod proxy and non-owning replicas 503.
            - name: ASTRONOMER_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: astronomer-config
            - secretRef:
                name: astronomer-secrets
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
