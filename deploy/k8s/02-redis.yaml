# Redis for local/dev only.
apiVersion: v1
kind: Service
metadata:
  name: astronomer-redis
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: astronomer-redis
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: redis
spec:
  serviceName: astronomer-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
