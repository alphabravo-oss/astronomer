# DEV-ONLY plaintext secrets. Replace with sealed-secrets / external-secrets for prod.
apiVersion: v1
kind: Secret
metadata:
  name: astronomer-secrets
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
type: Opaque
stringData:
  SECRET_KEY: "local-dev-secret-key-change-in-production"
  # The Go config reads the Fernet key as ASTRONOMER_ENCRYPTION_KEY
  # (mapstructure:"astronomer_encryption_key"); bare ENCRYPTION_KEY is never
  # read. This is the chart's known dev Fernet key — the production preflight
  # refuses it, so an operator can't accidentally ship it.
  ASTRONOMER_ENCRYPTION_KEY: "RX3rwYkQNmaSq4_UmGs7sPXONIjnB-M6q0gZtB79vQA="
  POSTGRES_PASSWORD: "astronomer"
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
