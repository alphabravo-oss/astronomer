# Postgres for local/dev only. Replace with a managed DB for anything else.
apiVersion: v1
kind: Service
metadata:
  name: astronomer-postgres
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: astronomer-postgres
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: postgres
spec:
  serviceName: astronomer-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: astronomer
            - name: POSTGRES_DB
              value: astronomer
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: astronomer-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "astronomer"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
