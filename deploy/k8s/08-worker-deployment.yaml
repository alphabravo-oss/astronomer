apiVersion: apps/v1
kind: Deployment
metadata:
  name: astronomer-worker
  namespace: astronomer
  labels:
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: astronomer-go-worker:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: astronomer-config
            - secretRef:
                name: astronomer-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
