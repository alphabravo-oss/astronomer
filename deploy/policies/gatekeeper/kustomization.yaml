# Astronomer starter Gatekeeper policy bundle.
# Apply after the Gatekeeper engine is installed:
#   kubectl apply -k deploy/policies/gatekeeper/
# kustomize preserves file order, so templates (which register the constraint
# CRDs) are applied before the constraints that depend on them.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 01-template-privileged.yaml
  - 02-constraint-privileged.yaml
  - 03-template-disallow-latest.yaml
  - 04-constraint-disallow-latest.yaml
  - 05-template-required-labels.yaml
  - 06-constraint-required-labels.yaml
