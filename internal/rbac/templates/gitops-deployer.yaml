name: gitops-deployer
display_name: GitOps Deployer
description: |
  Triggers and inspects GitOps deployments for a project. Cannot edit
  global ArgoCD instances, repositories, or cluster registration.
scope: project
category: gitops
risk_level: high
rules:
  - resource: projects
    verbs: [read]
  - resource: argocd
    verbs: [read, list, sync]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list, watch, logs]

