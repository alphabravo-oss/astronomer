name: secret-manager
display_name: Secret Manager
description: |
  Manages Kubernetes Secret objects within a project. This is high-risk
  because secrets can contain credentials for external systems.
scope: project
category: security
risk_level: critical
rules:
  - resource: projects
    verbs: [read]
  - resource: secrets
    verbs: [create, read, update, delete, list]
  - resource: workloads
    verbs: [read, list, restart]
  - resource: pods
    verbs: [read, list]

