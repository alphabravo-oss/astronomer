name: service-ingress-manager
display_name: Service and Ingress Manager
description: |
  Manages Services, Ingresses, Gateway-style entry points, and service
  proxy exposure within a project.
scope: project
category: networking
risk_level: high
rules:
  - resource: projects
    verbs: [read]
  - resource: services
    verbs: [create, read, update, delete, list, proxy]
  - resource: ingresses
    verbs: [create, read, update, delete, list]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list]

