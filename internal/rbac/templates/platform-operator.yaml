name: platform-operator
display_name: Platform Operator
description: |
  Operates day-2 platform workflows across adopted clusters without
  granting full RBAC, user, SSO, or destructive platform administration.
scope: global
category: operations
risk_level: high
rules:
  - resource: clusters
    verbs: [create, read, update, list]
  - resource: agents
    verbs: [create, read, update, list]
  - resource: projects
    verbs: [create, read, update, list]
  - resource: workloads
    verbs: [read, list]
  - resource: nodes
    verbs: [read, list]
  - resource: services
    verbs: [read, list]
  - resource: ingresses
    verbs: [read, list]
  - resource: storage
    verbs: [read, list]
  - resource: configmaps
    verbs: [read, list]
  - resource: network_policies
    verbs: [read, list]
  - resource: monitoring
    verbs: [read, list]
  - resource: alerts
    verbs: [create, read, update, list]
  - resource: catalog
    verbs: [read, list]
  - resource: backups
    verbs: [create, read, update, list]
  # Read-only on built-in workloads/services/configmaps, so likewise read-only
  # on CRD-backed objects — global-scope write across every cluster's custom
  # resources would exceed this role's day-2 (non-destructive) posture.
  - resource: custom_resources
    verbs: [read, list, watch]
  - resource: audit_logs
    verbs: [read, list]
