name: compliance-auditor
display_name: Compliance Auditor
description: |
  Read-only visibility tuned for compliance reviews: full audit-log
  access, security posture, baseline policy state, RBAC binding inspection.
  Apply at the global scope so the auditor can see across the fleet.
scope: global
category: audit
rules:
  - resource: clusters
    verbs: [read, list]
  - resource: projects
    verbs: [read, list]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list]
  - resource: monitoring
    verbs: [read, list]
  - resource: alerts
    verbs: [read, list]
  - resource: backups
    verbs: [read, list]
  - resource: security
    verbs: [read, list]
  - resource: audit_logs
    verbs: [read, list]
  - resource: rbac
    verbs: [read, list]
  - resource: users
    verbs: [read, list]
  - resource: sso
    verbs: [read, list]
  - resource: settings
    verbs: [read, list]
