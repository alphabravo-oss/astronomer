name: catalog-installer
display_name: Catalog Installer
description: |
  Installs and upgrades approved catalog tools in one cluster. Cannot
  edit global repositories or catalog metadata.
scope: cluster
category: catalog
risk_level: high
rules:
  - resource: clusters
    verbs: [read]
  - resource: catalog
    verbs: [read, list, create, update, delete]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list, watch, logs]

