name: support-engineer
display_name: Support Engineer
description: |
  Read-everything + pod-level diagnostics (logs, exec) so support can
  reproduce and triage customer issues without granting any
  configuration mutation. Apply at the global scope.
scope: global
category: support
rules:
  - resource: clusters
    verbs: [read, list]
  - resource: projects
    verbs: [read, list]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list, watch, logs, exec]
  - resource: nodes
    verbs: [read, list]
  - resource: services
    verbs: [read, list]
  - resource: ingresses
    verbs: [read, list]
  - resource: storage
    verbs: [read, list]
  - resource: configmaps
    verbs: [read, list]
  - resource: network_policies
    verbs: [read, list]
  - resource: monitoring
    verbs: [read, list]
  - resource: alerts
    verbs: [read, list]
  - resource: catalog
    verbs: [read, list]
  - resource: backups
    verbs: [read, list]
  - resource: security
    verbs: [read, list]
  - resource: audit_logs
    verbs: [read, list]
  - resource: agents
    verbs: [read, list]
