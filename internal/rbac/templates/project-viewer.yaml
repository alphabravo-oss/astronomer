name: project-viewer
display_name: Project Viewer
description: |
  Read-only inside a project. Sees workloads, monitoring, alerts, and
  audit data but cannot mutate anything. The cheapest grant for
  stakeholders who just need to look.
scope: project
category: project
rules:
  - resource: projects
    verbs: [read, list]
  - resource: workloads
    verbs: [read, list]
  - resource: pods
    verbs: [read, list, watch, logs]
  - resource: monitoring
    verbs: [read, list]
  - resource: alerts
    verbs: [read, list]
  - resource: catalog
    verbs: [read, list]
  - resource: argocd
    verbs: [read, list]
