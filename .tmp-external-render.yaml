apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-astronomer-server
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: server
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        helm.sh/chart: astronomer-0.1.0
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: astronomer
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: release-name-astronomer
      initContainers:
        - name: migrate
          image: "astronomer-go-migrate:dev"
          imagePullPolicy: IfNotPresent
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: release-name-astronomer-config
                  key: DATABASE_URL
      containers:
        - name: server
          image: "astronomer-go-server:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: release-name-astronomer-config
            - secretRef:
                name: release-name-astronomer-secrets
          env:
            - name: REDIS_URL
              value: "redis://redis.example:6379/0"
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
      affinity:
        
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: astronomer
                    app.kubernetes.io/instance: release-name
                    app.kubernetes.io/component: server
      topologySpreadConstraints:
        
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: astronomer
              app.kubernetes.io/instance: release-name
              app.kubernetes.io/component: server
