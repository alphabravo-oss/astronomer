apiVersion: batch/v1
kind: Job
metadata:
  name: release-name-astronomer-preflight
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: preflight
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        helm.sh/chart: astronomer-0.1.0
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: astronomer
        app.kubernetes.io/component: preflight
    spec:
      restartPolicy: Never
      serviceAccountName: release-name-astronomer
      containers:
        - name: preflight
          image: "bitnami/kubectl:1.31.4"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              if [ "false" = "true" ]; then
                echo "Bundled Postgres remains enabled; preflight passes."
                exit 0
              fi

              legacy_pvc="data-release-name-astronomer-postgres-0"
              if kubectl get pvc "${legacy_pvc}" -n "default" >/dev/null 2>&1; then
                echo "Refusing upgrade: detected legacy bundled Postgres PVC ${legacy_pvc} in namespace default."
                echo "Externalize or migrate the database first. See docs/migrations/2026-05-postgres-cnpg.md."
                exit 1
              fi

              echo "No legacy bundled Postgres PVC detected; preflight passes."
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
