# Source: astronomer/templates/server-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-astronomer-server
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: server
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        helm.sh/chart: astronomer-0.1.0
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: astronomer
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: release-name-astronomer
      # FEATURES-051126 T14: graceful WS handover on rolling upgrades.
      # The preStop hook below sleeps 10s so the Service load balancer
      # has time to deregister this pod before SIGTERM lands. Combined
      # with Hub.Drain() in the server's Shutdown path, agents observe
      # a clean WS close and reconnect via the LB to a healthy sibling
      # in ~1s instead of waiting 20s for the next WS ping to fail.
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-postgres
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z release-name-astronomer-postgres 5432; do sleep 1; done
              echo "postgres up"
        - name: migrate
          image: "astronomer-go-migrate:dev"
          imagePullPolicy: IfNotPresent
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: release-name-astronomer-config
                  key: DATABASE_URL
      containers:
        - name: server
          image: "astronomer-go-server:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: release-name-astronomer-config
            - secretRef:
                name: release-name-astronomer-secrets
          env:
            # Pod IP is the address sibling replicas use to reverse-proxy
            # tunnel-bound requests (kubectl shell, k8s passthrough, image
            # scans) to whichever pod holds the agent's WebSocket. Without
            # this the nginx-pinned upstream pod 503s every cross-pod
            # request because the in-memory hub is single-replica.
            - name: ASTRONOMER_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ASTRONOMER_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-astronomer-bootstrap
                  key: password
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          # FEATURES-051126 T14: pre-stop drain. The kubelet runs this
          # BEFORE delivering SIGTERM. Sleeping here gives the Service
          # load balancer time to remove the pod from endpoints (kube-
          # proxy iptables rules update on watch, typically <2s, but we
          # budget more for slow CNIs / userspace LBs). When SIGTERM
          # arrives the server's Shutdown() drains the tunnel hub so
          # agents reconnect to a sibling that's already taking traffic.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 10"
      affinity:
        
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: astronomer
                    app.kubernetes.io/instance: release-name
                    app.kubernetes.io/component: server
      topologySpreadConstraints:
        
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: astronomer
              app.kubernetes.io/instance: release-name
              app.kubernetes.io/component: server
