# Source: astronomer/templates/httproute.yaml
# API route — anything under /api/v1/ goes to the Go server, including the
# WebSocket tunnel at /api/v1/ws/...
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: release-name-astronomer-api
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: server
spec:
  parentRefs:
    - name: release-name-astronomer
  hostnames:
    - "astronomer.localtest.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /health/
        - path:
            type: Exact
            value: /health
        - path:
            type: Exact
            value: /metrics
        # The auth-gated reverse proxy that fronts the ArgoCD UI lives on
        # the Go server (internal/handler/argocd_ui_proxy.go), so route
        # /argocd/* to the same backend as /api/*. Enforces Astronomer auth
        # via cookie or bearer header before forwarding upstream.
        - path:
            type: PathPrefix
            value: /argocd/
        - path:
            type: Exact
            value: /argocd
      backendRefs:
        - name: release-name-astronomer-server
          port: 8000
