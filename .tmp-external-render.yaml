# Source: astronomer/templates/migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: release-name-astronomer-migrate
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: migrate
  annotations:
    # Re-runnable on every release; deleted on the next install/upgrade.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        helm.sh/chart: astronomer-0.1.0
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: astronomer
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: release-name-astronomer
      # Wait for the chart-bundled Postgres pod to accept connections
      # before launching the migrate container. helm post-install hooks
      # fire after the StatefulSet is *created* but not necessarily
      # *ready*, so without this wait the migrate races against
      # postgres startup and BackoffLimitExceeded'd within ~60s on
      # fresh installs.
      initContainers:
        - name: wait-postgres
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres..."
              until nc -z release-name-astronomer-postgres 5432; do sleep 1; done
              echo "postgres up"
      containers:
        - name: migrate
          image: "astronomer-go-migrate:dev"
          imagePullPolicy: IfNotPresent
          args:
            - "-database"
            - "$(DATABASE_URL)"
            - "-path"
            - "/migrations"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: release-name-astronomer-config
                  key: DATABASE_URL
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
