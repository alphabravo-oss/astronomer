apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: release-name-astronomer-postgres
  labels:
    helm.sh/chart: astronomer-0.1.0
    app.kubernetes.io/name: astronomer
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: astronomer
    app.kubernetes.io/component: postgres
spec:
  serviceName: release-name-astronomer-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astronomer
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        helm.sh/chart: astronomer-0.1.0
        app.kubernetes.io/name: astronomer
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: astronomer
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:16-alpine"
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "astronomer"
            - name: POSTGRES_DB
              value: "astronomer"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-astronomer-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "astronomer"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "astronomer"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
