name: pr-validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: enterprise backend gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Backend contract checks consume js-yaml from the locked frontend tree.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install contract dependencies
        working-directory: frontend
        run: npm ci

      - name: Migration roundtrip smoke (TEST-05)
        run: ./scripts/migrate-roundtrip-smoke.sh
        env:
          # Job uses service container when present; script also self-starts docker PG.
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run authoritative backend gate
        run: ./scripts/verify-enterprise.sh backend
        env:
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-backend

      - name: Upload failed backend test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-backend-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-backend
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: enterprise frontend gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run authoritative frontend gate
        run: ./scripts/verify-enterprise.sh frontend
        env:
          # Preserve the existing moderate threshold, which is stricter than
          # the enterprise high/critical minimum.
          NPM_AUDIT_LEVEL: moderate
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-frontend

      - name: Upload failed frontend test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-frontend-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-frontend
          if-no-files-found: warn
          retention-days: 14

  frontend-e2e:
    name: Playwright end-to-end tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Route-smoke crawl
        run: npm run test:e2e:smoke
        env:
          # P7.3: the crawl also writes one full-page screenshot per route to
          # frontend/gallery/ for the reviewer eyeball (non-blocking).
          SMOKE_GALLERY: "1"

      - name: Upload screenshot gallery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-gallery
          path: frontend/gallery/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

  # P7.2 live e2e tier: the 4 live specs run against a REAL Go backend
  # (postgres + redis services, bootstrap admin, SSE bus) through the vite
  # preview proxy. Parallel with the frontend job; runtime budget ≤6 min.
  frontend-e2e-live:
    name: frontend live e2e
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astronomer
          POSTGRES_PASSWORD: astronomer
          POSTGRES_DB: astronomer
        # 5433 matches the Makefile's DATABASE_URL default (compose port
        # offset convention), so `make migrate-up` needs no override.
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U astronomer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golang-migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1

      - name: Run migrations
        run: make migrate-up

      - name: Start Go server
        # Backgrounded; the process outlives the step. Env mirrors the
        # docker-compose dev values plus the bootstrap admin the live specs
        # log in as (EnsureBootstrapAdmin creates an immediately usable
        # admin@astronomer.local — no forced password reset).
        run: |
          go run ./cmd/server >server.log 2>&1 &
        env:
          DATABASE_URL: postgres://astronomer:astronomer@localhost:5433/astronomer?sslmode=disable
          REDIS_URL: redis://localhost:6380/0
          SECRET_KEY: local-dev-secret-key-change-in-production
          ASTRONOMER_ENCRYPTION_KEY: RX3rwYkQNmaSq4_UmGs7sPXONIjnB-M6q0gZtB79vQA=
          ENV: development
          DEBUG: "true"
          ALLOWED_HOSTS: "*"
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          LOG_LEVEL: debug
          ASTRONOMER_BOOTSTRAP_PASSWORD: e2e-live-password

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy" >&2
          tail -n 100 server.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Live end-to-end tests
        working-directory: frontend
        run: npx playwright test --project=live
        env:
          BACKEND_URL: http://localhost:8000

      - name: Upload live Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live
          path: frontend/playwright-report
          retention-days: 14

      - name: Server log on failure
        if: failure()
        run: tail -n 200 server.log

  helm:
    name: enterprise Helm gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run authoritative Helm gate
        run: ./scripts/verify-enterprise.sh helm
        env:
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-helm

      - name: Upload failed Helm renders and reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-helm-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-helm
          if-no-files-found: warn
          retention-days: 14

  container-supply-chain:
    name: image scan and sbom
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: server, context: ., dockerfile: deploy/docker/Dockerfile.server, image: astronomer-go-server }
          - { name: worker, context: ., dockerfile: deploy/docker/Dockerfile.worker, image: astronomer-go-worker }
          - { name: agent, context: ., dockerfile: deploy/docker/Dockerfile.agent, image: astronomer-go-agent }
          - { name: migrate, context: ., dockerfile: deploy/docker/Dockerfile.migrate, image: astronomer-go-migrate }
          - { name: shell, context: ., dockerfile: deploy/docker/Dockerfile.shell, image: astronomer-shell }
          - { name: frontend, context: frontend, dockerfile: frontend/Dockerfile, image: astronomer-frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          load: true
          tags: ${{ matrix.component.image }}:ci
          provenance: false
          sbom: false

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.component.image }}:ci
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.16.0"

      - name: Generate SBOM
        run: |
          syft ${{ matrix.component.image }}:ci \
            -o spdx-json \
            > sbom-${{ matrix.component.name }}.spdx.json
          test -s sbom-${{ matrix.component.name }}.spdx.json
          python3 -c "import json; json.load(open('sbom-${{ matrix.component.name }}.spdx.json'))"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component.name }}-${{ github.sha }}
          path: sbom-${{ matrix.component.name }}.spdx.json
          retention-days: 30
