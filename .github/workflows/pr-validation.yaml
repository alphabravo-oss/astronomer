name: pr-validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: enterprise backend gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Backend contract checks consume js-yaml from the locked frontend tree.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install contract dependencies
        working-directory: frontend
        run: npm ci

      - name: Migration roundtrip smoke (TEST-05)
        run: ./scripts/migrate-roundtrip-smoke.sh
        env:
          # Job uses service container when present; script also self-starts docker PG.
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run authoritative backend gate
        run: ./scripts/verify-enterprise.sh backend
        env:
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-backend

      - name: Upload failed backend test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-backend-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-backend
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: enterprise frontend gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run authoritative frontend gate
        run: ./scripts/verify-enterprise.sh frontend
        env:
          # Preserve the existing moderate threshold, which is stricter than
          # the enterprise high/critical minimum.
          NPM_AUDIT_LEVEL: moderate
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-frontend

      - name: Upload failed frontend test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-frontend-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-frontend
          if-no-files-found: warn
          retention-days: 14

  frontend-e2e:
    name: Playwright end-to-end tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

  helm:
    name: enterprise Helm gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run authoritative Helm gate
        run: ./scripts/verify-enterprise.sh helm
        env:
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-enterprise-helm

      - name: Upload failed Helm renders and reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-helm-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-enterprise-helm
          if-no-files-found: warn
          retention-days: 14

  container-supply-chain:
    name: image scan and sbom
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: server, context: ., dockerfile: deploy/docker/Dockerfile.server, image: astronomer-go-server }
          - { name: worker, context: ., dockerfile: deploy/docker/Dockerfile.worker, image: astronomer-go-worker }
          - { name: agent, context: ., dockerfile: deploy/docker/Dockerfile.agent, image: astronomer-go-agent }
          - { name: migrate, context: ., dockerfile: deploy/docker/Dockerfile.migrate, image: astronomer-go-migrate }
          - { name: shell, context: ., dockerfile: deploy/docker/Dockerfile.shell, image: astronomer-shell }
          - { name: frontend, context: frontend, dockerfile: frontend/Dockerfile, image: astronomer-frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          load: true
          tags: ${{ matrix.component.image }}:ci
          provenance: false
          sbom: false

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.component.image }}:ci
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.16.0"

      - name: Generate SBOM
        run: |
          syft ${{ matrix.component.image }}:ci \
            -o spdx-json \
            > sbom-${{ matrix.component.name }}.spdx.json
          test -s sbom-${{ matrix.component.name }}.spdx.json
          python3 -c "import json; json.load(open('sbom-${{ matrix.component.name }}.spdx.json'))"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component.name }}-${{ github.sha }}
          path: sbom-${{ matrix.component.name }}.spdx.json
          retention-days: 30
