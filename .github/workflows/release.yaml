name: release

# FEATURES-051126 T12: signed images + SBOMs.
#
# Fires on tag push (e.g. `v0.2.0`). Builds the four chart-published
# first-party images, pushes them to GHCR, generates an SPDX SBOM per
# image with syft, and signs both the image and the attestation with keyless
# cosign (GitHub OIDC → Sigstore Fulcio).
#
# Verification runbook: docs/verify-images.md.
#
# Triggering manually (e.g. for a hotfix from a non-tag commit) is also
# allowed via workflow_dispatch — the resulting tag in the registry is
# the short SHA.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override image tag (default: short SHA on dispatch, ref name on tag)"
        required: false

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # cosign keyless via OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-sign:
    name: build · sign · attest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: server,   context: .,        dockerfile: deploy/docker/Dockerfile.server,  imageName: astronomer-go-server }
          - { name: worker,   context: .,        dockerfile: deploy/docker/Dockerfile.worker,  imageName: astronomer-go-worker }
          - { name: agent,    context: .,        dockerfile: deploy/docker/Dockerfile.agent,   imageName: astronomer-go-agent }
          - { name: migrate,  context: .,        dockerfile: deploy/docker/Dockerfile.migrate, imageName: astronomer-go-migrate }
          - { name: shell,    context: .,        dockerfile: deploy/docker/Dockerfile.shell,   imageName: astronomer-shell }
          - { name: frontend, context: frontend, dockerfile: frontend/Dockerfile,              imageName: astronomer-frontend }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi
          echo "buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          # Stamp version info into the binaries (Dockerfiles default these to
          # 'dev'/'unknown'; without this the agent self-test compatibility
          # check warns that the version isn't parseable semver).
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.tag.outputs.buildDate }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.component.imageName }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.component.imageName }}:latest
          # The digest output is what we'll sign — signing by mutable
          # tag is a forgery risk (the tag could change between push
          # and sign).
          provenance: mode=max
          # We attach our own SBOM below; the build-push-action's
          # default SBOM would duplicate it.
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign image (keyless via OIDC)
        env:
          # COSIGN_EXPERIMENTAL is no longer required with cosign v2 but
          # the env var is harmless and makes the intent explicit.
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.component.imageName }}@${{ steps.build.outputs.digest }}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "v1.16.0"

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft \
            "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.component.imageName }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json \
            > sbom-${{ matrix.component.name }}.spdx.json
          # Sanity: the file is non-empty and valid JSON
          test -s sbom-${{ matrix.component.name }}.spdx.json
          python3 -c "import json,sys; json.load(open('sbom-${{ matrix.component.name }}.spdx.json'))"

      - name: Attest SBOM with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.component.name }}.spdx.json \
            --type spdxjson \
            "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.component.imageName }}@${{ steps.build.outputs.digest }}"

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component.name }}-${{ steps.tag.outputs.tag }}
          path: sbom-${{ matrix.component.name }}.spdx.json
          retention-days: 90

  publish-chart:
    name: package · push helm chart (OCI)
    needs: build-sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push OCI chart to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Derive versions
        id: ver
        run: |
          # imageTag must match what build-sign pushed (ref name on a tag,
          # the dispatch input, else the short SHA). chartVersion is the same
          # value normalised to semver (helm chart versions can't carry a 'v').
          if [ -n "${{ inputs.tag }}" ]; then
            IMG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            IMG="${{ github.ref_name }}"
          else
            IMG="$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          CHART="${IMG#v}"
          # A bare short-SHA isn't semver — wrap it as a 0.0.0 prerelease.
          case "$CHART" in
            [0-9]*.[0-9]*.[0-9]*) : ;;
            *) CHART="0.0.0-${CHART}" ;;
          esac
          echo "imageTag=$IMG" >> $GITHUB_OUTPUT
          echo "chartVersion=$CHART" >> $GITHUB_OUTPUT

      - name: Pin chart + first-party image tags to the release
        run: |
          IMG="${{ steps.ver.outputs.imageTag }}"
          CHART="${{ steps.ver.outputs.chartVersion }}"
          # Chart version (semver) + appVersion (human/image tag).
          sed -i "s/^version:.*/version: ${CHART}/" deploy/chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${IMG}\"/" deploy/chart/Chart.yaml
          # Only first-party images use `tag: dev`; pin them to the image tag.
          # Third-party tags (16-alpine, 1.36, …) are untouched.
          sed -i "s/^\(\s*\)tag: dev$/\1tag: \"${IMG}\"/" deploy/chart/values.yaml
          echo "Pinned chart ${CHART} / images ${IMG}:"
          grep -nE "^version:|^appVersion:" deploy/chart/Chart.yaml

      - name: Build chart dependencies
        # The argo-cd subchart is vendored under charts/ locally but gitignored,
        # so CI must fetch it before lint/package.
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm dependency build deploy/chart

      - name: Lint
        run: helm lint deploy/chart

      - name: Login · package · push (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm package deploy/chart --version "${{ steps.ver.outputs.chartVersion }}" --app-version "${{ steps.ver.outputs.imageTag }}"
          helm push "astronomer-${{ steps.ver.outputs.chartVersion }}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts
          echo "Pushed oci://ghcr.io/${{ github.repository_owner }}/charts/astronomer:${{ steps.ver.outputs.chartVersion }}"
