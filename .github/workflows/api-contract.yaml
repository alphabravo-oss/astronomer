name: api-contract

# Focused API contract gate. The authoritative command is also used by
# `make verify`; detailed command output is retained as a failure artifact.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-contract:
    name: api contract gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The openapi .mjs scripts resolve js-yaml via createRequire from
      # frontend/package.json, so the frontend deps must be installed first.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run authoritative API contract gate
        run: ./scripts/verify-enterprise.sh api-contract
        env:
          VERIFY_ARTIFACT_DIR: ${{ runner.temp }}/astronomer-verify-api-contract

      - name: Upload failed API contract reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-failure-${{ github.sha }}
          path: ${{ runner.temp }}/astronomer-verify-api-contract
          if-no-files-found: warn
          retention-days: 14
