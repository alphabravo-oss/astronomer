name: large
clusters: 250
rps: 1500
duration: 60m
agents:
  mode: simulated
  reconnectStorm:
    enabled: true
    at: 20m
    batchPercent: 100
    jitter: 5m
resources:
  podsPerCluster: 1000
  deploymentsPerCluster: 200
  servicesPerCluster: 300
eventsPerSecond: 2000
day2FailureDrills:
  - agent_reconnect_storm
  - argo_applicationset_fanout
  - postgres_failover_or_pool_exhaustion
  - redis_outage_outbox_recovery
  - management_plane_ha_leader_kill
  - browser_resource_list_budget
