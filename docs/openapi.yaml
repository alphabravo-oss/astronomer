                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body / ID, or missing namespace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found, or namespace not in this project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encode or update failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/policy/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    patch:
      summary: Update project policy
      description: |
        Partial update of just the per-project policy fields
        (pod_security_profile and the three resource_quota_* limits). Omitted
        fields keep their current value. Blocked with 409 when the project is
        CRD-owned.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectPolicyRequest'
      responses:
        '200':
          description: Policy updated; updated project returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body / ID / pod_security_profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Project is CRD-owned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Update or ownership-check failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/quota-usage/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    get:
      summary: Live quota usage for a project
      description: |
        Fans out to each (cluster, namespace) the project owns and reads the
        managed `astronomer-project-quota` ResourceQuota's used + hard maps.
        Per-cluster errors are collected in `errors` rather than failing the
        whole response. Requires a configured cluster tunnel (503 otherwise).
      tags:
        - projects
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Per-namespace quota usage plus per-cluster errors.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                cluster_id:
                                  type: string
                                  format: uuid
                                cluster_name:
                                  type: string
                                namespace:
                                  type: string
                                used:
                                  type: object
                                  additionalProperties: true
                                  description: ResourceQuota status.used key/value pairs (e.g. cpu, memory, pods).
                                hard:
                                  type: object
                                  additionalProperties: true
                                  description: ResourceQuota status.hard (falls back to spec.hard) key/value pairs.
                          errors:
                            type: array
                            items:
                              type: object
                              properties:
                                cluster_id:
                                  type: string
                                  format: uuid
                                cluster_name:
                                  type: string
                                namespace:
                                  type: string
                                error:
                                  type: string
        '400':
          description: Invalid project ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to list project namespaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Cluster tunnel not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/rbac/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    get:
      summary: Project RBAC matrix
      description: |
        Returns the project's role bindings (capped at 500), each enriched with
        the role's name/display + the principal's display name, plus a summary
        with user/group counts and per-role counts.
      tags:
        - projects
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Bindings and summary for the project.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          project_id:
                            type: string
                            format: uuid
                          bindings:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                principal_kind:
                                  type: string
                                  enum:
                                    - user
                                    - group
                                principal_id:
                                  type: string
                                  description: User UUID for user bindings; omitted for groups.
                                principal_name:
                                  type: string
                                role_id:
                                  type: string
                                  format: uuid
                                role_name:
                                  type: string
                                role_display:
                                  type: string
                                is_builtin:
                                  type: boolean
                                created_at:
                                  type: string
                                  format: date-time
                          summary:
                            type: object
                            properties:
