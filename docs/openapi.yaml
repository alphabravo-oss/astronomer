            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: RBAC catalog:delete denied for the cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Installation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Blocked by an active maintenance window.
