openapi: 3.1.0
info:
  title: Astronomer Management API
  version: '1.0'
  summary: Multi-cluster Kubernetes management plane
  description: |
    REST API surface for the Astronomer management plane. Covers the
    cluster onboarding wizard, agent registration, image vulnerability
    scans, kubectl shell sessions, helm catalog, and platform admin.

    Auth: all endpoints under `/api/v1/` outside `/auth/` and the
    `/internal/` namespace require either a session JWT issued by
    POST `/auth/login/` or a personal API token. Pass the token as
    `Authorization: Bearer <token>`.

    RBAC: write endpoints check the caller's permissions against the
    platform RBAC engine. Routes annotated `superuser` require
    `users.is_superuser = true`; the rest gate on resource verbs
    (clusters:update, clusters:read, etc.).
  contact:
    name: Astronomer engineering
    url: https://github.com/alphabravocompany/astronomer-go
servers:
  - url: http://astronomer.5.78.101.247.nip.io:8080
    description: Live dev (.247)
  - url: http://localhost:8080
    description: Local
components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `POST /api/v1/auth/login/` (session token) or
        personal API token from `/api/v1/settings/tokens/`.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Alias of bearerJWT; session JWT or personal API token.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
    DataEnvelope:
      type: object
      description: Standard success envelope. The handler payload is nested under `data`.
      properties:
        data: {}
      required:
        - data
    ErrorEnvelope:
      type: object
      description: Standard error envelope.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
              description: Correlation id, present only when set by request middleware.
          required:
            - code
            - message
      required:
        - error
    PaginatedEnvelope:
      type: object
      description: DRF-style paginated list envelope. `data` is the page of items.
      properties:
        data:
          type: array
          items: {}
        count:
          type: integer
          format: int64
          description: Total number of items across all pages.
        next:
          type: string
          nullable: true
          description: URL of the next page, or null on the last page.
        previous:
          type: string
          nullable: true
          description: URL of the previous page, or null on the first page.
      required:
        - data
        - count
        - next
        - previous
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              description: Access JWT (~1h TTL)
            refresh:
              type: string
              description: Refresh JWT (~7d TTL)
            user:
              $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        is_active:
          type: boolean
        is_staff:
          type: boolean
        is_superuser:
          type: boolean
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
        must_change_password:
          type: boolean
    Cluster:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: RFC-1123 cluster slug
        display_name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - pending
            - active
            - disconnected
            - error
        environment:
          type: string
          enum:
            - production
            - staging
            - development
            - dev
        region:
          type: string
        provider:
          type: string
          description: eks / gke / aks / k3d / kind / other
        distribution:
          type: string
          description: vanilla / k3s / openshift / ...
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string
        registration_phase:
          type: string
          enum:
            - created
            - awaiting_agent
            - connected
            - provisioning
            - ready
            - failed
        install_baseline:
          type: boolean
          nullable: true
        agent_version:
          type: string
        kubernetes_version:
          type: string
        node_count:
          type: integer
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        is_local:
          type: boolean
        decommissioned_at:
          type: string
          format: date-time
          nullable: true
        agent_privilege_profile:
          type: string
          enum:
            - viewer
            - operator
            - namespace-viewer
            - namespace-operator
            - custom
            - admin
        cpu_percentage:
          type: number
        memory_percentage:
          type: number
        pod_count:
          type: integer
        argocd:
          type: object
          properties:
            registered:
              type: boolean
            instance_count:
              type: integer
            cluster_secret_names:
              type: array
              items:
                type: string
            baseline_managed_by:
              type: string
              enum:
                - argocd
                - argocd_pending
                - helm
                - local
                - unknown
            drift:
              type: object
              properties:
                app_count:
                  type: integer
                synced_count:
                  type: integer
                out_of_sync_count:
                  type: integer
                unknown_sync_count:
                  type: integer
                healthy_count:
                  type: integer
                progressing_count:
                  type: integer
                degraded_count:
                  type: integer
                unknown_health_count:
                  type: integer
                resource_created_count:
                  type: integer
                resource_changed_count:
                  type: integer
                resource_pruned_count:
                  type: integer
                last_synced:
                  type: string
                  format: date-time
                  nullable: true
                last_error:
                  type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateClusterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: RFC-1123 slug; must be lowercase + hyphens
        display_name:
          type: string
        description:
          type: string
        environment:
          type: string
        region:
          type: string
        provider:
          type: string
        distribution:
          type: string
    RegistrationStatus:
      type: object
      properties:
        cluster_id:
          type: string
          format: uuid
        phase:
          type: string
          enum:
            - created
            - awaiting_agent
            - connected
            - provisioning
            - ready
            - failed
        install_baseline:
          type: boolean
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationStep'
    RegistrationStep:
      type: object
      properties:
        id:
          type: string
          format: uuid
        step_name:
          type: string
        label:
          type: string
        status:
          type: string
          enum:
            - pending
            - running
            - success
            - failed
            - skipped
        progress_pct:
          type: integer
          minimum: 0
          maximum: 100
        detail:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
        step_order:
          type: integer
        created_at:
          type: string
          format: date-time
    ArgoOrphanApplication:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        component_slug:
          type: string
        application_set_name:
          type: string
        destination_cluster:
          type: string
        destination_namespace:
          type: string
        reason:
          type: string
          enum:
            - missing_destination
            - stale_destination_cluster
            - live_missing_destination
            - live_stale_destination_cluster
            - stale_applicationset_metadata
        source:
          type: string
          enum:
            - cache
            - live
        message:
          type: string
    ArgoOrphanReport:
      type: object
      properties:
        instance_id:
          type: string
          format: uuid
        application_count:
          type: integer
        cached_application_count:
          type: integer
        live_application_count:
          type: integer
        managed_target_count:
          type: integer
        orphan_application_count:
          type: integer
        orphan_applications:
          type: array
          items:
            $ref: '#/components/schemas/ArgoOrphanApplication'
        live_error:
          type: string
        generated_at:
          type: string
          format: date-time
    SetOptionsRequest:
      type: object
      required:
        - install_baseline
      properties:
        install_baseline:
          type: boolean
    VulnSummary:
      type: object
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        unknown:
          type: integer
        report_count:
          type: integer
        last_scanned_at:
          type: string
          format: date-time
          nullable: true
    VulnImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cluster_id:
          type: string
          format: uuid
        report_name:
          type: string
        namespace:
          type: string
        workload_kind:
          type: string
        workload_name:
          type: string
        container_name:
          type: string
        image_registry:
          type: string
        image_repo:
          type: string
        image_tag:
          type: string
        image_digest:
          type: string
        scanner:
          type: string
        scanner_version:
          type: string
        critical_count:
          type: integer
        high_count:
          type: integer
        medium_count:
          type: integer
        low_count:
          type: integer
        unknown_count:
          type: integer
        scanned_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    KubectlSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cluster_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - starting
            - active
            - closed
            - expired
            - failed
        pod_name:
          type: string
        pod_namespace:
          type: string
        container:
          type: string
        started_at:
          type: string
          format: date-time
        last_input_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        idle_timeout_seconds:
          type: integer
    OwnershipTransferResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        managed_by:
          type: string
          enum:
            - api
            - ui
            - crd
            - system
            - argocd
        transferred:
          type: boolean
    FeatureFlags:
      type: object
      additionalProperties: false
      properties:
        feature.catalog:
          type: boolean
        feature.projects:
          type: boolean
        feature.monitoring:
          type: boolean
        feature.argocd:
          type: boolean
        feature.security:
          type: boolean
        feature.backups:
          type: boolean
    ExtensionManifest:
      type: object
      required:
        - apiVersion
        - name
        - version
        - compatibleAstronomer
        - entry
        - permissions
        - extensionPoints
      properties:
        apiVersion:
          type: string
          enum:
            - extensions.astronomer.io/v1alpha1
        name:
          type: string
        displayName:
          type: string
        version:
          type: string
        compatibleAstronomer:
          type: string
        entry:
          type: string
        permissions:
          type: array
          items:
            type: string
        extensionPoints:
          type: object
          additionalProperties: true
    ExtensionValidation:
      type: object
      properties:
        valid:
          type: boolean
        compatibility_status:
          type: string
          enum:
            - compatible
            - incompatible
            - unknown
        checksum:
          type: string
        manifest:
          $ref: '#/components/schemas/ExtensionManifest'
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    ExtensionRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        version:
          type: string
        source:
          type: string
        checksum:
          type: string
        enabled:
          type: boolean
        compatibility_status:
          type: string
        manifest:
          $ref: '#/components/schemas/ExtensionManifest'
        installed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExtensionMount:
      type: object
      description: >-
        Render-only projection of one enabled extension point for the host
        loader. Upstream dataSource paths/methods/rbac are NOT exposed; only the
        dataSource id + shape cross to the browser.
      properties:
        extension:
          type: string
        displayName:
          type: string
        point:
          type: string
          enum:
            - sidebar
            - dashboardWidget
            - clusterTab
            - settingsPage
        pointId:
          type: string
        title:
          type: string
        tier:
          type: integer
          description: 1 = declarative (Tier 1), 2 = signed bundle (Tier 2).
          enum:
            - 1
            - 2
        render:
          type: object
          additionalProperties: true
        dataSources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              shape:
                type: string
    ExtensionMountsResponse:
      type: object
      description: >-
        Enabled-extensions surface (§HostMounts), indexed by mount point. Only
        enabled, compatible extensions appear; Tier-2 points additionally
        require a verified bundle.
      properties:
        sidebar:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionMount'
        dashboardWidgets:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionMount'
        clusterTabs:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionMount'
        settings:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionMount'
    ServiceMeshInventory:
      type: object
      properties:
        cluster_id:
          type: string
          format: uuid
        mesh:
          type: string
        total_count:
          type: integer
        notice:
          type: string
        resources:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
              api_version:
                type: string
              plural:
                type: string
              count:
                type: integer
              notice:
                type: string
              items:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    managed_by:
                      type: string
                    read_only:
                      type: boolean
                    reason:
                      type: string
    ServiceMeshPolicyValidation:
      type: object
      properties:
        cluster_id:
          type: string
          format: uuid
        valid:
          type: boolean
        api_version:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        managed_by:
          type: string
        read_only:
          type: boolean
        apply_allowed:
          type: boolean
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    AgentOfflineBehavior:
      type: object
      properties:
        state:
          type: string
        last_known_at:
          type: string
          format: date-time
          nullable: true
        stale:
          type: boolean
        message:
          type: string
        permitted_queued_operations:
          type: array
          items:
            type: string
        blocked_operations:
          type: array
          items:
            type: string
    AgentFleetItem:
      type: object
      properties:
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        cluster_display_name:
          type: string
        cluster_status:
          type: string
        is_local:
          type: boolean
        agent_status:
          type: string
          enum:
            - connected
            - degraded
            - disconnected
        agent_id:
          type: string
        session_id:
          type: string
        agent_version:
          type: string
        kubernetes_version:
          type: string
        distribution:
          type: string
        node_count:
          type: integer
        connected_at:
          type: string
          format: date-time
          nullable: true
        last_ping:
          type: string
          format: date-time
          nullable: true
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        disconnected_at:
          type: string
          format: date-time
          nullable: true
        pod_name:
          type: string
        node_name:
          type: string
        channel_name:
          type: string
        privilege_profile:
          type: string
          enum:
            - viewer
            - operator
            - namespace-viewer
            - namespace-operator
            - custom
            - admin
        capabilities:
          type: object
          additionalProperties:
            type: boolean
        compatibility_status:
          type: string
          enum:
            - supported
            - deprecated
            - blocked
            - unknown
        compatibility_message:
          type: string
        degraded_reasons:
          type: array
          items:
            type: string
        recommended_action:
          type: string
        offline_behavior:
          $ref: '#/components/schemas/AgentOfflineBehavior'
    AgentFleetResponse:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_clusters:
              type: integer
            connected:
              type: integer
            degraded:
              type: integer
            disconnected:
              type: integer
            versions:
              type: object
              additionalProperties:
                type: integer
            profiles:
              type: object
              additionalProperties:
                type: integer
            statuses:
              type: object
              additionalProperties:
                type: integer
            compatibility:
              type: object
              additionalProperties:
                type: integer
            server_version:
              type: string
            minimum_supported_agent_version:
              type: string
            minimum_compatible_agent_version:
              type: string
            generated_at:
              type: string
              format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentFleetItem'
        limit:
          type: integer
        offset:
          type: integer
    AgentDiagnostics:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        agent:
          $ref: '#/components/schemas/AgentFleetItem'
        recent_connections:
          type: array
          items:
            type: object
            additionalProperties: true
        conditions:
          type: array
          items:
            type: object
            additionalProperties: true
        argocd:
          type: object
          properties:
            registered:
              type: boolean
            instance_count:
              type: integer
            cluster_secret_names:
              type: array
              items:
                type: string
            server_urls:
              type: array
              items:
                type: string
            last_updated_at:
              type: string
              format: date-time
              nullable: true
        live:
          type: object
          additionalProperties: true
        recommendations:
          type: array
          items:
            type: string
        redactions:
          type: array
          items:
            type: string
        upgrade_recommendation:
          type: object
          additionalProperties: true
    AgentSelfTest:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        status:
          type: string
          enum:
            - passed
            - warning
            - failed
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum:
                  - passed
                  - warning
                  - failed
              message:
                type: string
        recommendations:
          type: array
          items:
            type: string
    AgentDiagnosticsBundle:
      type: object
      properties:
        version:
          type: string
        generated_at:
          type: string
          format: date-time
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        diagnostics:
          $ref: '#/components/schemas/AgentDiagnostics'
        notes:
          type: array
          items:
            type: string
    AgentUpgradePlanRequest:
      type: object
      properties:
        target_version:
          type: string
        target_image:
          type: string
        strategy:
          type: string
          default: agent_self_rollout
        canary_cluster_ids:
          type: array
          items:
            type: string
        batch_size:
          type: integer
          default: 1
          minimum: 1
        max_unavailable:
          type: integer
          default: 1
          minimum: 1
        rollback_image:
          type: string
    AgentUpgradePlan:
      type: object
      properties:
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        current_version:
          type: string
        target_version:
          type: string
        current_image:
          type: string
        target_image:
          type: string
        rollback_image:
          type: string
        privilege_profile:
          type: string
        strategy:
          type: string
          default: agent_self_rollout
        canary_cluster_ids:
          type: array
          items:
            type: string
        batch_size:
          type: integer
        max_unavailable:
          type: integer
        ready:
          type: boolean
        blockers:
          type: array
          items:
            type: string
        preflight_checks:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            type: string
        post_upgrade_health_checks:
          type: array
          items:
            type: string
        validation:
          type: array
          items:
            type: string
        rollback:
          type: array
          items:
            type: string
    AgentLifecycleOperation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cluster_id:
          type: string
          format: uuid
        operation_type:
          type: string
          enum:
            - agent_upgrade
        status:
          type: string
          enum:
            - pending
            - running
            - succeeded
            - failed
            - cancelled
        target_version:
          type: string
        target_image:
          type: string
        current_version:
          type: string
        strategy:
          type: string
        operation_spec:
          type: object
          additionalProperties: true
        requested_by:
          type: string
          format: uuid
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AgentLifecycleOperationsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentLifecycleOperation'
        limit:
          type: integer
        offset:
          type: integer
    AgentUpgradeOperationResponse:
      type: object
      properties:
        operation:
