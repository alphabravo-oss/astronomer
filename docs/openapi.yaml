  /argocd:
    description: |
      Top-level reverse proxy to the in-cluster argocd-server UI
      (handler.ArgoCDUIProxy). Mounted outside `/api/v1` because upstream
      ArgoCD is configured with `server.rootpath: /argocd`. Authentication is
      enforced by middleware in front of the proxy: an Astronomer
      `Authorization: Bearer <jwt>` header (XHR) OR the `astronomer_session`
      cookie (top-level browser navigation). Unauthenticated browser
      navigations are redirected to `/auth/login?returnTo=...`. The proxy
      injects the upstream `argocd.token` session cookie and rewrites the SPA
      `<base href>`. Supports WebSocket upgrade passthrough. CONNECT accepted
      but not representable in OpenAPI.
