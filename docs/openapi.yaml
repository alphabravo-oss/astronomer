  /api/v1/clusters/{cluster_id}/apps/:
    get:
      summary: List installed apps on a cluster (enriched)
      description: |
        Per-cluster Apps tab listing: installed_charts rows for the cluster with
        LEFT-joined chart metadata. Tool installs (chart_version_id NULL) come
        back with empty chart_* fields, a non-empty tool_slug, and
        source_kind="tool". Requires RBAC `clusters:read`. Paginated envelope.
      tags:
        - catalog
