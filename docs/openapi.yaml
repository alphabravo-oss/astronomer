  /api/v1/resources/search:
    get:
      operationId: searchResourcesAcrossClusters
      summary: Cross-cluster resource search (fan-out)
      description: Fans a single list query out across every active cluster the caller is authorized to list the requested type on, merges results with a bounded top-K heap, and returns them along with per-cluster errors and counts under `data`. The endpoint is per-user rate limited. The `name` filter is applied client-side after merge; `label`/`field` selectors are passed verbatim to Kubernetes. The per-cluster limit is NOT pushed down — every cluster's full list is fetched and the global `limit` is applied after merge.
      tags:
        - resources-explorer
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          description: Resource type to search. One of the search-supported keys.
          schema:
            type: string
            enum:
              - pods
              - events
              - endpoints
              - services
              - configmaps
              - secrets
              - namespaces
              - nodes
              - persistentvolumes
              - persistentvolumeclaims
              - storageclasses
              - deployments
              - statefulsets
              - daemonsets
              - replicasets
              - jobs
              - cronjobs
              - ingresses
              - networkpolicies
              - gateways
              - httproutes
        - name: namespace
          in: query
          required: false
          description: Filter to a single namespace; ignored for cluster-scoped types.
          schema:
            type: string
        - name: label
          in: query
          required: false
          description: Kubernetes label selector, passed verbatim to the cluster API.
          schema:
            type: string
        - name: field
          in: query
          required: false
          description: Kubernetes field selector, passed verbatim to the cluster API.
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Case-insensitive substring filter applied to item names after merge.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max items returned across all clusters after merge. Default 100, values above 1000 are clamped to 1000, non-positive values reset to 100.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Merged search results, per-cluster errors and counts under `data`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ResourceSearchResult'
        '400':
          description: Missing `type` (code `invalid_request`) or unsupported `type` (code `unsupported_type`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller is not authorized to list this resource type on any cluster (code `permission_denied`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Per-user search rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to list active clusters (`list_clusters_failed`) or evaluate permissions (`internal_error`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Cross-cluster search not configured (code `search_unavailable`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
