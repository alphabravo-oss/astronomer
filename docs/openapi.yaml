  /api/v1/clusters/{cluster_id}/proxy/service/{namespace}/{service_port}:
    parameters:
      - name: cluster_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: namespace
        in: path
        required: true
        schema:
          type: string
        description: |
          Target service namespace. Must be a safe RFC-1123 name; the sensitive
          namespaces kube-system/kube-public/kube-node-lease are rejected.
      - name: service_port
        in: path
        required: true
        schema:
          type: string
        description: |
          `<service>` or `<service>:<port>` (port defaults to 80). Proxied via
          the apiserver service-proxy subresource
          (`/api/v1/namespaces/{ns}/services/http:{svc}:{port}/proxy`).
    description: |
      Reverse proxy to an in-cluster HTTP Service through the tunnel
      (handler.ServiceProxyHandler.ServeHTTP). The target service+port must be
      on the enabled-tools allowlist (ListEnabledTools / service_proxy_allowed
      presets) or the request is rejected 403. On mutating methods the api-token
      must carry `clusters:write` (requireServiceProxyScope); reads bypass it.
      RBAC is derived from method (clusters:read/update). CONNECT is accepted but
      not representable in OpenAPI.
    get:
      operationId: serviceProxyGet
      summary: Proxy a request to an in-cluster Service
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      requestBody:
        required: false
        description: Opaque body forwarded to the upstream service.
        content:
          application/json:
            schema: {}
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Proxied service response.
          content:
            application/json:
              schema: {}
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid service-proxy target or unreadable body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Service-proxy target not allowlisted or RBAC denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Service proxy not configured or upstream error.
