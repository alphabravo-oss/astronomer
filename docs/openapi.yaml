            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create a project
      description: |
        Creates a project on a cluster. Seeds the project_namespaces sidecar
        from any namespaces given at create time and enqueues an enforcement
        reconcile for each. New projects default to the `baseline` Pod Security
        profile and unbounded resource quota.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body, missing name, bad cluster_id, or invalid pod_security_profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Create failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    get:
      summary: Get a project
      tags:
        - projects
      security:
        - bearerJWT: []
      responses:
        '200':
          description: The project.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid project ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: Replace a project
      description: |
        Full update of a project. Omitted policy fields (pod_security_profile,
        resource_quota_*) are preserved from the existing row. Re-enqueues an
        enforcement reconcile for every current namespace. Blocked with 409 when
        the project is CRD-owned (transfer ownership first).
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body / ID / pod_security_profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Project is CRD-owned; edit the CR or transfer ownership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Ownership-check failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      summary: Update a project (full-replacement semantics)
      description: |
        Routed to the same handler as PUT — despite the PATCH verb this is a
        full update, not a JSON-merge patch, and accepts the same body as PUT.
        Use PATCH /projects/{id}/policy/ for partial policy edits.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body / ID / pod_security_profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Project is CRD-owned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete a project
      description: |
        Enqueues per-namespace cleanup of managed CRs before removing the row.
        Subject to the maintenance-window gate (migration 057) — may be
        refused or deferred during an active window on the parent cluster.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      responses:
        '204':
          description: Project deleted.
        '400':
          description: Invalid project ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Refused by an active maintenance window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/add-namespace/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    post:
      summary: Add a namespace to a project
      description: |
        Adds a namespace to the project's namespace list and the
        project_namespaces sidecar, then enqueues an enforcement reconcile.
        Rejects namespaces already claimed by this or another project on the
        same cluster.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectNamespaceRequest'
      responses:
        '200':
          description: Namespace added; updated project returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '400':
          description: Invalid body / ID, or missing namespace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Namespace already in this project or claimed by another project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encode or update failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/{id}/remove-namespace/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
    post:
      summary: Remove a namespace from a project
      description: |
        Enqueues cleanup of the namespace's managed CRs (before the DB update)
        and removes the namespace from the project's list.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectNamespaceRequest'
      responses:
        '200':
          description: Namespace removed; updated project returned.
