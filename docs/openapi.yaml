        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: actor
          in: query
          required: false
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
        - name: resource_id
          in: query
          required: false
          schema:
            type: string
        - name: resource_name
          in: query
          required: false
          schema:
            type: string
        - name: target
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: action_class
          in: query
          description: Alias actionClass also accepted.
          required: false
          schema:
            type: string
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum:
              - success
              - failure
              - error
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: correlation_id
          in: query
          description: Alias correlationId also accepted.
          required: false
          schema:
            type: string
        - name: request_id
          in: query
          description: Alias requestId also accepted.
          required: false
          schema:
            type: string
        - name: cluster_id
          in: query
          description: Alias clusterId also accepted.
          required: false
          schema:
            type: string
        - name: project_id
          in: query
          description: Alias projectId also accepted.
          required: false
          schema:
            type: string
        - name: status_code
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 599
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV stream of audit log entries.
          content:
            text/csv:
              schema:
                type: string
                format: binary
                description: |
                  CSV with header row, columns: id, created_at, user_id, source, correlation_id, action, action_class, resource_type, resource_id, resource_name, http_method, path, status_code, duration_ms, ip_address, user_agent, request_id, detail.
        '400':
          description: Unsupported format, invalid filter, or unsupported since cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller lacks audit_logs read or list permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/audit/{id}/:
