      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Vulnerabilities
      summary: Per-image vulnerability reports
      responses:
        '200':
          description: Image vulnerability rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VulnImage'
                  count:
                    type: integer
  /api/v1/clusters/{id}/shell/sessions/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Shell
      summary: List the caller's shell sessions on this cluster
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/KubectlSession'
    post:
      tags:
        - Shell
      summary: Open a kubectl shell session
      description: |
        Creates a ServiceAccount + ClusterRole + RoleBinding + Pod
        running `astronomer-shell` (alpine + kubectl built from
        dl.k8s.io). Returns when the Pod is Ready; the operator then
        attaches via WS at
        `/api/v1/ws/clusters/{cluster_id}/shell/sessions/{id}/`.
      responses:
        '200':
          description: Session record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/KubectlSession'
        '502':
          description: Open failed (e.g. agent disconnected, pod never reached Ready)
  /api/v1/clusters/{id}/shell/sessions/{session_id}/close/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Shell
      summary: Close a shell session early
      description: |
        Tears down the SA/Role/RB/Pod and marks the session row
        `status=closed`. The reaper would do this automatically on
        idle/hard-cap; calling this is the polite version.
      responses:
        '204':
          description: Closed
  /api/v1/clusters/{cluster_id}/shell/sessions/{id}:
    get:
      summary: Get a kubectl shell session
      description: |
        Returns the current state of a single in-browser kubectl shell session
        scoped to the given cluster. Gated on clusters:update RBAC (opening or
        inspecting a privileged shell is treated as a write action). A caller may
        only read a session they own; superusers may read any session. The
        response includes the live command count and the configured idle timeout.
      tags:
        - kubectl-shell
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster the session belongs to.
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: Shell session id.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The shell session.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          cluster_id:
                            type: string
                            format: uuid
                          user_id:
                            type: string
                            format: uuid
                          status:
                            type: string
                            description: 'Lifecycle status, e.g. starting, active, closed, failed.'
                          pod_name:
                            type: string
                          pod_namespace:
                            type: string
                          container:
                            type: string
                          started_at:
                            type: string
                            format: date-time
                          last_input_at:
                            type: string
                            format: date-time
                          expires_at:
                            type: string
                            format: date-time
                          idle_timeout_seconds:
                            type: integer
                            format: int64
                          command_count:
                            type: integer
                            format: int64
                            description: Omitted when zero.
                        required:
                          - id
                          - cluster_id
                          - user_id
                          - status
                          - pod_name
                          - pod_namespace
                          - container
                          - started_at
                          - last_input_at
                          - expires_at
                          - idle_timeout_seconds
        '400':
          description: Invalid cluster_id or session id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Session belongs to another operator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Session not found, or not found in this cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Kubectl shell is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/clusters/{cluster_id}/shell/sessions/{id}/commands:
    get:
      summary: List recorded commands for a kubectl shell session
      description: |
        Returns the audit trail of shell commands recorded for a single kubectl
        session, newest-first, as a DRF-style paginated list. Gated on
        clusters:update RBAC. A caller may only read commands for a session they
        own; superusers may read any session's commands. Use the limit/offset
        query parameters to page; limit is clamped to the range 1-1000 (default
        100) and offset is clamped to a minimum of 0 (default 0).
      tags:
        - kubectl-shell
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Cluster the session belongs to.
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          description: Shell session id.
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          description: Max items per page. Values below 1 fall back to 100; values above 1000 are clamped to 1000.
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Number of items to skip. Negative values fall back to 0.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Paginated page of recorded commands.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            command_at:
                              type: string
                              format: date-time
                            command_line:
                              type: string
                          required:
                            - command_at
                            - command_line
        '400':
          description: Invalid cluster_id or session id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Session belongs to another operator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Session not found, or not found in this cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Kubectl shell is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
