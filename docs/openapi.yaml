  /api/v1/clusters/{id}/gatekeeper/constraints/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - clusters
      summary: List Gatekeeper constraints (bundle + authored) (P-04)
      description: |
        Lists the embedded starter-bundle constraints plus operator-authored
        custom constraints for the cluster, with best-effort live violation
        counts. Requires clusters:read RBAC.
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Bundle + custom constraints.
    post:
      tags:
        - clusters
      summary: Author a Gatekeeper constraint — validate + apply (P-04)
      description: |
        Validates the YAML (ConstraintTemplate or Constraint; ConstraintTemplate
        Rego is structurally checked), server-side-applies it to the cluster
        through the agent tunnel, and persists the authored record. Requires the
        clusters:write api-token scope and clusters:update RBAC; every apply is
        audited.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstraintYAMLRequest'
      responses:
        '201':
          description: Applied and recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ConstraintValidationResponse'
        '400':
          description: Invalid YAML / Rego, or the cluster rejected the constraint.
        '403':
          description: Caller lacks clusters:update.
  /api/v1/clusters/{id}/gatekeeper/constraints/validate/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - clusters
      summary: Validate a Gatekeeper constraint YAML without applying (P-04)
      description: Requires clusters:read RBAC. Never applies to the cluster.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstraintYAMLRequest'
      responses:
        '200':
          description: Validation result (valid, errors, name, kind).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ConstraintValidationResponse'
  /api/v1/clusters/{id}/gatekeeper/constraints/{name}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: name
        in: path
        required: true
        schema:
          type: string
    delete:
      tags:
        - clusters
      summary: Delete an authored Gatekeeper constraint (P-04)
      description: |
        Removes the authored record and deletes the resource from the cluster.
        Requires the clusters:write api-token scope and clusters:update RBAC;
        audited.
      security:
        - bearerJWT: []
      responses:
        '204':
          description: Deleted.
        '403':
          description: Caller lacks clusters:update.
        '404':
          description: Authored constraint not found.
