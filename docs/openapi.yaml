# Astronomer Go — OpenAPI 3.1 specification
#
# Hand-curated rather than annotation-generated. Two reasons: (1) keeps
# the route handlers free of Swag/Huma comment clutter that goes stale
# silently, (2) we explicitly choose which surface is supported public
# API vs internal implementation detail — operators relying on Swagger
# UI should see exactly the stable contract, not every chi route.
#
# The CI smoke-test (scripts/smoke-fresh-cluster.sh) drives this same
# surface end-to-end on a real k3d cluster, so the spec stays honest:
# any drift between this file and the running server breaks the smoke
# test before it lands.

openapi: 3.1.0
info:
  title: Astronomer Management API
  version: "1.0"
  summary: Multi-cluster Kubernetes management plane
  description: |
    REST API surface for the Astronomer management plane. Covers the
    cluster onboarding wizard, agent registration, image vulnerability
    scans, kubectl shell sessions, helm catalog, and platform admin.

    Auth: all endpoints under `/api/v1/` outside `/auth/` and the
    `/internal/` namespace require either a session JWT issued by
    POST `/auth/login/` or a personal API token. Pass the token as
    `Authorization: Bearer <token>`.

    RBAC: write endpoints check the caller's permissions against the
    platform RBAC engine. Routes annotated `superuser` require
    `users.is_superuser = true`; the rest gate on resource verbs
    (clusters:update, clusters:read, etc.).
  contact:
    name: Astronomer engineering
    url: https://github.com/alphabravocompany/astronomer-go
servers:
  - url: http://astronomer.5.78.101.247.nip.io:8080
    description: Live dev (.247)
  - url: http://localhost:8080
    description: Local

# ---------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------

components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `POST /api/v1/auth/login/` (session token) or
        personal API token from `/api/v1/settings/tokens/`.

  # ---------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
          required: [code, message]
      required: [error]

    # --- Reusable response envelopes ------------------------------------
    # These mirror internal/handler/response.go. Reference them from
    # responses via allOf to override the inner `data`/payload shape, e.g.:
    #   schema:
    #     allOf:
    #       - $ref: "#/components/schemas/DataEnvelope"
    #       - properties: { data: { $ref: "#/components/schemas/Cluster" } }

    # {"data": <payload>} — produced by RespondJSON.
    DataEnvelope:
      type: object
      description: Standard success envelope. The handler payload is nested under `data`.
      properties:
        data: {}
      required: [data]

    # {"error": {"code","message","request_id?"}} — produced by RespondError
    # and RespondRequestError. RespondRequestError additionally injects
    # `request_id` (a sibling string) when the request middleware populated one.
    ErrorEnvelope:
      type: object
      description: Standard error envelope.
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            request_id:
              type: string
              description: Correlation id, present only when set by request middleware.
          required: [code, message]
      required: [error]

    # {"data":[...], "count", "next", "previous"} — produced by RespondPaginated
    # (DRF-style, always HTTP 200). next/previous are ?limit=&offset= URLs off
    # the request path, null when there is no further page.
    PaginatedEnvelope:
      type: object
      description: DRF-style paginated list envelope. `data` is the page of items.
      properties:
        data:
          type: array
          items: {}
        count:
          type: integer
          format: int64
          description: Total number of items across all pages.
        next:
          type: string
          nullable: true
          description: URL of the next page, or null on the last page.
        previous:
          type: string
          nullable: true
          description: URL of the previous page, or null on the first page.
      required: [data, count, next, previous]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token: { type: string, description: "Access JWT (~1h TTL)" }
            refresh: { type: string, description: "Refresh JWT (~7d TTL)" }
            user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        is_active: { type: boolean }
        is_staff: { type: boolean }
        is_superuser: { type: boolean }
        date_joined: { type: string, format: date-time }
        last_login: { type: string, format: date-time, nullable: true }
        must_change_password: { type: boolean }

    Cluster:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, description: "RFC-1123 cluster slug" }
        display_name: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [pending, active, disconnected, error]
        environment:
          type: string
          enum: [production, staging, development, dev]
        region: { type: string }
        provider:
          type: string
          description: "eks / gke / aks / k3d / kind / other"
        distribution: { type: string, description: "vanilla / k3s / openshift / ..." }
        labels: { type: object, additionalProperties: { type: string } }
        annotations: { type: object, additionalProperties: { type: string } }
        registration_phase:
          type: string
          enum: [created, awaiting_agent, connected, provisioning, ready, failed]
        install_baseline: { type: boolean, nullable: true }
        agent_version: { type: string }
        kubernetes_version: { type: string }
        node_count: { type: integer }
        last_heartbeat: { type: string, format: date-time, nullable: true }
        is_local: { type: boolean }
        decommissioned_at: { type: string, format: date-time, nullable: true }
        agent_privilege_profile:
          type: string
          enum: [viewer, operator, namespace-viewer, namespace-operator, custom, admin]
        cpu_percentage: { type: number }
        memory_percentage: { type: number }
        pod_count: { type: integer }
        argocd:
          type: object
          properties:
            registered: { type: boolean }
            instance_count: { type: integer }
            cluster_secret_names:
              type: array
              items: { type: string }
            baseline_managed_by:
              type: string
              enum: [argocd, argocd_pending, helm, local, unknown]
            drift:
              type: object
              properties:
                app_count: { type: integer }
                synced_count: { type: integer }
                out_of_sync_count: { type: integer }
                unknown_sync_count: { type: integer }
                healthy_count: { type: integer }
                progressing_count: { type: integer }
                degraded_count: { type: integer }
                unknown_health_count: { type: integer }
                resource_created_count: { type: integer }
                resource_changed_count: { type: integer }
                resource_pruned_count: { type: integer }
                last_synced: { type: string, format: date-time, nullable: true }
                last_error: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateClusterRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, description: "RFC-1123 slug; must be lowercase + hyphens" }
        display_name: { type: string }
        description: { type: string }
        environment: { type: string }
        region: { type: string }
        provider: { type: string }
        distribution: { type: string }

    RegistrationStatus:
      type: object
      properties:
        cluster_id: { type: string, format: uuid }
        phase:
          type: string
          enum: [created, awaiting_agent, connected, provisioning, ready, failed]
        install_baseline: { type: boolean, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        steps:
          type: array
          items: { $ref: "#/components/schemas/RegistrationStep" }

    RegistrationStep:
      type: object
      properties:
        id: { type: string, format: uuid }
        step_name: { type: string }
        label: { type: string }
        status:
          type: string
          enum: [pending, running, success, failed, skipped]
        progress_pct: { type: integer, minimum: 0, maximum: 100 }
        detail: { type: object, additionalProperties: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string }
        step_order: { type: integer }
        created_at: { type: string, format: date-time }

    ArgoOrphanApplication:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        component_slug: { type: string }
        application_set_name: { type: string }
        destination_cluster: { type: string }
        destination_namespace: { type: string }
        reason:
          type: string
          enum:
            - missing_destination
            - stale_destination_cluster
            - live_missing_destination
            - live_stale_destination_cluster
            - stale_applicationset_metadata
        source:
          type: string
          enum: [cache, live]
        message: { type: string }

    ArgoOrphanReport:
      type: object
      properties:
        instance_id: { type: string, format: uuid }
        application_count: { type: integer }
        cached_application_count: { type: integer }
        live_application_count: { type: integer }
        managed_target_count: { type: integer }
        orphan_application_count: { type: integer }
        orphan_applications:
          type: array
          items: { $ref: "#/components/schemas/ArgoOrphanApplication" }
        live_error: { type: string }
        generated_at: { type: string, format: date-time }

    SetOptionsRequest:
      type: object
      required: [install_baseline]
      properties:
        install_baseline: { type: boolean }

    VulnSummary:
      type: object
      properties:
        critical: { type: integer }
        high: { type: integer }
        medium: { type: integer }
        low: { type: integer }
        unknown: { type: integer }
        report_count: { type: integer }
        last_scanned_at: { type: string, format: date-time, nullable: true }

    VulnImage:
      type: object
      properties:
        id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        report_name: { type: string }
        namespace: { type: string }
        workload_kind: { type: string }
        workload_name: { type: string }
        container_name: { type: string }
        image_registry: { type: string }
        image_repo: { type: string }
        image_tag: { type: string }
        image_digest: { type: string }
        scanner: { type: string }
        scanner_version: { type: string }
        critical_count: { type: integer }
        high_count: { type: integer }
        medium_count: { type: integer }
        low_count: { type: integer }
        unknown_count: { type: integer }
        scanned_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    KubectlSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        status:
          type: string
          enum: [starting, active, closed, expired, failed]
        pod_name: { type: string }
        pod_namespace: { type: string }
        container: { type: string }
        started_at: { type: string, format: date-time }
        last_input_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        idle_timeout_seconds: { type: integer }

    OwnershipTransferResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        managed_by:
          type: string
          enum: [api, ui, crd, system, argocd]
        transferred: { type: boolean }

    FeatureFlags:
      type: object
      additionalProperties: false
      properties:
        feature.catalog: { type: boolean }
        feature.projects: { type: boolean }
        feature.monitoring: { type: boolean }
        feature.argocd: { type: boolean }
        feature.security: { type: boolean }
        feature.backups: { type: boolean }

    ExtensionManifest:
      type: object
      required: [apiVersion, name, version, compatibleAstronomer, entry, permissions, extensionPoints]
      properties:
        apiVersion: { type: string, enum: [extensions.astronomer.io/v1alpha1] }
        name: { type: string }
        displayName: { type: string }
        version: { type: string }
        compatibleAstronomer: { type: string }
        entry: { type: string }
        permissions:
          type: array
          items: { type: string }
        extensionPoints:
          type: object
          additionalProperties: true

    ExtensionValidation:
      type: object
      properties:
        valid: { type: boolean }
        compatibility_status: { type: string, enum: [compatible, incompatible, unknown] }
        checksum: { type: string }
        manifest: { $ref: "#/components/schemas/ExtensionManifest" }
        warnings:
          type: array
          items: { type: object, additionalProperties: true }
        errors:
          type: array
          items: { type: object, additionalProperties: true }

    ExtensionRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        display_name: { type: string }
        version: { type: string }
        source: { type: string }
        checksum: { type: string }
        enabled: { type: boolean }
        compatibility_status: { type: string }
        manifest: { $ref: "#/components/schemas/ExtensionManifest" }
        installed_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ServiceMeshInventory:
      type: object
      properties:
        cluster_id: { type: string, format: uuid }
        mesh: { type: string }
        total_count: { type: integer }
        notice: { type: string }
        resources:
          type: array
          items:
            type: object
            properties:
              kind: { type: string }
              api_version: { type: string }
              plural: { type: string }
              count: { type: integer }
              notice: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                    managed_by: { type: string }
                    read_only: { type: boolean }
                    reason: { type: string }

    ServiceMeshPolicyValidation:
      type: object
      properties:
        cluster_id: { type: string, format: uuid }
        valid: { type: boolean }
        api_version: { type: string }
        kind: { type: string }
        name: { type: string }
        namespace: { type: string }
        managed_by: { type: string }
        read_only: { type: boolean }
        apply_allowed: { type: boolean }
        warnings:
          type: array
          items: { type: object, additionalProperties: true }
        errors:
          type: array
          items: { type: object, additionalProperties: true }

    AgentOfflineBehavior:
      type: object
      properties:
        state: { type: string }
        last_known_at: { type: string, format: date-time, nullable: true }
        stale: { type: boolean }
        message: { type: string }
        permitted_queued_operations:
          type: array
          items: { type: string }
        blocked_operations:
          type: array
          items: { type: string }

    AgentFleetItem:
      type: object
      properties:
        cluster_id: { type: string, format: uuid }
        cluster_name: { type: string }
        cluster_display_name: { type: string }
        cluster_status: { type: string }
        is_local: { type: boolean }
        agent_status: { type: string, enum: [connected, degraded, disconnected] }
        agent_id: { type: string }
        session_id: { type: string }
        agent_version: { type: string }
        kubernetes_version: { type: string }
        distribution: { type: string }
        node_count: { type: integer }
        connected_at: { type: string, format: date-time, nullable: true }
        last_ping: { type: string, format: date-time, nullable: true }
        last_heartbeat: { type: string, format: date-time, nullable: true }
        disconnected_at: { type: string, format: date-time, nullable: true }
        pod_name: { type: string }
        node_name: { type: string }
        channel_name: { type: string }
        privilege_profile: { type: string, enum: [viewer, operator, namespace-viewer, namespace-operator, custom, admin] }
        capabilities: { type: object, additionalProperties: { type: boolean } }
        compatibility_status: { type: string, enum: [supported, deprecated, blocked, unknown] }
        compatibility_message: { type: string }
        degraded_reasons:
          type: array
          items: { type: string }
        recommended_action: { type: string }
        offline_behavior: { $ref: "#/components/schemas/AgentOfflineBehavior" }

    AgentFleetResponse:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_clusters: { type: integer }
            connected: { type: integer }
            degraded: { type: integer }
            disconnected: { type: integer }
            versions: { type: object, additionalProperties: { type: integer } }
            profiles: { type: object, additionalProperties: { type: integer } }
            statuses: { type: object, additionalProperties: { type: integer } }
            compatibility: { type: object, additionalProperties: { type: integer } }
            server_version: { type: string }
            minimum_supported_agent_version: { type: string }
            minimum_compatible_agent_version: { type: string }
            generated_at: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentFleetItem" }
        limit: { type: integer }
        offset: { type: integer }

    AgentDiagnostics:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        agent: { $ref: "#/components/schemas/AgentFleetItem" }
        recent_connections:
          type: array
          items: { type: object, additionalProperties: true }
        conditions:
          type: array
          items: { type: object, additionalProperties: true }
        argocd:
          type: object
          properties:
            registered: { type: boolean }
            instance_count: { type: integer }
            cluster_secret_names:
              type: array
              items: { type: string }
            server_urls:
              type: array
              items: { type: string }
            last_updated_at: { type: string, format: date-time, nullable: true }
        live:
          type: object
          additionalProperties: true
        recommendations:
          type: array
          items: { type: string }
        redactions:
          type: array
          items: { type: string }
        upgrade_recommendation:
          type: object
          additionalProperties: true

    AgentSelfTest:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        cluster_id: { type: string, format: uuid }
        cluster_name: { type: string }
        status: { type: string, enum: [passed, warning, failed] }
        checks:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string, enum: [passed, warning, failed] }
              message: { type: string }
        recommendations:
          type: array
          items: { type: string }

    AgentDiagnosticsBundle:
      type: object
      properties:
        version: { type: string }
        generated_at: { type: string, format: date-time }
        cluster_id: { type: string, format: uuid }
        cluster_name: { type: string }
        diagnostics: { $ref: "#/components/schemas/AgentDiagnostics" }
        notes:
          type: array
          items: { type: string }

    AgentUpgradePlanRequest:
      type: object
      properties:
        target_version: { type: string }
        target_image: { type: string }
        strategy: { type: string, default: agent_self_rollout }
        canary_cluster_ids:
          type: array
          items: { type: string }
        batch_size: { type: integer, default: 1, minimum: 1 }
        max_unavailable: { type: integer, default: 1, minimum: 1 }
        rollback_image: { type: string }

    AgentUpgradePlan:
      type: object
      properties:
        cluster_id: { type: string, format: uuid }
        cluster_name: { type: string }
        current_version: { type: string }
        target_version: { type: string }
        current_image: { type: string }
        target_image: { type: string }
        rollback_image: { type: string }
        privilege_profile: { type: string }
        strategy: { type: string, default: agent_self_rollout }
        canary_cluster_ids:
          type: array
          items: { type: string }
        batch_size: { type: integer }
        max_unavailable: { type: integer }
        ready: { type: boolean }
        blockers:
          type: array
          items: { type: string }
        preflight_checks:
          type: array
          items: { type: string }
        steps:
          type: array
          items: { type: string }
        post_upgrade_health_checks:
          type: array
          items: { type: string }
        validation:
          type: array
          items: { type: string }
        rollback:
          type: array
          items: { type: string }

    AgentLifecycleOperation:
      type: object
      properties:
        id: { type: string, format: uuid }
        cluster_id: { type: string, format: uuid }
        operation_type: { type: string, enum: [agent_upgrade] }
        status: { type: string, enum: [pending, running, succeeded, failed, cancelled] }
        target_version: { type: string }
        target_image: { type: string }
        current_version: { type: string }
        strategy: { type: string }
        operation_spec: { type: object, additionalProperties: true }
        requested_by: { type: string, format: uuid, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        last_error: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AgentLifecycleOperationsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentLifecycleOperation" }
        limit: { type: integer }
        offset: { type: integer }

    AgentUpgradeOperationResponse:
      type: object
      properties:
        operation: { $ref: "#/components/schemas/AgentLifecycleOperation" }
        plan: { $ref: "#/components/schemas/AgentUpgradePlan" }

    NodeDrainRequest:
      type: object
      properties:
        ignore_daemonsets: { type: boolean, default: true }
        delete_empty_dir_data: { type: boolean, default: false }
        grace_period_seconds: { type: integer, format: int64 }
        dry_run: { type: boolean, default: false }

    NodeDrainPodRef:
      type: object
      properties:
        namespace: { type: string }
        name: { type: string }
        reason: { type: string }

    NodeDrainResponse:
      type: object
      properties:
        node: { type: string }
        status: { type: string, enum: [dry_run, draining, drained, blocked, partial] }
        message: { type: string }
        evicted:
          type: array
          items: { $ref: "#/components/schemas/NodeDrainPodRef" }
        skipped:
          type: array
          items: { $ref: "#/components/schemas/NodeDrainPodRef" }
        failed:
          type: array
          items: { $ref: "#/components/schemas/NodeDrainPodRef" }
        blockers:
          type: array
          items: { type: string }

    NodeKeyValueRequest:
      type: object
      required: [key]
      properties:
        key: { type: string }
        value: { type: string }

    NodeKeyRequest:
      type: object
      required: [key]
      properties:
        key: { type: string }

    NodeTaintRequest:
      type: object
      required: [key, effect]
      properties:
        key: { type: string }
        value: { type: string }
        effect:
          type: string
          enum: [NoSchedule, PreferNoSchedule, NoExecute]

    NodeTaintRemoveRequest:
      type: object
      required: [key]
      properties:
        key: { type: string }
        effect:
          type: string
          enum: [NoSchedule, PreferNoSchedule, NoExecute]

    NodeActionResponse:
      type: object
      properties:
        node: { type: string }
        status: { type: string }
        key: { type: string }
        value: { type: string }
        removed: { type: boolean }

    NodeTaintActionResponse:
      type: object
      properties:
        node: { type: string }
        status: { type: string }
        taint: { $ref: "#/components/schemas/NodeTaintRequest" }

    PaginatedClusters:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Cluster" }
        count: { type: integer }
        next: { type: string, nullable: true }
        previous: { type: string, nullable: true }

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not authorized for this resource
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# Default: all routes require bearer auth.
security:
  - bearerJWT: []

# ---------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------

tags:
  - { name: Auth, description: "Login, tokens, password reset" }
  - { name: Settings, description: "Authenticated runtime settings subsets" }
  - { name: Clusters, description: "Cluster CRUD + lookup" }
  - { name: Agents, description: "Adopted-cluster agent inventory, diagnostics, and lifecycle intents" }
  - { name: Nodes, description: "Imported-cluster node operations" }
  - { name: Registration, description: "Onboarding wizard phase machine" }
  - { name: Projects, description: "Project CRUD, namespace policy, and ownership" }
  - { name: Vulnerabilities, description: "Trivy image-scan results" }
  - { name: Shell, description: "In-browser kubectl shell sessions" }
  - { name: K8s, description: "Tunnel-passthrough to managed cluster's k8s API" }
  - { name: Tools, description: "Cluster tool catalog + installs" }
  - { name: ArgoCD, description: "ArgoCD instances, applications, and cluster registration" }
  - { name: Extensions, description: "UI extension manifest validation and registry controls" }
  - { name: ServiceMesh, description: "Service mesh detection, inventory, and policy validation" }
  - { name: Alerting, description: "Alert rules + notification channels (Slack/PagerDuty/MS Teams/webhook/email)" }

# ---------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------

paths:

  # -- Auth --------------------------------------------------------------

  /api/v1/auth/login/:
    post:
      tags: [Auth]
      summary: Email/password login
      description: |
        Returns a JWT access token + refresh token. Rate-limited at
        5/minute per source IP. If TOTP is required for the account
        the response carries a `challenge_token` instead and the
        client must POST to `/auth/totp/verify/`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me/:
    get:
      tags: [Auth]
      summary: Current authenticated user
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout/:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        "200":
          description: Session revoked or logout redirect returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Settings ----------------------------------------------------------

  /api/v1/settings/features/:
    get:
      tags: [Settings]
      summary: Authenticated feature flag snapshot
      description: |
        Returns only feature.* booleans so the SPA can mirror backend
        feature gates without exposing the full admin settings registry.
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/FeatureFlags" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/admin/backup-drill/:
    get:
      tags: [Settings]
      summary: Latest management-plane backup restore-drill result
      responses:
        "200":
          description: Backup drill status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Extensions --------------------------------------------------------

  /api/v1/extensions/:
    get:
      tags: [Extensions]
      summary: List installed UI extensions
      responses:
        "200":
          description: Installed extension registry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/ExtensionRecord" }
                      sample_manifest: { $ref: "#/components/schemas/ExtensionManifest" }
    post:
      tags: [Extensions]
      summary: Install or update a UI extension manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest: { $ref: "#/components/schemas/ExtensionManifest" }
                source: { type: string }
                enable: { type: boolean }
      responses:
        "200":
          description: Installed extension
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ExtensionRecord" }

  /api/v1/extensions/validate/:
    post:
      tags: [Extensions]
      summary: Validate a UI extension manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                manifest: { $ref: "#/components/schemas/ExtensionManifest" }
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ExtensionValidation" }

  /api/v1/extensions/sample-manifest/:
    get:
      tags: [Extensions]
      summary: Return the starter UI extension manifest
      responses:
        "200":
          description: Sample manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ExtensionManifest" }

  /api/v1/extensions/{name}/enable/:
    post:
      tags: [Extensions]
      summary: Enable a compatible extension
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated extension
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ExtensionRecord" }

  /api/v1/extensions/{name}/disable/:
    post:
      tags: [Extensions]
      summary: Disable an extension
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated extension
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ExtensionRecord" }

  # -- Service Mesh ------------------------------------------------------

  /api/v1/clusters/{cluster_id}/service-mesh/inventory/:
    get:
      tags: [ServiceMesh]
      summary: List Istio service-mesh resources for a cluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Mesh resource inventory
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ServiceMeshInventory" }

  /api/v1/clusters/{cluster_id}/service-mesh/validate/:
    post:
      tags: [ServiceMesh]
      summary: Validate an Istio service-mesh policy object before apply
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    yaml: { type: string }
                - type: object
                  properties:
                    object: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ServiceMeshPolicyValidation" }

  # -- Agents -----------------------------------------------------------

  /api/v1/agents/fleet/:
    get:
      tags: [Agents]
      summary: List adopted-cluster agents
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Agent fleet summary and rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentFleetResponse" }

  /api/v1/agents/fleet/{cluster_id}/diagnostics/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Agents]
      summary: Agent diagnostics for one cluster
      responses:
        "200":
          description: Redacted diagnostics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentDiagnostics" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/fleet/{cluster_id}/diagnostics/bundle/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Agents]
      summary: Download redacted agent diagnostics bundle
      responses:
        "200":
          description: JSON attachment suitable for support triage
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentDiagnosticsBundle" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/fleet/{cluster_id}/operations/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Agents]
      summary: List agent lifecycle operations for one cluster
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Lifecycle operation history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentLifecycleOperationsResponse" }

  /api/v1/agents/fleet/{cluster_id}/self-test/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Agents]
      summary: Run an agent self-test
      responses:
        "200":
          description: Deterministic pass/warn/fail checks from inventory and live diagnostics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentSelfTest" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/fleet/{cluster_id}/upgrade-plan/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Agents]
      summary: Build an agent upgrade plan
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentUpgradePlanRequest" }
      responses:
        "200":
          description: Upgrade plan and validation gates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentUpgradePlan" }

  /api/v1/agents/fleet/{cluster_id}/upgrade/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Agents]
      summary: Queue an agent upgrade lifecycle operation
      description: |
        Persists operator-approved upgrade intent. The current implementation
        records the lifecycle operation and audit event; execution is driven by
        the configured manifest or future agent upgrade reconciler.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentUpgradePlanRequest" }
      responses:
        "202":
          description: Upgrade lifecycle operation queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AgentUpgradeOperationResponse" }
        "409":
          description: Upgrade plan is blocked
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Activity ----------------------------------------------------------

  /api/v1/activity/:
    get:
      tags: [Clusters]
      summary: Recent platform activity
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Tools -------------------------------------------------------------

  /api/v1/tools/:
    get:
      tags: [Tools]
      summary: List available cluster tools
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- ArgoCD ------------------------------------------------------------

  /api/v1/argocd/instances/:
    get:
      tags: [ArgoCD]
      summary: List configured ArgoCD instances
      responses:
        "200":
          description: ArgoCD instances
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/argocd/instances/{id}/orphan-report/:
    get:
      tags: [ArgoCD]
      summary: Report cached Astronomer baseline Applications with stale ArgoCD targets
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 5000, default: 1000 }
      responses:
        "200":
          description: Orphaned baseline Application report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ArgoOrphanReport" }

  # -- Alerting ----------------------------------------------------------

  /api/v1/alerting/events/:
    get:
      tags: [Alerting]
      summary: List alert events
      responses:
        "200":
          description: Alert events
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # -- Clusters ----------------------------------------------------------

  /api/v1/clusters/:
    get:
      tags: [Clusters]
      summary: List clusters
      description: |
        Returns all clusters the caller can read, excluding tombstoned
        rows (decommissioned_at IS NOT NULL).
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Substring match on name + display_name
        - name: environment
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of clusters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedClusters" }
    post:
      tags: [Clusters]
      summary: Create cluster (imported)
      description: |
        Records a new cluster row. Auto-attaches the platform-default
        cluster template (typically Platform baseline) if one is
        configured — the apply worker installs trivy-operator,
        kube-state-metrics, prometheus-node-exporter, fluent-bit,
        ingress-nginx, cert-manager, and gatekeeper via helm/Argo baseline
        management. Returns the cluster
        with `registration_phase=created` so the wizard can drive the
        next step.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateClusterRequest" }
      responses:
        "201":
          description: Cluster created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Cluster" }
        "400":
          description: Validation error (e.g. non-RFC-1123 name)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/clusters/{id}/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Clusters]
      summary: Get cluster
      responses:
        "200":
          description: Cluster
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Cluster" }
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Clusters]
      summary: Decommission cluster
      description: |
        Soft-deletes the cluster: tombstones the row + enqueues an
        async reconciler that revokes the agent's registration token,
        archives the audit log for that cluster, and prunes dependent
        rows. The cluster's pod-side resources are NOT touched — the
        operator's responsibility.
      responses:
        "204":
          description: Decommission queued
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clusters/{id}/ownership/takeover/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Clusters]
      summary: Transfer CRD-owned cluster row to API ownership
      description: |
        Explicitly clears CRD ownership metadata from a cluster row so future
        UI/API updates can mutate fields that ordinary PUT/PATCH otherwise
        reject with `ownership_conflict`. Only CRD-owned rows can be taken
        over by this endpoint; system and ArgoCD-owned rows remain protected.
      responses:
        "200":
          description: Ownership transfer result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/OwnershipTransferResponse" }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Row is not eligible for takeover
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/projects/{id}/ownership/takeover/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Projects]
      summary: Transfer CRD-owned project row to API ownership
      description: |
        Explicitly clears CRD ownership metadata from a project row so future
        UI/API updates can mutate fields that ordinary PUT/PATCH otherwise
        reject with `ownership_conflict`. Only CRD-owned rows can be taken
        over by this endpoint; system and ArgoCD-owned rows remain protected.
      responses:
        "200":
          description: Ownership transfer result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/OwnershipTransferResponse" }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Row is not eligible for takeover
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/clusters/{id}/manifest/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Clusters]
      summary: Agent install manifest
      description: |
        Returns a kubectl-applyable YAML manifest that installs the
        Astronomer agent into the target cluster. Each call mints a
        fresh registration token bound to the cluster ID; tokens
        expire 24h after issue. The manifest includes the agent's
        ServiceAccount + ClusterRole + Secret + Deployment + Service +
        NetworkPolicy + PodDisruptionBudget.
      responses:
        "200":
          description: YAML manifest
          content:
            text/yaml:
              schema: { type: string }

  # -- Nodes -------------------------------------------------------------

  /api/v1/nodes/{cluster_id}/{node_name}/cordon/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Cordon a node
      responses:
        "200":
          description: Node marked unschedulable
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/nodes/{cluster_id}/{node_name}/uncordon/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Uncordon a node
      responses:
        "200":
          description: Node marked schedulable
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/nodes/{cluster_id}/{node_name}/drain/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Cordon a node and evict eligible pods
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeDrainRequest" }
      responses:
        "200":
          description: Dry-run, blocked, or no-op drain result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeDrainResponse" }
        "202":
          description: Drain started; pod evictions were requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeDrainResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/labels/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Set a node label
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeKeyValueRequest" }
      responses:
        "200":
          description: Label applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeActionResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/labels/remove/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Remove a node label
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeKeyRequest" }
      responses:
        "200":
          description: Label removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeActionResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/annotations/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Set a node annotation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeKeyValueRequest" }
      responses:
        "200":
          description: Annotation applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeActionResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/annotations/remove/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Remove a node annotation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeKeyRequest" }
      responses:
        "200":
          description: Annotation removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeActionResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/taints/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Add or replace a node taint by key and effect
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeTaintRequest" }
      responses:
        "200":
          description: Taint applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeTaintActionResponse" }

  /api/v1/nodes/{cluster_id}/{node_name}/taints/remove/:
    parameters:
      - { name: cluster_id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: node_name, in: path, required: true, schema: { type: string } }
    post:
      tags: [Nodes]
      summary: Remove node taints by key and optional effect
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeTaintRemoveRequest" }
      responses:
        "200":
          description: Taint removal result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/NodeActionResponse" }

  # -- Registration wizard ----------------------------------------------

  /api/v1/clusters/{id}/registration/status/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Registration]
      summary: Registration status + step timeline
      responses:
        "200":
          description: Phase + steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/RegistrationStatus" }

  /api/v1/clusters/{id}/registration/options/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [Registration]
      summary: Set wizard step-1 options
      description: Records the operator's `install_baseline` choice on the cluster row.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetOptionsRequest" }
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/RegistrationStatus" }

  /api/v1/clusters/{id}/registration/confirm/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Registration]
      summary: Operator confirms manifest applied
      description: |
        Advances `created` → `awaiting_agent`. If `install_baseline=true`
        was set on `/options/`, also upserts a
        cluster_template_applications row with the platform-baseline
        template's spec and enqueues the apply task on the tunnel queue.
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/RegistrationStatus" }
        "409":
          description: Illegal phase transition

  /api/v1/clusters/{id}/registration/retry/{step_id}/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: step_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Registration]
      summary: Retry a failed step
      description: |
        Re-fires the underlying cluster_template:apply task for a step
        currently in `failed`. The phase machine rewinds
        `failed` → `provisioning` before the apply re-runs.
      responses:
        "200":
          description: Updated status
        "409":
          description: Step is not in failed state

  /api/v1/clusters/{id}/registration/events/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Registration]
      summary: Server-Sent Events stream
      description: |
        text/event-stream of `cluster.registration.*` events filtered
        to this cluster. The wizard's page-3 timeline subscribes here.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  # -- Vulnerabilities --------------------------------------------------

  /api/v1/clusters/{id}/vulnerabilities/summary/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Vulnerabilities]
      summary: Aggregate severity counts
      responses:
        "200":
          description: Severity totals across all current reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/VulnSummary" }

  /api/v1/clusters/{id}/vulnerabilities/images/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Vulnerabilities]
      summary: Per-image vulnerability reports
      responses:
        "200":
          description: Image vulnerability rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/VulnImage" }
                  count: { type: integer }

  # -- Shell ------------------------------------------------------------

  /api/v1/clusters/{id}/shell/sessions/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Shell]
      summary: List the caller's shell sessions on this cluster
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/KubectlSession" }
    post:
      tags: [Shell]
      summary: Open a kubectl shell session
      description: |
        Creates a ServiceAccount + ClusterRole + RoleBinding + Pod
        running `astronomer-shell` (alpine + kubectl built from
        dl.k8s.io). Returns when the Pod is Ready; the operator then
        attaches via WS at
        `/api/v1/ws/clusters/{cluster_id}/shell/sessions/{id}/`.
      responses:
        "200":
          description: Session record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/KubectlSession" }
        "502":
          description: Open failed (e.g. agent disconnected, pod never reached Ready)

  /api/v1/clusters/{id}/shell/sessions/{session_id}/close/:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: session_id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Shell]
      summary: Close a shell session early
      description: |
        Tears down the SA/Role/RB/Pod and marks the session row
        `status=closed`. The reaper would do this automatically on
        idle/hard-cap; calling this is the polite version.
      responses:
        "204":
          description: Closed

  # -- K8s passthrough --------------------------------------------------

  /api/v1/clusters/{id}/k8s/{path}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: path, in: path, required: true, schema: { type: string }, description: "any k8s API path, e.g. api/v1/pods or apis/apps/v1/namespaces/default/deployments" }
    get:
      tags: [K8s]
      summary: Proxy a k8s GET through the tunnel
      description: |
        Forwards the request to the managed cluster's apiserver via
        the agent's WebSocket tunnel. Supports both Watch
        (`?watch=true`) streams and standard list/get calls. Auth
        propagates from the JWT — the agent's ServiceAccount has
        cluster-admin, but RBAC on the management plane gates which
        clusters the caller can reach. Rate-limited.
      responses:
        "200":
          description: K8s response body
        "503":
          description: Agent not connected

  /api/v1/alerting/channels/:
    get:
      tags: [Alerting]
      summary: List notification channels
      responses:
        "200":
          description: Array of channels
    post:
      tags: [Alerting]
      summary: Create a notification channel (channel_type, configuration)
      description: |
        Supported channel_type: slack, pagerduty, msteams, webhook, email.
        See the Alerting tag header for the configuration key conventions
        per channel type.
      responses:
        "201":
          description: Created
        "400":
          description: Unsupported channel_type
