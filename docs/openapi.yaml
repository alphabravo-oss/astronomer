  /api/v1/admin/alerting/inhibitions/:
    get:
      tags:
        - Alerting
      summary: List alert inhibition rules (P-03)
      description: Requires alerts:read (or alerts:list) RBAC.
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Array of inhibition rules.
    post:
      tags:
        - Alerting
      summary: Create an alert inhibition rule (P-03)
      description: |
        Alertmanager-style inhibition. A firing target alert is suppressed
        while a source alert (matching source_matchers) is firing and both
        share equal values on every equal_labels label. Requires the admin
        api-token scope and alerts:create RBAC.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InhibitionRequest'
      responses:
        '201':
          description: Created inhibition rule.
        '400':
          description: Invalid matchers or missing source/target.
  /api/v1/admin/alerting/inhibitions/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Alerting
      summary: Get an alert inhibition rule (P-03)
      description: Requires alerts:read (or alerts:list) RBAC.
      security:
        - bearerJWT: []
      responses:
        '200':
          description: The inhibition rule.
        '404':
          description: Inhibition not found.
    put:
      tags:
        - Alerting
      summary: Update an alert inhibition rule (P-03)
      description: Requires the admin api-token scope and alerts:update RBAC.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InhibitionRequest'
      responses:
        '200':
          description: Updated inhibition rule.
        '400':
          description: Invalid matchers or missing source/target.
        '404':
          description: Inhibition not found.
    delete:
      tags:
        - Alerting
      summary: Delete an alert inhibition rule (P-03)
      description: Requires the admin api-token scope and alerts:delete RBAC.
      security:
        - bearerJWT: []
      responses:
        '204':
          description: Deleted.
        '404':
          description: Inhibition not found.
