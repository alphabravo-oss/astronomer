  /api/v1/ws/clusters/{cluster_id}/shell/sessions/{id}:
    get:
      operationId: kubectlShellWebSocket
      summary: Kubectl break-glass shell WebSocket
      description: |
        WebSocket upgrade for an in-browser kubectl shell session
        (handler.KubectlShellHandler.HandleWS). The session row identified by
        `{id}` must already exist (created via
        `POST /api/v1/clusters/{cluster_id}/shell/sessions/`), belong to the
        caller (or caller is superuser), be in the named cluster, and be
        `active`. After validation the WS is upgraded in place and frames are
        proxied to the cluster agent's exec relay; typed command lines are
        recorded for audit.

        Auth: because browsers cannot set Authorization headers on a WS
        handshake, the JWT/API-token is passed as a short-lived `?ticket=`
        query parameter (StreamKindShell) or via the Authorization header.
        Rate-limited under the exec/logs class.
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Kubectl shell session id.
        - name: ticket
          in: query
          required: false
          schema:
            type: string
          description: Short-lived one-use stream ticket (browser auth path).
      responses:
        '101':
          description: Switching Protocols — shell WebSocket established.
        '401':
          description: Authentication required / invalid ticket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Session belongs to another operator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Session not found in this cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Session is not active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Kubectl shell or exec proxy not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/ws/exec/{cluster_id}/{namespace}/{pod}/{container}:
    get:
      operationId: podExecWebSocket
      summary: Pod exec (interactive terminal) WebSocket
      description: |
        WebSocket upgrade that relays an interactive `/bin/sh` exec session
        between the browser (xterm.js) and a pod container through the tunnel
        (tunnel.ExecConsumer.HandleExec). Browser→server frames are JSON
        envelopes (`{"type":"stdin"|"resize"|"auth"|"end",...}`); server→browser
        frames are `{"type":"output"|"error"|"end",...}`.

        Auth: bearer JWT/API-token via Authorization header, or a short-lived
        `?ticket=` (StreamKindExec) for the browser path. Rate-limited under the
        exec/logs class.
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: pod
          in: path
          required: true
          schema:
            type: string
        - name: container
          in: path
          required: true
          schema:
            type: string
        - name: ticket
          in: query
          required: false
          schema:
            type: string
          description: Short-lived one-use stream ticket (browser auth path).
      responses:
        '101':
          description: Switching Protocols — exec WebSocket established.
        '400':
          description: Missing cluster_id/namespace/pod/container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/ws/logs/{cluster_id}/{namespace}/{pod}/{container}:
    get:
      operationId: podLogsWebSocket
      summary: Pod log stream WebSocket
      description: |
        WebSocket upgrade that streams pod container logs from the cluster agent
        to the browser (tunnel.LogsConsumer.HandleLogs). Each server→browser
        frame is a JSON `{timestamp, message, container}` object. Log options are
        passed as query parameters and forwarded to kubelet.

        Auth: bearer JWT/API-token via Authorization header, or a short-lived
        `?ticket=` (StreamKindLogs) for the browser path. Rate-limited under the
        exec/logs class.
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: pod
          in: path
          required: true
          schema:
            type: string
        - name: container
          in: path
          required: true
          schema:
            type: string
        - name: follow
          in: query
          required: false
          schema:
            type: string
            enum:
              - 'true'
              - 'false'
          description: Stream new lines as they arrive when "true".
        - name: tail_lines
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Number of trailing lines to return (alias tailLines). Mutually exclusive with since_seconds.
        - name: since_seconds
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          description: Return logs newer than this many seconds (alias sinceSeconds). Mutually exclusive with tail_lines.
        - name: ticket
          in: query
          required: false
          schema:
            type: string
          description: Short-lived one-use stream ticket (browser auth path).
      responses:
        '101':
          description: Switching Protocols — log stream WebSocket established.
        '400':
          description: Missing cluster_id/namespace/pod/container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /internal/tunnel/k8s/{cluster_id}:
    post:
      operationId: internalTunnelK8s
      summary: Cross-pod internal Kubernetes request forward (server-to-server)
      description: |
        Server-internal endpoint (tunnel.InternalK8sHandler.Handle) used by a
        sibling server replica to forward a K8sRequest to whichever pod owns the
        cluster agent's WebSocket. NOT a user API and mounted outside the JWT
        chain.

        Auth: a pre-shared key in the `X-Astronomer-Internal-PSK` header
        (derived from the platform encryption key) plus the in-band marker
        `X-Astronomer-Internal-Source: sibling-server-pod`. Requests lacking the
        marker or with a bad PSK get 403; when no encryption key is configured
        the endpoint is disabled (503). The optional
        `X-Astronomer-Forwarded-User` header carries the originating user UUID
        for audit attribution.
      tags:
        - tunnel-proxy-argocd-ui
      security: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Astronomer-Internal-PSK
          in: header
          required: true
          schema:
            type: string
          description: Shared-secret PSK derived from the platform encryption key.
        - name: X-Astronomer-Internal-Source
          in: header
          required: true
          schema:
            type: string
            enum:
              - sibling-server-pod
        - name: X-Astronomer-Forwarded-User
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Originating user UUID for audit attribution.
      requestBody:
        required: true
        description: JSON-encoded K8sRequestPayload.
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                path:
                  type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                body:
                  type: string
                  description: base64-encoded request body
              required:
                - method
                - path
      responses:
        '200':
          description: JSON-encoded K8sResponsePayload from the agent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: integer
                  headers:
                    type: object
                    additionalProperties:
                      type: string
                  body:
                    type: string
                    description: base64-encoded response body
                required:
                  - status_code
        '400':
          description: Missing cluster_id or undecodable payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Missing sibling-source marker or invalid PSK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Agent send/decode failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Internal endpoint disabled or agent not connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: Timed out waiting for the agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /internal/tunnel/helm/{cluster_id}:
    post:
      operationId: internalTunnelHelm
      summary: Cross-pod internal Helm request forward (server-to-server)
      description: |
        Server-internal endpoint (tunnel.InternalHelmHandler.Handle) used by a
        sibling server replica to forward a Helm operation
        (install/upgrade/uninstall/rollback/status) to the pod owning the
        cluster agent's WebSocket. NOT a user API; mounted outside the JWT chain.

        Auth: same PSK + `X-Astronomer-Internal-Source: sibling-server-pod`
        contract as `/internal/tunnel/k8s/{cluster_id}`. Mutating ops are
        audited as `cluster.helm_proxy.forwarded`, attributed via
        `X-Astronomer-Forwarded-User`. Helm waits up to 10 minutes.
      tags:
        - tunnel-proxy-argocd-ui
      security: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Astronomer-Internal-PSK
          in: header
          required: true
          schema:
            type: string
        - name: X-Astronomer-Internal-Source
          in: header
          required: true
          schema:
            type: string
            enum:
              - sibling-server-pod
        - name: X-Astronomer-Forwarded-User
          in: header
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        description: |
          InternalHelmRequest — the Helm message type plus the HelmRequestPayload.
        content:
          application/json:
            schema:
              type: object
              properties:
                msg_type:
                  type: string
                  description: Helm message type (HELM_INSTALL/HELM_UPGRADE/HELM_UNINSTALL/HELM_ROLLBACK/HELM_STATUS).
                payload:
                  type: object
                  properties:
                    release_name:
                      type: string
                    namespace:
                      type: string
                    chart_url:
                      type: string
                    chart_name:
                      type: string
                    repo_url:
                      type: string
                    version:
                      type: string
                    values:
                      type: object
                      additionalProperties: true
                    revision:
                      type: integer
                      description: for rollback
                    timeout:
                      type: integer
                      description: seconds
                  required:
                    - release_name
                    - namespace
              required:
                - msg_type
                - payload
      responses:
        '200':
          description: JSON-encoded HelmResultPayload from the agent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  release_name:
                    type: string
                  namespace:
                    type: string
                  status:
                    type: string
                  revision:
                    type: integer
                  error:
                    type: string
                required:
                  - success
        '400':
          description: Missing cluster_id, undecodable payload, or invalid helm message type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Missing sibling-source marker or invalid PSK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Agent send/decode failure or stream closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Internal endpoint disabled or agent not connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: Timed out waiting for the agent (helm cap 10m).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
