        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Project UUID.
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Cloud credential UUID.
    get:
      summary: Get a cloud credential
      description: Returns one credential (redacted) plus its per-target materialization status rows.
      tags:
        - projects
      security:
        - bearerJWT: []
      responses:
        '200':
          description: The credential with materialization status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CloudCredential'
        '400':
          description: Invalid project ID or credential ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found (or not under this project).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Decode failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: Update a cloud credential
      description: |
        Updates description, data, and target_refs. Name and provider are
        immutable. Secret fields equal to the redaction sentinel are preserved
        from the stored blob. Dropped target_refs enqueue in-cluster Secret
        deletion. Requires a configured encryptor (503 otherwise).
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudCredentialRequest'
      responses:
        '200':
          description: Credential updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CloudCredential'
        '400':
          description: Invalid body, immutable name/provider, invalid data, or target_refs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encrypt or update failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Encryption key not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      summary: Update a cloud credential (alias of PUT)
      description: Routed to the same handler as PUT; same body and semantics.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudCredentialRequest'
      responses:
        '200':
          description: Credential updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CloudCredential'
        '400':
          description: Invalid body, immutable name/provider, invalid data, or target_refs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Encryption key not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete a cloud credential
      description: |
        Enqueues in-cluster Secret deletion for every target_ref (before the
        row is purged), then deletes the credential.
      tags:
        - projects
      security:
        - bearerJWT: []
      x-required-token-scope: projects:write
      responses:
        '204':
          description: Credential deleted.
        '400':
          description: Invalid project ID or credential ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Delete failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
