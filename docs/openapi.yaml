  /api/v1/admin/users/{id}/force-logout:
    post:
      summary: Force-logout a user (invalidate all sessions)
      tags:
        - users-settings
      description: |
        Stamps tokens_invalidated_at so every JWT issued before now is rejected, and clears any SSO sessions. Requires the `admin` API-token scope and superuser (gated in-handler). Response is a bare (un-enveloped) object.
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sessions invalidated. Un-enveloped body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  tokens_invalidated_at:
                    type: string
                    format: date-time
                  sso_sessions_cleared:
                    type: integer
                  sso_backchannel_ok:
                    type: integer
                  sso_backchannel_failed:
                    type: integer
        '403':
          description: Superuser privileges required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/users/{id}/unlock:
    post:
      summary: Unlock a locked-out user account
      tags:
