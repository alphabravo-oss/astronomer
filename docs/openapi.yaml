        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create an ad-hoc snapshot
      description: |
        Creates the DB row and posts a Velero Backup CR to the member cluster. Returns 202 with the freshly inserted row (phase=New); the poller advances the phase asynchronously. Body embeds SnapshotSpec fields at the top level plus optional source/velero_name/velero_namespace.
      tags:
