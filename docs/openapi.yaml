                  - properties:
                      data:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latency_ms:
                            type: integer
                            format: int64
                          message:
                            type: string
        '400':
          description: Invalid connection ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
