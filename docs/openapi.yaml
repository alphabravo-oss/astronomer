  /api/v1/clusters/{id}/v2/pods:
    get:
      operationId: remoteV2ListPods
      summary: List pods via the v2 remotedialer tunnel (non-production demo)
      description: |
        Demonstration endpoint (remoteV2PodsHandler) proving the new
        remotedialer-based tunnel end-to-end: builds a client-go clientset whose
        transport is dialed through the agent WebSocket and lists pods in the
        requested namespace. Hard-gated OUT of production builds.

        Auth: bearer JWT/API-token; requires `clusters:read` RBAC.
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Cluster UUID.
        - name: namespace
          in: query
          required: false
          schema:
            type: string
            default: default
          description: Namespace to list pods in (defaults to "default").
      responses:
        '200':
          description: Pod summary list (not enveloped — raw object).
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster_id:
                    type: string
                  namespace:
                    type: string
                  count:
                    type: integer
                  pods:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        phase:
                          type: string
                        node:
                          type: string
                required:
                  - cluster_id
                  - namespace
                  - count
                  - pods
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: Pod list failed upstream.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '503':
          description: Agent not connected / transport build failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/register/{token}:
    get:
      summary: Fetch the agent install manifest by registration token (public)
      tags:
        - clusters
      security: []
      description: |
        Unauthenticated. Consumed by `curl -sfL <server>/api/v1/register/<token>.yaml | kubectl apply -f -`. The `.yaml` suffix on the token is stripped server-side.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent install manifest YAML.
          content:
            text/yaml:
              schema:
                type: string
        '400':
          description: Missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Token not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/register/signed/{cluster_id}:
    get:
      summary: Fetch the agent install manifest via a short-TTL signed URL (public)
      tags:
        - clusters
      security: []
      description: |
        Unauthenticated. Guarded by an HMAC signature over (cluster_id, expiry) instead of a registration token. The wizard mints the URL with a 15-minute window; expired or tampered links return an opaque 404. On success a fresh registration token is minted and the install manifest YAML is returned.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: expires
          in: query
          required: true
          description: Unix-seconds expiry the signature was computed over.
          schema:
            type: integer
            format: int64
        - name: sig
          in: query
          required: true
          description: Hex-encoded HMAC-SHA256 over "cluster_id|expires".
          schema:
            type: string
      responses:
        '200':
          description: Agent install manifest YAML.
          content:
            text/yaml:
              schema:
                type: string
        '400':
          description: Invalid cluster ID or expiry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Link invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Signed manifest URLs not enabled
  /api/v1/register/ca.crt:
    get:
      summary: Download the registration CA bundle (public)
      tags:
        - clusters
      security: []
      description: |
        Unauthenticated. Returns the operator-provided PEM bundle from platform_settings["registration.ca_bundle"] as text/plain. 404 when none configured.
      responses:
        '200':
          description: PEM CA bundle.
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: No CA bundle configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
