    post:
      summary: Restore from a snapshot
      description: |
        Creates a Velero Restore. target_cluster_id is optional (defaults to the snapshot's own cluster for in-place restore). The snapshot must be in phase Completed or PartiallyFailed. Cross-cluster restore requires the target cluster to have a Velero BackupStorageLocation.
      tags:
        - cluster-snapshots-backups
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
