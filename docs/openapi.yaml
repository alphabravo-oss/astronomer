        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: Delivery id
    post:
      operationId: adminWebhookRetryDelivery
      summary: Force re-dispatch of a webhook delivery
      description: |
        Re-queues the delivery so the dispatcher picks it up on its next tick. The delivery must belong to the subscription in the path. Superuser-gated; additionally requires the api-token `admin` scope. Response is NOT wrapped in a data envelope.
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      responses:
