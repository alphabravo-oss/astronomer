        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Cluster tunnel/proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - logging-monitoring
