  /api/v1/connect/{cluster_id}:
    parameters:
      - name: cluster_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: |
          Cluster UUID. Also accepted via `?cluster_id=` query or the
          `X-Cluster-ID` header (the header is preferred).
    description: |
      WebSocket reverse-tunnel endpoint for cluster agents
      (tunnel2.RemoteServer.ServeHTTP, remotedialer-based). The agent connects
      and HTTP-Upgrades to a persistent WebSocket; the management server then
      dials in-cluster services back through it. Authorization: a cluster
      registration token presented as `Authorization: Bearer <token>`, whose
      `cluster_id` MUST match the requested cluster. This is an agent-only
      endpoint, not a user API. Registered outside the request-timeout group
      because the connection is long-lived. CONNECT accepted but not
      representable in OpenAPI.
    get:
      operationId: tunnelConnectGet
      summary: Agent reverse-tunnel WebSocket upgrade
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      responses:
        '101':
          description: Switching Protocols — WebSocket tunnel established.
        '401':
          description: Missing/invalid registration token or cluster mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    head:
      operationId: tunnelConnectHead
      summary: Agent reverse-tunnel WebSocket upgrade
      tags:
