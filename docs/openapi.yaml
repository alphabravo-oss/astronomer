                  message:
                    type: string
        '400':
          description: Invalid subscription id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/audit/:
    get:
      summary: List audit log entries
      description: |
        Returns a DRF-style paginated page of audit log entries. Supports a large set of optional filter query params (see below). When the backing store implements the composable filtered reader, all filters compose; otherwise a single-field fallback path is used (precedence: action_class, since, user_id, resource_type, action, then unfiltered). Note: the `since` cursor mode returns a count equal to the page length, not the global total.
      tags:
        - audit
      operationId: listAuditLogs
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          description: |
            Page size. Aliases pageSize / page_size are also accepted. Defaults to 20; values <1 reset to 20; capped at 500.
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          description: Number of items to skip. Defaults to 0.
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: user_id
          in: query
          description: Filter by actor user UUID. Invalid UUID returns 400.
          required: false
          schema:
            type: string
            format: uuid
        - name: actor
          in: query
          description: Filter by actor (free-text actor match; filtered reader only).
          required: false
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
        - name: resource_id
          in: query
          description: Filtered reader only.
          required: false
          schema:
            type: string
        - name: resource_name
          in: query
          description: Filtered reader only.
          required: false
          schema:
            type: string
        - name: target
          in: query
          description: Filtered reader only.
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: action_class
          in: query
          description: Alias actionClass also accepted.
          required: false
          schema:
            type: string
        - name: result
          in: query
          description: Outcome filter. Must be one of success, failure, error.
          required: false
          schema:
            type: string
            enum:
              - success
              - failure
              - error
        - name: source
          in: query
          description: Filtered reader only.
          required: false
          schema:
            type: string
        - name: correlation_id
          in: query
          description: Alias correlationId also accepted. Filtered reader only.
          required: false
          schema:
            type: string
        - name: request_id
          in: query
          description: Alias requestId also accepted. Filtered reader only.
          required: false
          schema:
            type: string
        - name: cluster_id
          in: query
          description: Alias clusterId also accepted. Filtered reader only.
          required: false
          schema:
            type: string
        - name: project_id
          in: query
          description: Alias projectId also accepted. Filtered reader only.
          required: false
          schema:
            type: string
        - name: status_code
          in: query
          description: HTTP status code filter (0-599). Filtered reader only.
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 599
        - name: from
          in: query
          description: Lower time bound (inclusive), RFC3339.
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Upper time bound (inclusive), RFC3339.
          required: false
          schema:
            type: string
            format: date-time
        - name: since
          in: query
          description: |
            Cursor UUID; returns entries after the given audit log id. When set, count is the page length rather than the global total.
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated audit log page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLogEntry'
        '400':
          description: Invalid filter, user_id, since cursor, status_code, result, or timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: |
            Caller lacks audit_logs read or list permission (RBAC requireAnyPermission).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to list or count audit logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/audit/export/:
    get:
      summary: Export audit log entries as CSV
      description: |
        Streams matching audit log entries as a CSV attachment (filename audit_log_export.csv). Accepts the same filters as the list endpoint. Only format=csv is supported; the `since` cursor is not supported for export. The response is a CSV stream, not the JSON data envelope.
