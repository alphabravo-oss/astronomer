      summary: List resources by API group/version/kind (raw passthrough)
      description: Proxies a Kubernetes list call to the target cluster via the agent tunnel. The group `core` maps to the `/api/{version}/{kind}` core API path; any other group maps to `/apis/{group}/{version}/{kind}`. The raw Kubernetes List object (apiVersion/kind/items/metadata) is returned verbatim under the `data` envelope; the handler does not flatten it.
      tags:
        - resources-explorer
      security:
        - bearerAuth: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Target cluster UUID.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: Kubernetes API group, or the literal `core` for the core API.
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Kubernetes API version (e.g. v1).
          schema:
            type: string
        - name: kind
          in: path
          required: true
          description: Plural resource name as used in the API path (e.g. `deployments`).
          schema:
            type: string
      responses:
        '200':
          description: Raw Kubernetes List object returned under `data`. Shape is whatever the cluster API server returns; not normalized by Astronomer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller lacks clusters:read permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Tunnel requester not configured or the proxied call to the cluster failed (code `proxy_error`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/clusters/{cluster_id}/resources/{resource_type}:
    get:
      operationId: listNamedClusterResources
      summary: List a known namespaced/cluster resource type (flattened rows)
      description: Lists one of a fixed set of supported resource types on the target cluster and returns UI-ready flattened rows under `data`. A 404 from the cluster (e.g. an uninstalled CRD such as v1alpha2 Gateway API routes) is normalized to an empty list with HTTP 200. Each row always includes name, namespace, clusterId, labels, annotations and createdAt, plus type-specific fields.
      tags:
        - resources-explorer
      security:
        - bearerAuth: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Target cluster UUID.
          schema:
            type: string
        - name: resource_type
          in: path
          required: true
          description: Supported resource type (route-validated by regex).
          schema:
            type: string
            enum:
              - services
              - ingresses
              - networkpolicies
              - persistentvolumes
              - persistentvolumeclaims
              - storageclasses
              - gateways
              - httproutes
              - gatewayclasses
              - grpcroutes
              - tcproutes
              - udproutes
              - tlsroutes
              - referencegrants
        - name: namespace
          in: query
          required: false
          description: Restrict the listing to a single namespace. Ignored for cluster-scoped types (persistentvolumes, storageclasses, gatewayclasses).
          schema:
            type: string
      responses:
        '200':
          description: List of flattened resource rows under `data` (empty array when the type is not installed on the cluster).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ResourceRow'
        '400':
          description: Unsupported resource type (code `invalid_resource`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller lacks `<resource_type>:list` permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Tunnel requester not configured or proxy/parse failure (code `proxy_error`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      operationId: createNamedClusterResource
      summary: Create a resource on the cluster
      description: Creates a resource by proxying the supplied Kubernetes manifest to the cluster. The namespace is derived from `metadata.namespace` in the request body. A management-plane audit row (`cluster.resource.create`) is recorded. Only a subset of types is creatable.
      tags:
        - resources-explorer
      security:
        - bearerAuth: []
      x-required-scope: write:clusters
      parameters:
        - name: cluster_id
          in: path
          required: true
          description: Target cluster UUID.
          schema:
            type: string
        - name: resource_type
          in: path
          required: true
          description: Creatable resource type (route-validated by regex).
          schema:
            type: string
            enum:
              - services
              - ingresses
              - networkpolicies
              - persistentvolumeclaims
      requestBody:
        required: true
        description: A Kubernetes resource manifest. The handler reads it verbatim and only inspects `metadata.namespace` to build the target API path; all other fields are passed through to the cluster API server unchanged.
        content:
          application/json:
            schema:
              type: object
              description: Kubernetes resource manifest (apiVersion/kind/metadata/spec/...).
              properties:
                apiVersion:
                  type: string
                kind:
                  type: string
                metadata:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  additionalProperties: true
                spec:
                  type: object
                  additionalProperties: true
              additionalProperties: true
      responses:
        '200':
          description: Raw created object as returned by the cluster API server, under `data`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '400':
          description: Unreadable body (`invalid_body`), undeterminable namespace (`invalid_body`), or unsupported resource type (`invalid_resource`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Caller lacks `<resource_type>:create` permission, or the API token is missing the write:clusters scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Tunnel requester not configured or proxy failure (code `proxy_error`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
