  /api/v1/clusters/{cluster_id}/k8s/{path}:
    parameters:
      - name: cluster_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Target cluster UUID.
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: |
          Opaque Kubernetes API path after `/k8s/` (chi wildcard `*`), e.g.
          `api/v1/namespaces/default/pods`. Forwarded verbatim (plus the raw
          query string) to the in-cluster apiserver through the tunnel.
    description: |
      Reverse proxy from the management server to a connected cluster's
      Kubernetes apiserver, tunneled over the agent WebSocket
      (tunnel.ProxyHandler.HandleK8sProxy). Watch-shaped requests
      (`?watch=true`, `Accept: ...stream=watch`, or a `/watch/` path segment)
      are streamed frame-by-frame with no server-side timeout once the first
      frame arrives; all other requests are unary with a 30s timeout.

      Auth: Astronomer bearer JWT or personal API token. On MUTATING methods
      (anything other than GET/HEAD/OPTIONS) the api-token must carry the
      `clusters:write` scope (requireK8sProxyScope); GET/HEAD/OPTIONS bypass the
      scope check. RBAC permission is derived dynamically from the k8s path
      (e.g. `pods:exec` for exec/attach/portforward subresources, secret reads
      are separately audited). Rate-limited under the k8s-proxy class.

      Note: CONNECT is also accepted by the route but is not representable in
      OpenAPI; the eight representable verbs are listed below.
    get:
      operationId: k8sProxyGet
      summary: Proxy a request to the cluster Kubernetes apiserver
      tags:
        - tunnel-proxy-argocd-ui
      security:
        - bearerJWT: []
      requestBody:
        required: false
        description: Opaque request body forwarded unchanged to the apiserver.
        content:
          application/json:
            schema: {}
          application/yaml:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Proxied apiserver response (status, headers and body forwarded through).
          content:
            application/json:
              schema: {}
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Missing cluster_id or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: Invalid response from the agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Cluster agent not connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: Request timed out waiting for the agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
