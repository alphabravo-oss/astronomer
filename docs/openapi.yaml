      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                probe_path:
                  type: string
                  description: Optional; defaults to `_health`.
      responses:
        '200':
          description: Probe result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
