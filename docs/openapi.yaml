  /api/v1/catalog/charts/:
    get:
      summary: List catalog charts
      description: |
        Lists Helm charts across synced repositories. Returns a DRF-style
        paginated envelope. Supports `?tag=` (filter on helm_chart_tags) and
        `?project_id=` (project-scoped union of globals + own + subscribed
        catalogs); these are mutually exclusive with `tag` taking precedence.
      tags:
        - catalog
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter charts by helm_chart_tags tag.
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Narrow to the project-scoped catalog union.
      responses:
        '200':
          description: Paginated page of charts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HelmChart'
        '400':
          description: Invalid project_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: List/count failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/catalog/charts/{id}/:
    get:
      summary: Get a catalog chart
      tags:
        - catalog
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The chart.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/HelmChart'
        '400':
          description: Invalid chart ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Chart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/catalog/charts/{id}/readme/:
    get:
      summary: Get a chart README
