        '202':
          description: Snapshot row created (Velero CR apply is best-effort).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/SnapshotResponse'
