            minimum: 0
          description: Page size (defaults to 20).
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Row offset into the result set.
      responses:
        '200':
          description: Paginated page of projects.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
