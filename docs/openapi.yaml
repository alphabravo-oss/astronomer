          required: false
          description: One of Deployment, StatefulSet, DaemonSet, Job, CronJob.
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Case-insensitive substring match on name or namespace.
          schema:
            type: string
      responses:
        '200':
          description: Workload page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
