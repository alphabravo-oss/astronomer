  /api/v1/clusters/{id}/agent-token/rotate/:
    post:
      summary: Trigger durable agent-token rotation
      tags:
        - clusters
      security:
        - bearerJWT: []
      description: >-
        clusters:update RBAC. Marks the cluster's durable agent token for
        rotation; the fresh token is minted and delivered on the agent's next
        CONNECT, with the old token honored during a grace window so there is no
        mid-rotation lockout. Idempotent-gated: returns 409 if a rotation is
        already in flight.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Rotation pending; completes on the agent's next connect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '404':
          description: Cluster not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: No agent token eligible for rotation, or a rotation is already in flight
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/clusters/{id}/agent-token/revoke/:
    post:
      summary: Revoke the durable agent token
      tags:
        - clusters
      security:
        - bearerJWT: []
      description: >-
        clusters:update RBAC. Hard-revokes the durable agent token (sets
        revoked_at, clears the grace previous_token_hash). The agent's next
        CONNECT is then denied; an operator must re-import the cluster to issue a
        fresh credential.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
        '404':
          description: Cluster has no active agent token to revoke
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
