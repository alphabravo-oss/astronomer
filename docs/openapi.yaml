        `?include_project_owned=true` includes them; `?project_id=` switches to
        the project-scoped browse (returns a bare array, not paginated).
      tags:
        - catalog
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: include_project_owned
          in: query
          required: false
          schema:
            type: boolean
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: |
            Paginated repositories (admin view), or a bare array when
            `?project_id=` is supplied.
          content:
            application/json:
              schema:
                oneOf:
                  - allOf:
                      - $ref: '#/components/schemas/PaginatedEnvelope'
                      - properties:
                          data:
