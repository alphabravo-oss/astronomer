      summary: List clusters whose agent still resolves to the cluster-admin privilege profile
      description: |
        Read-only rollout aid. Enumerates every managed cluster whose stored agent privilege-profile annotation resolves to the cluster-admin (`admin`) profile, so operators can find and re-profile them. Superuser-gated inside the handler (401 anonymous / 403 non-superuser).
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Posture report. `data` holds only the admin-profile clusters; `total_clusters` is the full scanned fleet size.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          admin_profile_clusters:
                            type: integer
                          total_clusters:
                            type: integer
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                cluster_id:
                                  type: string
                                  format: uuid
                                cluster_name:
                                  type: string
                                cluster_status:
                                  type: string
                                is_local:
                                  type: boolean
                                privilege_profile:
                                  type: string
                                  example: admin
                              required:
                                - cluster_id
                                - cluster_name
                                - cluster_status
                                - is_local
                                - privilege_profile
                        required:
                          - admin_profile_clusters
                          - total_clusters
                          - items
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Agent fleet inventory is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/key-status:
    get:
      operationId: adminKeyStatus
      summary: Encryption and JWT signing key-rotation status
      description: |
        Returns the number of loaded encryption + JWT signing keys. A count > 1 means a key rotation is mid-flight. Superuser-gated inside the handler. Response is NOT wrapped in a data envelope (raw top-level object).
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Live key counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  encryption_keys:
                    type: integer
                  jwt_keys:
                    type: integer
                  as_of:
                    type: string
                    format: date-time
                required:
                  - encryption_keys
                  - jwt_keys
                  - as_of
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/admin/emails:
    get:
      operationId: adminEmailsList
      summary: List email-message delivery audit rows
      description: |
        Paginated metadata-only view of the outbound email audit log (no message bodies). Superuser-gated inside the handler. Returns a custom `{data:{items,total,limit,offset}}` object (not the DRF paginated envelope).
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Page of email-message audit rows.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                to_address:
                                  type: string
                                subject:
                                  type: string
                                template:
                                  type: string
                                status:
                                  type: string
                                attempts:
                                  type: integer
                                last_error:
                                  type: string
                                sent_at:
                                  type: string
                                  format: date-time
                                  nullable: true
                                created_at:
                                  type: string
                                  format: date-time
                                user_id:
                                  type: string
                                  format: uuid
                                  nullable: true
                          total:
                            type: integer
                            format: int64
                          limit:
                            type: integer
                          offset:
                            type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/admin/smtp:
    get:
      operationId: adminSmtpGet
      summary: Get SMTP settings
      description: |
        Returns the singleton SMTP settings. The password is always the sentinel `<encrypted>`; `password_configured` reports whether one is actually set. Superuser-gated inside the handler. Returns empty defaults when no row exists.
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      responses:
        '200':
          description: SMTP settings (password redacted to sentinel).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/SmtpSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      operationId: adminSmtpUpdate
      summary: Update SMTP settings
      description: |
        Partial update (all body fields optional). A password equal to the sentinel `<encrypted>` preserves the stored ciphertext; any other value is re-encrypted. Refuses to disable SMTP (enabled=false or blank host) when the active compliance baseline requires SMTP (409). Superuser-gated.
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                host:
                  type: string
                port:
                  type: integer
                username:
                  type: string
                password:
                  type: string
                  description: Send `<encrypted>` to keep existing; empty string to clear.
                from_address:
                  type: string
                  format: email
                from_name:
                  type: string
                auth_mechanism:
                  type: string
                  enum:
                    - plain
                    - login
                    - cram-md5
                    - none
                encryption:
                  type: string
                  enum:
                    - starttls
                    - tls
                    - none
                require_tls:
                  type: boolean
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 600
      responses:
        '200':
          description: Saved settings (password redacted to sentinel).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/SmtpSettings'
        '400':
          description: Invalid body or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: SMTP is required by the active compliance baseline; cannot disable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Encryptor not configured; cannot store password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/smtp/test:
    post:
      operationId: adminSmtpTest
      summary: Send a test email using the live SMTP settings
      description: |
        Sends a templated test message to the supplied recipient using the stored (live) SMTP settings. Superuser-gated. Response is NOT wrapped in a data envelope.
      tags:
        - platform-admin-settings
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient
              properties:
                recipient:
                  type: string
                  format: email
      responses:
        '200':
          description: Test message sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  recipient:
                    type: string
                    format: email
        '400':
          description: Invalid recipient, missing recipient, or SMTP disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: The test send failed at the SMTP layer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: SMTP settings are not configured yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/vault-connections:
