  /api/v1/catalog/controller/status/:
    get:
      summary: Catalog reconciler controller status
      description: |
        Summary document for the catalog operations reconciler: operation
        counts by status, recent operations/failures, chart and installed
        counts. Counts are RBAC-filtered to the caller's visible clusters.
      tags:
        - catalog
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Controller status summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reconciler:
                    type: object
                  catalog:
                    type: object
                    properties:
                      chartCount:
                        type: integer
                        format: int64
                      installedCount:
                        type: integer
                        format: int64
                        nullable: true
                  operations:
                    type: object
                    additionalProperties:
                      type: integer
                  recentFailureCount:
                    type: integer
                  recentOperations:
                    type: array
                    items:
                      type: object
                  latestFailure:
                    type: object
                    nullable: true
        '500':
          description: Failed to load catalog operations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/catalog/installed/:
    get:
      summary: List installed charts
      description: |
        Lists installed_charts rows (paginated envelope). When `?cluster_id=`
        is supplied the listing is scoped to that cluster.
      tags:
        - catalog
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated page of installed charts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/InstalledChart'
        '500':
          description: List/count failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create an installation (install a chart)
      description: |
        Enqueues a helm install on the target cluster. Cluster-mutating:
        requires the `clusters:write` api-token scope (legacy empty-scope and
        session tokens pass through) plus RBAC `catalog:create` on the cluster,
        enforced inside the handler. May be blocked/deferred by an active
        maintenance window.
      tags:
        - catalog
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
                - release_name
                - namespace
              properties:
                cluster_id:
                  type: string
                  format: uuid
                chart_version_id:
                  type: string
                  format: uuid
                release_name:
                  type: string
                namespace:
                  type: string
                values_override:
                  type: string
                notes:
                  type: string
                tool_slug:
                  type: string
                preset_used:
                  type: string
      responses:
        '202':
          description: Installation accepted and enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  installation:
                    $ref: '#/components/schemas/InstalledChart'
                  operation:
                    $ref: '#/components/schemas/CatalogOperation'
        '400':
          description: Invalid body, missing required field, invalid ID, or vault resolution failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: RBAC catalog:create denied for the cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Chart version, chart, or repository not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Blocked by an active maintenance window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Create/enqueue failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
