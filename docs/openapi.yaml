          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/clusters/{cluster_id}/pods/watch/:
    get:
      tags:
        - logging-monitoring
      summary: Watch pods (SSE)
      description: |
        Streams live pod changes through the agent tunnel as Server-Sent
        Events instead of the UI polling the list endpoint. Each Kubernetes
        watch event becomes one SSE frame whose `event:` is the watch verb
        (`ADDED`, `MODIFIED`, `DELETED`) and whose `data:` is the pod object
        JSON. Authenticate with a one-use stream `ticket` query parameter
        (scoped to this cluster) or a normal token. RBAC: pods:read.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: namespace
          in: query
          required: false
          description: Restrict the watch to a single namespace.
          schema:
            type: string
        - name: ticket
          in: query
          required: false
          description: One-use stream ticket (scoped to this cluster).
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of pod watch events
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '501':
          description: Pod watch streaming not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Cluster tunnel/proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
