  /api/v1/admin/scim-tokens/:
    post:
      summary: Mint a SCIM provisioning bearer token
      tags:
        - users-settings
      description: |
        Generates a new `astro_scim_<random>` bearer token for the
        `/scim/v2/*` provisioning chain. The plaintext token is returned
        exactly ONCE in this response under `token`; only its SHA-256 hash
        is persisted. Superuser only (gated in-handler).
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Operator-facing label for the token.
      responses:
        '201':
          description: Token created. The plaintext `token` is shown only here.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  prefix:
                    type: string
                  last_used_at:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                  token:
                    type: string
                    description: Plaintext bearer token, returned only on create.
        '400':
          description: Invalid body or missing name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Superuser privileges required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      summary: List SCIM provisioning tokens (metadata only)
      tags:
        - users-settings
      description: |
        Returns metadata for every SCIM token. The secret is never
        included — only id, name, display prefix, and timestamps.
        Superuser only (gated in-handler).
      security:
        - bearerJWT: []
      responses:
        '200':
          description: List of SCIM token metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        prefix:
                          type: string
                        last_used_at:
                          type: string
                          nullable: true
                        created_at:
                          type: string
        '403':
          description: Superuser privileges required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/scim-tokens/{id}/:
    delete:
      summary: Revoke a SCIM provisioning token
      tags:
        - users-settings
      description: Deletes the SCIM token by id. Superuser only (gated in-handler).
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Token revoked.
        '400':
          description: Invalid token id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Superuser privileges required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
