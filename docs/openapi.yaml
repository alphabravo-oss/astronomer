paths:
  /scim/v2/Users:
    post:
      tags:
        - SCIM
      summary: Provision (create) a user via SCIM 2.0
      description: |
        SCIM 2.0 User create. Authenticated with a static SCIM bearer
        token (NOT the platform JWT). Maps onto the users table. If a
        user with the same `userName` already exists the existing
        resource is returned (idempotent re-provisioning).
      responses:
        '201':
          description: User created
        '401':
          description: Missing or invalid SCIM bearer token
    get:
      tags:
        - SCIM
      summary: List users via SCIM 2.0
      description: |
        SCIM 2.0 ListResponse. Supports `startIndex`/`count` pagination
        and the `userName eq "x"` filter every IdP issues before create.
      responses:
        '200':
          description: SCIM ListResponse of users
        '401':
          description: Missing or invalid SCIM bearer token
  /scim/v2/Users/{id}:
    get:
      tags:
        - SCIM
      summary: Get a user via SCIM 2.0
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SCIM User resource
        '404':
          description: User not found
    put:
      tags:
        - SCIM
      summary: Replace a user via SCIM 2.0 (de/reactivate)
      description: |
        Full-resource replace. Applies core attributes and the `active`
        flag; `active:false` deactivates the user (blocks login), `active:true`
        reactivates. `userName` is immutable and falls back to the stored value.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated SCIM User resource
        '400':
          description: Invalid request body or user id
        '404':
          description: User not found
    patch:
      tags:
        - SCIM
      summary: Partially update a user via SCIM 2.0 (RFC 7644 PatchOp)
      description: |
        Applies a SCIM PatchOp. Supports the `replace` operations real IdPs
        (Okta, Azure AD) emit: `replace` of `active` (`active:false`
        deactivates — blocks login — and `active:true` reactivates), and
        `replace` of core attributes (`displayName`/`name`, `emails`,
        `userName`), as both path-set ops and a path-less merge of a partial
        User object. `op` is matched case-insensitively; `add`/`remove` ops
        and unknown paths are ignored. The updated resource is returned.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/scim+json:
            schema:
              type: object
              properties:
                schemas:
                  type: array
                  items:
                    type: string
                  example:
                    - urn:ietf:params:scim:api:messages:2.0:PatchOp
                Operations:
                  type: array
                  items:
                    type: object
                    properties:
                      op:
                        type: string
                      path:
                        type: string
                      value: {}
      responses:
        '200':
          description: Updated SCIM User resource
        '400':
          description: Invalid request body, user id, or patch value
        '404':
          description: User not found
    delete:
      tags:
        - SCIM
      summary: De-provision (delete) a user via SCIM 2.0
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found
  /scim/v2/Groups:
    get:
      tags:
        - SCIM
      summary: List groups via SCIM 2.0
      description: |
        Read-only. Each distinct group name configured in
        identity_group_mappings becomes one SCIM Group resource.
      responses:
        '200':
          description: SCIM ListResponse of groups
        '401':
          description: Missing or invalid SCIM bearer token
  /scim/v2/Groups/{id}:
    get:
      tags:
        - SCIM
      summary: Get a group via SCIM 2.0
      description: '`id` is the group displayName.'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SCIM Group resource
        '404':
          description: Group not found
  /scim/v2/ServiceProviderConfig:
    get:
      tags:
        - SCIM
      summary: SCIM 2.0 service provider configuration (RFC 7643 §5)
      description: |
        Static document advertising the SCIM features this provider
        supports: `patch` true, `filter` true (the `userName eq "x"`
        filter), `bulk`/`sort`/`etag`/`changePassword` false, and
        `authenticationSchemes` = oauthbearertoken. IdPs probe this
        before provisioning.
      responses:
        '200':
          description: SCIM ServiceProviderConfig
        '401':
          description: Missing or invalid SCIM bearer token
  /scim/v2/ResourceTypes:
    get:
      tags:
        - SCIM
      summary: SCIM 2.0 resource types (RFC 7643 §6)
      description: |
        Read-only ListResponse describing the User and Group resource
        types this provider exposes.
      responses:
        '200':
          description: SCIM ListResponse of resource types
        '401':
          description: Missing or invalid SCIM bearer token
  /scim/v2/Schemas:
    get:
      tags:
        - SCIM
      summary: SCIM 2.0 schemas (RFC 7643 §7)
      description: |
        Read-only ListResponse of the core User and Group schema
        definitions, limited to the attributes this provider maps.
      responses:
        '200':
          description: SCIM ListResponse of schemas
        '401':
          description: Missing or invalid SCIM bearer token
  /api/v1/auth/login/:
    post:
      tags:
        - Auth
      summary: Email/password login
      description: |
        Returns a JWT access token + refresh token. Rate-limited at
        5/minute per source IP. If TOTP is required for the account
        the response carries a `challenge_token` instead and the
        client must POST to `/auth/totp/verify/`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me/:
    get:
      tags:
        - Auth
      summary: Current authenticated user
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout/:
    post:
      tags:
        - Auth
      summary: Logout current session
      responses:
        '200':
          description: Session revoked or logout redirect returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/settings/features/:
    get:
      tags:
        - Settings
      summary: Authenticated feature flag snapshot
      description: |
        Returns only feature.* booleans so the SPA can mirror backend
        feature gates without exposing the full admin settings registry.
      responses:
        '200':
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FeatureFlags'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/admin/backup-drill/:
    get:
      tags:
        - Settings
      summary: Latest management-plane backup restore-drill result
      responses:
        '200':
          description: Backup drill status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v1/extensions/:
    get:
      tags:
        - Extensions
      summary: List installed UI extensions
      responses:
        '200':
          description: Installed extension registry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExtensionRecord'
                      sample_manifest:
                        $ref: '#/components/schemas/ExtensionManifest'
    post:
      tags:
        - Extensions
      summary: Install or update a UI extension manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - manifest
              properties:
                manifest:
                  $ref: '#/components/schemas/ExtensionManifest'
                source:
                  type: string
                enable:
                  type: boolean
      responses:
        '200':
          description: Installed extension
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExtensionRecord'
  /api/v1/extensions/validate/:
    post:
      tags:
        - Extensions
      summary: Validate a UI extension manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                manifest:
                  $ref: '#/components/schemas/ExtensionManifest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExtensionValidation'
  /api/v1/extensions/sample-manifest/:
    get:
      tags:
        - Extensions
      summary: Return the starter UI extension manifest
      responses:
        '200':
          description: Sample manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExtensionManifest'
  /api/v1/extensions/mounts/:
    get:
      tags:
        - Extensions
      summary: List enabled extensions for the host loader
      description: >-
        Returns the render-only projection (§HostMounts) the host UI loader
        needs to mount enabled extensions: per-point manifests, mount points,
        and the derived tier (1 = declarative, 2 = signed bundle). Viewer-
        readable (settings:read, not admin). Only enabled, compatible
        extensions appear; Tier-2 points additionally require a verified bundle.
        Upstream dataSource paths are not exposed.
      responses:
        '200':
          description: Enabled-extensions mount surface
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExtensionMountsResponse'
  /api/v1/extensions/{name}/data/{dataSourceId}/:
    post:
      tags:
        - Extensions
      summary: Proxy a manifest-declared data source under the caller's RBAC
      description: >-
        §DataProxy — fetches a manifest-DECLARED data source on behalf of a
        declarative widget (Tier 1) or, with an X-Extension-Ticket header, the
        sandboxed bridge (Tier 2). The call is enforced under two independent
        gates the extension can only NARROW, never widen: (a) the requesting
        user's own RBAC, re-checked via the same engine/bindings as the route
        middleware, and (b) the manifest allowlist — the dataSource must be
        declared in the stored, validated manifest of the enabled+compatible
        extension, and the upstream URL is rebuilt server-side from that
        manifest so no client field can redirect it. Effective access =
        manifest.permissions[] ∩ the user's RBAC. An extension can never read or
        write anything the logged-in user could not already do in the UI.
        Viewer-gated (settings:read, NOT admin); the real per-call check is the
        per-dataSource RBAC inside the handler.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: dataSourceId
          in: path
          required: true
          schema:
            type: string
        - name: X-Extension-Ticket
          in: header
          required: false
          description: >-
            Tier-2 single-use, ≤60s, scope-checked data ticket (§BridgeProtocol).
            Present only for sandboxed-iframe bridge calls; browser sessions use
            the normal session cookie instead.
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  type: object
                  description: Cluster/project/namespace ids bound per the dataSource scope.
                  properties:
                    clusterId:
                      type: string
                      format: uuid
                    projectId:
                      type: string
                      format: uuid
                    namespace:
                      type: string
                pathParams:
                  type: object
                  additionalProperties:
                    type: string
                  description: >-
                    Path-template placeholder values, validated against the
                    template's allowed placeholders only.
                query:
                  type: object
                  additionalProperties:
                    type: string
                  description: >-
                    Overrides for declared query keys only; undeclared keys are
                    dropped.
                body:
                  type: object
                  description: POST form-submit body only, against the declared input schema.
      responses:
        '200':
          description: Proxied + projected data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: object
                        description: rows (list), value (object/series).
                      shape:
                        type: string
                        enum: [list, object, series]
                      meta:
                        type: object
        '403':
          description: The requesting user's own RBAC denies this data source (extension_rbac_denied).
        '404':
          description: Unknown or undeclared data source (the manifest allowlist).
        '409':
          description: Extension is not enabled or not compatible.
  /api/v1/extensions/{name}/token/:
    post:
      tags:
        - Extensions
      summary: Mint a short-lived, scoped Tier-2 bridge ticket
      description: >-
        §BridgeProtocol — backs the sandboxed iframe's ext/token.request. The
        host mints a single-use, ≤60s, scope-checked ticket bound to
        {user, extension, dataSource, cluster} and returns it; the iframe sends
        it as the X-Extension-Ticket header to the §DataProxy endpoint. The
        session JWT never crosses the bridge. Issuance is gated by the SAME two
        checks as the data path: the dataSource must be a Tier-2 bundle source
        declared in the stored, validated manifest of the enabled+compatible
        extension with a verified bundle, AND the requesting user's own RBAC
        must permit it (engine.CheckPermission over the user's bindings). The
        ticket conveys identity only — RBAC is re-derived on every data call —
        so it grants nothing the user could not already do. Viewer-gated
        (settings:read, NOT admin).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dataSource
              properties:
                dataSource:
                  type: string
                  description: A Tier-2 bundle dataSource id declared in the manifest.
                context:
                  type: object
                  properties:
                    clusterId:
                      type: string
                      format: uuid
                    projectId:
                      type: string
                      format: uuid
                    namespace:
                      type: string
      responses:
        '201':
          description: A scoped, single-use bridge ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      dataSource:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
                      scope:
                        type: string
        '403':
          description: The requesting user's own RBAC denies this data source (extension_rbac_denied).
        '404':
          description: Unknown extension or undeclared Tier-2 data source.
        '409':
          description: Extension is not enabled, not compatible, or its bundle is not verified.
  /api/v1/extensions/verify-bundle/:
    post:
      tags:
        - Extensions
      summary: Verify a signed extension bundle (Ed25519 + SHA-256)
      description: >-
        Verifies an executable extension bundle's SHA-256 checksum and Ed25519
        signature against the trusted public key configured on the server. Fails
        closed when no trusted key is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bundle
                - signature
              properties:
                bundle:
                  type: string
                  description: Base64 (std) encoded executable bundle bytes.
                signature:
                  type: string
                  description: Base64 (std) encoded Ed25519 signature over the bundle bytes.
                checksum:
                  type: string
                  description: Optional expected "sha256:<hex>" digest of the bundle.
                name:
                  type: string
                  description: >-
                    Optional installed-extension name. When supplied and the
                    verified checksum matches a bundle descriptor in that
                    extension's stored manifest, the §HostMounts Tier-2 gate is
                    lifted (bundle_verified set true) so the descriptor may
                    mount. Omit to verify without touching any stored row.
      responses:
        '200':
          description: Bundle verified
          content:
