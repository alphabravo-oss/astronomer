  /api/v1/auth/change-password/:
    post:
      summary: Change the authenticated user's password
      description: |
        Verifies the caller's current password, hashes the new one with bcrypt,
        and persists it. Clears the `must_change_password` flag on success.
        Response is NOT wrapped in the standard data envelope.
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Password updated
                  must_change_password:
                    type: boolean
                    example: false
        '400':
          description: Invalid body or missing fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated or current password incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Password updates not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/refresh/:
    post:
      summary: Exchange a refresh token for a new access/refresh pair
      description: |
        PUBLIC. Accepts `{refresh}` in the body, or falls back to the
        `astronomer_refresh` cookie (CSRF-validated). Returns a new token pair.
      tags:
        - auth
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
                  description: Refresh JWT. Optional when the refresh cookie is present.
      responses:
        '200':
          description: New token pair (raw, unwrapped).
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New access JWT
                  refresh:
                    type: string
                    description: New refresh JWT
        '401':
          description: Missing/invalid/expired refresh token, wrong token type, or CSRF required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token generation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/logout-done/:
    get:
      summary: SSO single-logout landing endpoint
      description: |
        PUBLIC. The post_logout_redirect_uri the IdP bounces back to after
        RP-initiated logout. Sets a one-shot `astro_logged_out` cookie and
        issues a 303 redirect to `/dashboard/login`.
      tags:
        - auth
      security: []
      responses:
        '303':
          description: Redirect to the SPA login screen.
          headers:
            Location:
              schema:
                type: string
                example: /dashboard/login
  /api/v1/auth/password-reset/request/:
    post:
      summary: Request a password-reset email
      description: |
        PUBLIC, rate-limited. ALWAYS returns 202 regardless of whether the
        email matched a user (email-enumeration safe). When matched and the
        reset store + email notifier are wired, an emailed reset link is sent.
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Accepted. No body. Returned in all cases (including unknown email or internal failure).
  /api/v1/auth/password-reset/complete/:
    post:
      summary: Complete a password reset using an emailed token
      description: |
        PUBLIC, rate-limited. Validates the token (unused, unexpired, password
        unchanged since issue), updates the password, wipes outstanding reset
        tokens, and invalidates existing sessions. Response is unwrapped.
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                  description: Opaque reset token from the email link.
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 72
      responses:
        '200':
          description: Password updated (raw, unwrapped).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Password updated
        '400':
          description: Missing fields, invalid/expired/used token, or password length out of range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Hash or update failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Password reset is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/tokens/:
    get:
      summary: List the authenticated user's API tokens
      description: |
        Paginated (DRF-style, always HTTP 200). Plaintext token values are
        never returned in the list.
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page offset.
      responses:
        '200':
          description: Paginated list of API tokens.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiTokenListItem'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token management not configured or listing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create a new API token
      description: |
        Returns the plaintext token value ONCE in the response. Validates the
        optional CIDR allowlist; subject to the per-user token quota when
        enforcement is wired (429 on hard-exceed).
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                expires_in_days:
                  type: integer
                  description: 0 or omitted = no expiry.
                scopes:
                  type: array
                  items:
                    type: string
                allowed_cidrs:
                  type: string
                  description: Comma-separated CIDR/IP allowlist. Empty = no IP restriction.
      responses:
        '201':
          description: Token created. The `token` field carries the plaintext, shown only here.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/ApiTokenCreated'
        '400':
          description: Missing name or invalid allowed_cidrs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Per-user token quota exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token management not configured or creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/tokens/{id}/:
    delete:
      summary: Revoke an API token
      description: Revokes a token owned by the authenticated user. 404 when the token does not exist or belongs to another user.
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Token revoked. No content.
        '400':
          description: Invalid token ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Token not found (or not owned by caller).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token management not configured or revoke failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/verify/:
    post:
      summary: Verify a TOTP/recovery code and obtain a session
      description: |
        PUBLIC, rate-limited. Proof of identity is the `challenge_token` issued
        by Login. On success returns the same shape as Login (token, refresh,
        user). Tries the TOTP code first, then falls back to a recovery code
        unless `use_recovery` is set.
      tags:
        - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challenge_token
                - code
              properties:
                challenge_token:
                  type: string
                  description: Short-lived TOTP challenge JWT from Login.
                code:
                  type: string
                  description: 6-digit TOTP code or a recovery code.
                use_recovery:
                  type: boolean
                  description: Force recovery-code path (e.g. lost device).
      responses:
        '200':
          description: Session pair + user (same shape as Login).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid body or missing fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid challenge, wrong purpose, not enrolled, or bad code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Stored secret unreadable or token generation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/enroll/start/:
    post:
      summary: Begin TOTP enrollment
      description: |
        Generates a fresh secret, otpauth URL, and QR PNG, parking the
        encrypted secret in a short-lived challenge. Nothing is persisted until
        the confirm step.
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Enrollment package (raw object).
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpauth_url:
                    type: string
                  qr_data_url:
                    type: string
                    description: 'data: URL PNG of the QR code.'
                  challenge_token:
                    type: string
                    description: 5-minute purpose-bound JWT to echo back on confirm.
                  challenge:
                    type: string
                    description: Opaque encrypted-secret blob to echo back on confirm.
                  issuer:
                    type: string
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Secret/QR generation or token minting failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: TOTP not configured (no encryptor).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/enroll/confirm/:
    post:
      summary: Confirm TOTP enrollment
      description: |
        Validates the challenge, verifies the supplied code, persists the
        enrollment, and returns 10 one-time recovery codes (shown ONCE).
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challenge_token
                - challenge
                - code
              properties:
                challenge_token:
                  type: string
                challenge:
                  type: string
                code:
                  type: string
                  description: 6-digit code from the authenticator app.
      responses:
        '200':
          description: Enrollment confirmed; recovery codes returned once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items:
                      type: string
                  enrolled:
                    type: boolean
                    example: true
        '400':
          description: Invalid body, missing fields, malformed challenge, or invalid code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated or invalid/mismatched challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Persist or recovery-code generation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: TOTP not configured (no encryptor).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/disable/:
    post:
      summary: Disable TOTP for the authenticated user
      description: |
        Requires BOTH the current password AND a valid TOTP code. Wipes the
        enrollment and recovery codes. Response is unwrapped.
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - code
              properties:
                password:
                  type: string
                  format: password
                code:
                  type: string
      responses:
        '200':
          description: TOTP disabled (raw, unwrapped).
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: TOTP disabled
        '400':
          description: Invalid body or missing fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated, wrong password, or invalid code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: User not found or TOTP not enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Secret unreadable or disable persist failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/recovery-codes/regenerate/:
    post:
      summary: Regenerate TOTP recovery codes
      description: Requires a fresh TOTP code (not a recovery code). Replaces the existing recovery sheet and returns the new codes once.
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Current 6-digit TOTP code.
      responses:
        '200':
          description: New recovery codes (shown once).
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items:
                      type: string
        '400':
          description: Invalid body or missing code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated or invalid code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: TOTP not enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Secret unreadable or persist failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/totp/status/:
    get:
      summary: Get TOTP enrollment status
      description: Cheap status read for the account-security page. When not enrolled, returns `{enrolled:false}`.
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: TOTP status (raw object).
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:
                    type: boolean
                  last_used_at:
                    type: string
                    format: date-time
                    nullable: true
                  recovery_codes_remaining:
                    type: integer
                    format: int64
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/users/{id}/disable-totp/:
    post:
      summary: Admin force-disable TOTP for a user
      description: |
        Superuser-gated. For the lost-device case where the user cannot satisfy
        the password+code Disable requirement. Wipes the target user's
        enrollment and recovery codes. Response is unwrapped.
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target user ID.
      responses:
        '200':
          description: TOTP disabled for the user (raw, unwrapped).
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: TOTP disabled for user
        '400':
          description: Invalid user ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Superuser required (requireScope admin + handler superuser gate).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Target user not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Disable persist failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/dex/connector-types/:
    get:
      summary: List supported Dex connector types
      description: |
        Returns the connector-type registry (oidc, okta, microsoft, github,
        gitlab, bitbucket, google, saml, ldap, oauth) with each type's required,
        optional, secret, and nested field requirements for the UI wizard.
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Connector-type catalog.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DexConnectorType'
  /api/v1/auth/dex/connectors/:
    get:
      summary: List Dex connectors
      description: Returns every persisted Dex connector. Secret config fields are redacted (blank with a `__<field>_set` marker).
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: List of connectors.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DexConnector'
        '500':
          description: Listing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      summary: Create a Dex connector
      description: Validates the config against the connector-type registry, encrypts secret fields, and persists the row.
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DexConnectorRequest'
      responses:
        '201':
          description: Connector created (secrets redacted in the response).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexConnector'
        '400':
          description: Invalid body, missing name, unknown type, or failed field validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: A connector with that name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encrypt, encode, or persist failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/dex/connectors/{id}/:
    get:
      summary: Get a Dex connector
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connector (secrets redacted).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexConnector'
        '400':
          description: Invalid connector ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Connector not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      summary: Update a Dex connector
      description: |
        Partial update; omitted fields keep their current value. When `config`
        is present it is treated as a full replacement, except secret fields
        left empty are preserved from the existing row.
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DexConnectorRequest'
      responses:
        '200':
          description: Connector updated (secrets redacted).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexConnector'
        '400':
          description: Invalid ID/body, unknown type, or field validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Connector not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encrypt, encode, or update failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete a Dex connector
      tags:
        - auth
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connector deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: string
                            format: uuid
        '400':
          description: Invalid connector ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Connector not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Delete failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/dex/settings/:
    get:
      summary: Get Dex singleton settings
      description: Returns the singleton Dex settings row. On a fresh install (no row), returns zero-value defaults with `configured:false`.
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Dex settings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexSettings'
    put:
      summary: Upsert Dex singleton settings
      description: Upserts the Dex settings row. `issuer_url` is required; namespace/release_name/configmap_name default to `dex`/`dex`/`astronomer-dex-config`.
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DexSettingsRequest'
      responses:
        '200':
          description: Settings saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexSettings'
        '400':
          description: Invalid body, missing issuer_url, or invalid cluster_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Save failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/dex/apply/:
    post:
      summary: Render and apply the Dex ConfigMap
      description: |
        Renders settings + enabled connectors into a Dex-shaped YAML ConfigMap,
        PATCHes it into the management cluster, and forces a Deployment rollout
        so Dex reloads. Requires settings with issuer_url and cluster_id.
        Returns 503 when the Kubernetes requester (tunnel) is not configured.
      tags:
        - auth
      security:
        - bearerJWT: []
      responses:
        '200':
          description: Config applied.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          applied:
                            type: boolean
                            example: true
                          cluster_id:
                            type: string
                            format: uuid
                          namespace:
                            type: string
                          configmap_name:
                            type: string
                          deployment_name:
                            type: string
                          connector_count:
                            type: integer
                          applied_at:
                            type: string
                            format: date-time
        '400':
          description: Settings not configured, missing issuer_url, or missing cluster_id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Connector listing or config render failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: ConfigMap apply or Deployment restart failed against the cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Kubernetes requester (tunnel) not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/auth/dex/register-as-sso/:
    post:
      summary: Register Dex as an SSO provider
      description: |
        One-click helper that creates or updates the `dex` row in
        sso_configurations pointing at the configured issuer URL, and syncs the
        Astronomer public client redirect URIs into Dex settings. All body
        fields are optional (`client_id` defaults to `astronomer`,
        `display_name` to `Sign in with Dex`).
      tags:
        - auth
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  default: astronomer
                client_secret:
                  type: string
                  format: password
                  description: Plaintext; encrypted before storage.
                display_name:
                  type: string
                  default: Sign in with Dex
      responses:
        '200':
          description: Existing SSO row updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexRegisterSSOResult'
        '201':
          description: New SSO row created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DataEnvelope'
                  - properties:
                      data:
                        $ref: '#/components/schemas/DexRegisterSSOResult'
        '400':
          description: Invalid body or Dex settings not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Encrypt or save failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Encryptor not configured but a client_secret was supplied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
