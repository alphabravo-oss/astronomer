  /api/v1/internal/argocd/clusters/{cluster_id}/k8s/{path}:
    parameters:
      - name: cluster_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: path
        in: path
        required: true
        schema:
          type: string
        description: Opaque Kubernetes API path after `/k8s/` (chi wildcard `*`).
    description: |
      Dedicated machine-to-machine front door for the built-in ArgoCD instance
      to reach an adopted cluster's apiserver through the same tunnel proxy
      (tunnel.ProxyHandler.HandleK8sProxy). It does NOT accept user JWTs or user
