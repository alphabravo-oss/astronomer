          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated page of enriched installed apps.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/InstalledAppEnriched'
        '400':
          description: Invalid cluster ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: List/count failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/clusters/{cluster_id}/apps/failed/:
    delete:
      summary: Delete failed installs on a cluster
      description: |
        Rancher-style force delete: hard-deletes installed_charts rows stuck in
        failed_install / failed_uninstall on the cluster. Requires RBAC
        `catalog:delete` on the cluster. Healthy releases are untouched.
      tags:
        - catalog
      security:
        - bearerJWT: []
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Count of failed installs removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    format: int64
        '400':
          description: Invalid cluster ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: RBAC catalog:delete denied for the cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Delete failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/projects/:
    get:
      summary: List projects
      description: DRF-style paginated list of all projects across clusters.
      tags:
        - projects
      security:
        - bearerJWT: []
      parameters:
